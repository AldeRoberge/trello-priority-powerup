<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cerveau</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"
  />
  <link rel="stylesheet" href="./components/shared/trello-theme.css" />
  <link rel="stylesheet" href="./components/priority/priority-ui.css" />
  <script src="./components/shared/brand.js"></script>
  <script src="./components/shared/rest-config.js"></script>
  <script src="./components/shared/debug-log.js"></script>
  <script src="./components/priority/priority-matrix.js"></script>
  <script src="./components/priority/priority-ui.js"></script>
  <script src="./components/priority/priority-trello.js"></script>
  <script src="./components/statut/statut-match.js"></script>
  <script src="./components/statut/statut-trello.js"></script>
  <script src="./components/completion/completion-trello.js"></script>
  <script src="./components/profile/user-profile.js"></script>
  <style>
    body.tp-card-open {
      margin: 0;
      padding: 4px 0 2px;
    }
    .tp-card-open-shell {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tp-card-open-overview {
      min-width: 0;
    }
    .tp-card-open-overview .variant-overview-section--compact {
      width: 100%;
    }
    .tp-card-open-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tp-card-open-row .tp-btn {
      width: auto;
      min-height: 32px;
      padding: 6px 12px;
      flex-shrink: 0;
    }
    .tp-card-open-loading {
      margin: 0;
      font-size: 12px;
      color: var(--ds-text-subtle, #626f86);
    }
  </style>
</head>
<body class="tp-page tp-card-open">
  <div class="tp-card-open-shell">
    <div class="tp-card-open-overview" id="overviewMount">
      <p class="tp-card-open-loading" id="overviewLoading">Chargement…</p>
    </div>
    <div class="tp-card-open-row">
      <button class="tp-btn tp-btn--primary" type="button" id="openBtn">Ouvrir</button>
    </div>
  </div>
  <script>
    (function () {
      var STORAGE_PREFIX = 'cerveau.autoModal.';
      var brand = window.PriorityBrand;
      var appName =
        brand && typeof brand.getAppName === 'function'
          ? brand.getAppName()
          : 'Trello Cerveau';

      if (brand && typeof brand.applyDocumentTitle === 'function') {
        brand.applyDocumentTitle(document);
      } else {
        document.title = appName;
      }

      var openBtn = document.getElementById('openBtn');
      var overviewMount = document.getElementById('overviewMount');
      var overviewLoading = document.getElementById('overviewLoading');
      var overviewUi = null;
      if (openBtn) openBtn.textContent = 'Ouvrir ' + appName;

      function storageKey(cardId) {
        return STORAGE_PREFIX + String(cardId || '');
      }

      function resize(t) {
        if (typeof t.sizeTo === 'function') {
          try {
            t.sizeTo(document.body);
          } catch (e) {
            /* ignore */
          }
        }
      }

      function loadAutoOpenPreference(t) {
        if (typeof UserProfile === 'undefined' || typeof UserProfile.load !== 'function') {
          return Promise.resolve(true);
        }
        return UserProfile.load(t)
          .then(function (profile) {
            if (typeof UserProfile.isAutoOpenCerveauEnabled === 'function') {
              return UserProfile.isAutoOpenCerveauEnabled(profile);
            }
            return !profile || profile.autoOpenCerveau !== false;
          })
          .catch(function () {
            return true;
          });
      }

      function openCerveauModal(t, options) {
        options = options || {};
        return Promise.resolve()
          .then(function () {
            return t.card('id', 'name');
          })
          .then(function (card) {
            var cardId = card && card.id ? card.id : '';
            var cardName = card && typeof card.name === 'string' ? card.name : '';
            var key = storageKey(cardId);
            if (!options.force && cardId) {
              try {
                if (sessionStorage.getItem(key) === '1') {
                  if (window.TpDebug) {
                    TpDebug.log('cardOpen', 'modal.skip', { reason: 'already-open' });
                  }
                  return null;
                }
                sessionStorage.setItem(key, '1');
              } catch (e) {
                /* private mode / blocked storage — still open */
              }
            } else if (options.force && cardId) {
              try {
                sessionStorage.setItem(key, '1');
              } catch (e) {
                /* ignore */
              }
            }
            if (window.TpDebug) {
              TpDebug.log('cardOpen', 'modal.open', { force: !!options.force });
            }
            return t.modal({
              title: appName,
              url: PriorityTrello.pageUrl('./popup.html'),
              args: {
                cardName: cardName,
                openSection: options.openSection || 'overview'
              },
              height: 1100,
              fullscreen: false,
              accentColor: '#22272B',
              callback: function () {
                try {
                  if (cardId) sessionStorage.removeItem(key);
                } catch (e) {
                  /* ignore */
                }
                if (window.TpDebug) TpDebug.log('cardOpen', 'modal.closed');
              },
            });
          });
      }

      function mountOverview(t) {
        if (
          !overviewMount ||
          !window.PriorityUI ||
          typeof PriorityUI.createOverviewField !== 'function' ||
          !window.PriorityTrello ||
          typeof PriorityTrello.getCardOverviewSnapshot !== 'function'
        ) {
          if (overviewLoading) {
            overviewLoading.textContent = '';
            overviewLoading.hidden = true;
          }
          return Promise.resolve();
        }

        if (overviewLoading) {
          overviewLoading.textContent = 'Chargement de l\u2019aper\u00e7u\u2026';
          overviewLoading.hidden = false;
        }

        overviewUi = PriorityUI.createOverviewField({
          el: overviewMount,
          compact: true,
          onJump: function (section) {
            openCerveauModal(t, {
              force: true,
              openSection: section || 'overview'
            }).catch(function (err) {
              if (window.TpDebug) TpDebug.error('cardOpen', 'modal.jump', err);
              else console.error('Cerveau modal open failed', err);
            });
          },
          onLayoutChange: function () {
            resize(t);
          }
        });
        if (overviewLoading) {
          overviewLoading.textContent = 'R\u00e9cup\u00e9ration priorit\u00e9, progr\u00e8s et statut\u2026';
        }

        return PriorityTrello.getCardOverviewSnapshot(t)
          .then(function (snap) {
            if (overviewLoading && overviewLoading.parentNode) {
              overviewLoading.parentNode.removeChild(overviewLoading);
            }
            if (overviewUi && typeof overviewUi.setData === 'function') {
              overviewUi.setData(snap || {});
            }
            resize(t);
          })
          .catch(function (err) {
            if (overviewLoading) {
              overviewLoading.textContent = 'Aper\u00e7u indisponible';
            }
            if (window.TpDebug) TpDebug.error('cardOpen', 'overview.load', err);
            else console.error('Card-back overview load failed', err);
            resize(t);
          });
      }

      PriorityTrello.initIframePage(function (t) {
        if (window.TpDebug && typeof TpDebug.configureFromProfile === 'function') {
          TpDebug.configureFromProfile(t).then(function (on) {
            if (on) TpDebug.log('cardOpen', 'page.init');
          });
        }

        if (openBtn) {
          openBtn.addEventListener('click', function () {
            openCerveauModal(t, { force: true }).catch(function (err) {
              if (window.TpDebug) TpDebug.error('cardOpen', 'modal.force', err);
              else console.error('Cerveau modal open failed', err);
            });
          });
        }

        resize(t);

        var overviewReady = mountOverview(t);

        return loadAutoOpenPreference(t).then(function (autoEnabled) {
          resize(t);
          return overviewReady.then(function () {
            if (!autoEnabled) {
              if (window.TpDebug) {
                TpDebug.log('cardOpen', 'modal.skip', { reason: 'pref-disabled' });
              }
              return null;
            }
            return openCerveauModal(t).then(
              function () {
                resize(t);
              },
              function (err) {
                if (window.TpDebug) TpDebug.error('cardOpen', 'modal.auto', err);
                else console.error('Cerveau auto-open failed', err);
                resize(t);
              }
            );
          });
        });
      });
    })();
  </script>
</body>
</html>
