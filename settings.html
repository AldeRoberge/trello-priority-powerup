<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Priority Settings</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./version.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e8e8f0;
      padding: 14px;
    }

    h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.45;
      margin-bottom: 12px;
    }

    .priority-row {
      display: grid;
      grid-template-columns: 28px 1fr 44px;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .num-badge {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .label-input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #e8e8f0;
      font-size: 13px;
      padding: 6px 10px;
      width: 100%;
      transition: border-color 0.15s;
    }

    .label-input:focus {
      outline: none;
      border-color: rgba(255,255,255,0.35);
    }

    .color-swatch {
      width: 44px;
      height: 32px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border-color 0.15s;
    }

    .color-swatch:hover { border-color: rgba(255,255,255,0.4); }

    .color-swatch input[type="color"] {
      position: absolute;
      inset: -4px;
      width: calc(100% + 8px);
      height: calc(100% + 8px);
      border: none;
      padding: 0;
      cursor: pointer;
      opacity: 0;
    }

    .color-preview {
      width: 100%;
      height: 100%;
      border-radius: 4px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      padding: 9px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-save {
      background: #4F6EF7;
      color: #fff;
    }

    .btn-save:hover { opacity: 0.9; }

    .btn-reset {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .btn-reset:hover { background: rgba(255,255,255,0.12); }

    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      background: #38A169;
      color: #fff;
      padding: 7px 18px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .build-info {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      font-family: ui-monospace, 'Cascadia Code', 'Segoe UI Mono', monospace;
    }

    .guide-link {
      display: inline-block;
      margin-top: 8px;
      padding: 0;
      border: none;
      background: none;
      color: rgba(143, 163, 255, 0.85);
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .guide-link:hover { color: #a8b8ff; }
  </style>
</head>
<body>
  <h3>Customise Priority Levels</h3>
  <div id="rows"></div>
  <div class="actions">
    <button class="btn btn-reset" id="resetBtn">Reset defaults</button>
    <button class="btn btn-save" id="saveBtn">Save changes</button>
  </div>
  <div class="toast" id="toast">✓ Saved!</div>
  <div class="build-info" id="buildInfo">Build: loading…</div>
  <button type="button" class="guide-link" id="showGuide">View setup guide</button>

  <script>
    const DEFAULT_PRIORITIES = [
      { id: 1, label: 'Urgent', color: '#E53E3E' },
      { id: 2, label: 'High',   color: '#DD6B20' },
      { id: 3, label: 'Medium', color: '#D69E2E' },
      { id: 4, label: 'Low',    color: '#38A169' },
      { id: 5, label: 'None',   color: '#718096' },
    ];

    const t = TrelloPowerUp.iframe();
    let priorities = [];
    let buildStampTimer;

    function renderBuildInfo(builtAt) {
      const el = document.getElementById('buildInfo');
      el.textContent = `${BuildVersion.updatedLabel(builtAt)} · ${BuildVersion.formatUtc(builtAt)}`;
    }

    async function loadBuildInfo() {
      const el = document.getElementById('buildInfo');
      try {
        const builtAt = await BuildVersion.fetchBuiltAt(t.signUrl('./build-info.json'));
        renderBuildInfo(builtAt);
        clearInterval(buildStampTimer);
        buildStampTimer = setInterval(() => renderBuildInfo(builtAt), 30_000);
      } catch {
        el.textContent = 'Build: unavailable';
      }
    }

    function renderRows(data) {
      const container = document.getElementById('rows');
      container.innerHTML = '';
      data.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'priority-row';
        row.innerHTML = `
          <div class="num-badge" style="background:${p.color}" data-badge="${i}">P${p.id}</div>
          <input class="label-input" type="text" value="${p.label}" data-label="${i}" maxlength="20" />
          <div class="color-swatch">
            <div class="color-preview" style="background:${p.color}" data-preview="${i}"></div>
            <input type="color" value="${p.color}" data-color="${i}" />
          </div>
        `;
        container.appendChild(row);
      });

      // Wire up color pickers
      container.querySelectorAll('input[type="color"]').forEach(input => {
        input.addEventListener('input', e => {
          const idx = +e.target.dataset.color;
          const hex = e.target.value;
          priorities[idx].color = hex;
          container.querySelector(`[data-preview="${idx}"]`).style.background = hex;
          container.querySelector(`[data-badge="${idx}"]`).style.background = hex;
        });
      });

      // Wire up label inputs
      container.querySelectorAll('.label-input').forEach(input => {
        input.addEventListener('input', e => {
          const idx = +e.target.dataset.label;
          priorities[idx].label = e.target.value;
        });
      });
    }

    async function load() {
      priorities = await t.get('board', 'shared', 'priorities') || JSON.parse(JSON.stringify(DEFAULT_PRIORITIES));
      renderRows(priorities);
      loadBuildInfo();
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      await t.set('board', 'shared', 'priorities', priorities);
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      priorities = JSON.parse(JSON.stringify(DEFAULT_PRIORITIES));
      renderRows(priorities);
    });

    document.getElementById('showGuide').addEventListener('click', () => {
      t.modal({
        title: 'Card Priorities',
        url: './welcome.html',
        height: 420,
        fullscreen: false,
        accentColor: '#4F6EF7',
      });
    });

    load();
  </script>
</body>
</html>
