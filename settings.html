<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Priority Settings</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./version.js"></script>
  <link rel="stylesheet" href="./trello-theme.css" />
</head>
<body class="tp-page">
  <h3 class="tp-heading">Customise priority levels</h3>
  <div id="rows"></div>
  <div class="tp-actions">
    <button class="tp-btn tp-btn--secondary" type="button" id="resetBtn">Reset defaults</button>
    <button class="tp-btn tp-btn--primary" type="button" id="saveBtn">Save</button>
  </div>
  <div class="tp-toast" id="toast">Saved</div>
  <div class="tp-build-info" id="buildInfo">Build: loading…</div>
  <button type="button" class="tp-link" id="showGuide">View setup guide</button>

  <script>
    const DEFAULT_PRIORITIES = [
      { id: 1, label: 'Urgent', color: '#E53E3E' },
      { id: 2, label: 'High',   color: '#DD6B20' },
      { id: 3, label: 'Medium', color: '#D69E2E' },
      { id: 4, label: 'Low',    color: '#38A169' },
      { id: 5, label: 'None',   color: '#718096' },
    ];

    const t = TrelloPowerUp.iframe();
    let priorities = [];
    let buildStampTimer;

    function renderBuildInfo(builtAt) {
      const el = document.getElementById('buildInfo');
      el.textContent = `${BuildVersion.updatedLabel(builtAt)} · ${BuildVersion.formatUtc(builtAt)}`;
    }

    async function loadBuildInfo() {
      const el = document.getElementById('buildInfo');
      try {
        const builtAt = await BuildVersion.fetchBuiltAt(t.signUrl('./build-info.json'));
        renderBuildInfo(builtAt);
        clearInterval(buildStampTimer);
        buildStampTimer = setInterval(() => renderBuildInfo(builtAt), 30_000);
      } catch {
        el.textContent = 'Build: unavailable';
      }
    }

    function renderRows(data) {
      const container = document.getElementById('rows');
      container.innerHTML = '';
      data.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'tp-row';
        row.innerHTML = `
          <div class="tp-num-badge" style="background:${p.color}" data-badge="${i}">P${p.id}</div>
          <input class="tp-input" type="text" value="${p.label}" data-label="${i}" maxlength="20" />
          <div class="tp-color-swatch">
            <div class="tp-color-preview" style="background:${p.color}" data-preview="${i}"></div>
            <input type="color" value="${p.color}" data-color="${i}" />
          </div>
        `;
        container.appendChild(row);
      });

      container.querySelectorAll('input[type="color"]').forEach(input => {
        input.addEventListener('input', e => {
          const idx = +e.target.dataset.color;
          const hex = e.target.value;
          priorities[idx].color = hex;
          container.querySelector(`[data-preview="${idx}"]`).style.background = hex;
          container.querySelector(`[data-badge="${idx}"]`).style.background = hex;
        });
      });

      container.querySelectorAll('.tp-input').forEach(input => {
        input.addEventListener('input', e => {
          const idx = +e.target.dataset.label;
          priorities[idx].label = e.target.value;
        });
      });
    }

    async function load() {
      priorities = await t.get('board', 'shared', 'priorities') || JSON.parse(JSON.stringify(DEFAULT_PRIORITIES));
      renderRows(priorities);
      loadBuildInfo();
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      await t.set('board', 'shared', 'priorities', priorities);
      const toast = document.getElementById('toast');
      toast.classList.add('is-visible');
      setTimeout(() => toast.classList.remove('is-visible'), 2000);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      priorities = JSON.parse(JSON.stringify(DEFAULT_PRIORITIES));
      renderRows(priorities);
    });

    document.getElementById('showGuide').addEventListener('click', () => {
      t.modal({
        title: 'Card Priorities',
        url: './welcome.html',
        height: 420,
        fullscreen: false,
        accentColor: '#0C66E4',
      });
    });

    load();
  </script>
</body>
</html>
