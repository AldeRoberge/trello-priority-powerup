<body class="tp-page tp-page--gantt">
  <div id="ganttMount"></div>
  <script>
    PriorityTrello.initIframePage(function (t) {
      if (window.TpDebug && typeof TpDebug.configureFromProfile === 'function') {
        TpDebug.configureFromProfile(t).then(function (on) {
          if (on) TpDebug.log('gantt', 'page.init');
        });
      }
      var mount = document.getElementById('ganttMount');
      GanttUI.mountGantt(mount, t);
    });
  </script>
</body>
