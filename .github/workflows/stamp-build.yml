name: Stamp build

on:
  push:
    branches: [main]

jobs:
  stamp:
    if: ${{ !contains(github.event.head_commit.message, 'chore: stamp build') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write build timestamp
        run: node scripts/stamp-build.js

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: stamp build"
          file_pattern: build-info.json
