# Deploy via GitHub Actions (upload-pages-artifact + deploy-pages).
# In repo Settings â†’ Pages â†’ Build and deployment, set Source to
# "GitHub Actions" â€” not "Deploy from a branch". Branch-based Pages
# also runs the built-in pages-build-deployment workflow on every push.
name: Deploy static content to Pages

on:
  push:
    branches: [main]
    # Stamp commits only touch build-info.json; ignore so they do not start a second deploy.
    paths-ignore:
      - build-info.json
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# One Pages deployment at a time; cancel superseded Actions runs (after Source = GitHub Actions only).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Write build timestamp
        run: node scripts/stamp-build.js

      - name: Persist build timestamp in repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: stamp build [skip ci]"
          file_pattern: build-info.json

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v5
