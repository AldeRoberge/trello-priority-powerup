name: Deploy static content to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# GitHub Pages allows only one active deployment; cancel superseded runs
# so a newer push is not blocked by an in-progress or stuck deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Write build timestamp
        run: node scripts/stamp-build.js

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v5

      - name: Persist build timestamp in repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: stamp build [skip ci]"
          file_pattern: build-info.json
