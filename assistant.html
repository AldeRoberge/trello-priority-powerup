<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="./components/shared/trello-theme.css?v=section-shell-dark-1" />
  <link rel="stylesheet" href="./components/shared/effects.css" />
  <link rel="stylesheet" href="./components/priority/priority-ui.css?v=section-shell-dark-1" />
  <link rel="stylesheet" href="./components/agent/agent-ui.css?v=debug-below-1" />
  <link rel="stylesheet" href="./components/agent/agent-blocks.css?v=blocks-flush-1" />
  <link rel="stylesheet" href="./components/agent/memory-ui.css" />
  <script src="./components/shared/brand.js"></script>
  <script src="./components/shared/rest-config.js"></script>
  <script src="./components/shared/debug-log.js"></script>
  <script src="./components/shared/effects.js"></script>
  <script src="./components/priority/priority-matrix.js"></script>
  <script src="./components/priority/priority-ui.js"></script>
  <script src="./components/priority/priority-trello.js"></script>
  <script src="./components/shared/tab-autocomplete.js"></script>
  <script src="./components/agent/agent.js"></script>
  <script src="./components/agent/agent-blocks.js?v=blocks-flush-1"></script>
  <script src="./components/agent/agent-memory.js"></script>
  <script src="./components/profile/user-profile.js"></script>
  <script src="./components/people/people.js"></script>
  <script src="./components/agent/memory-ui.js"></script>
  <script src="./components/agent/agent-ui.js"></script>
</head>
<body class="tp-page tp-page--priority tp-page--assistant">
  <div id="assistantMount"></div>
  <script>
    PriorityTrello.initIframePage(function (t) {
      if (window.TpDebug && typeof TpDebug.configureFromProfile === 'function') {
        TpDebug.configureFromProfile(t).then(function (on) {
          if (on) TpDebug.log('assistant', 'page.init');
        });
      }
      var mount = document.getElementById('assistantMount');
      var cachedMemory = null;
      var cachedProfile = null;
      var cachedPeople = null;
      var cachedDigest = '';

      function resize() {
        if (typeof t.sizeTo === 'function') {
          try {
            t.sizeTo(document.body);
          } catch (e) { /* ignore */ }
        }
      }

      return Promise.resolve()
        .then(function () {
          if (typeof AgentMemory === 'undefined') return null;
          return AgentMemory.load(t).then(function (memory) {
            cachedMemory = memory;
            if (window.TpDebug) {
              TpDebug.log('assistant', 'memory.loaded', { hasMemory: !!memory });
            }
            return memory;
          });
        })
        .then(function () {
          if (typeof UserProfile === 'undefined' || !UserProfile.load) return null;
          return UserProfile.load(t).then(function (profile) {
            cachedProfile = profile;
            return profile;
          });
        })
        .then(function () {
          if (typeof People === 'undefined' || !People.load) return null;
          return People.load(t).then(function (directory) {
            cachedPeople = directory;
            return directory;
          });
        })
        .then(function () {
          var providerPromise =
            typeof PriorityAgent !== 'undefined' &&
            typeof PriorityAgent.getProvider === 'function'
              ? PriorityAgent.getProvider(t).catch(function () {
                  return PriorityAgent.normalizeProvider(null);
                })
              : Promise.resolve(null);

          return providerPromise.then(function (provider) {
            var digestPromise =
              typeof PriorityTrello !== 'undefined' &&
              typeof PriorityTrello.scanBoardCards === 'function'
                ? PriorityTrello.scanBoardCards(t, {
                    maxCards: 100,
                    descMax: 40,
                    includePriority: false,
                    sortBy: 'activity'
                  })
                    .then(function (scan) {
                      cachedDigest = (scan && scan.digest) || '';
                      if (window.TpDebug) {
                        TpDebug.log('assistant', 'digest.loaded', {
                          hasDigest: !!cachedDigest,
                          cardCount: (scan && scan.cards && scan.cards.length) || 0
                        });
                      }
                      return cachedDigest;
                    })
                    .catch(function () {
                      cachedDigest = '';
                      return '';
                    })
                : Promise.resolve('');

            var memoryPromise = Promise.resolve(cachedMemory);
            if (
              typeof AgentMemory !== 'undefined' &&
              typeof AgentMemory.scanAndRefresh === 'function' &&
              typeof PriorityAgent !== 'undefined' &&
              PriorityAgent.isConfigured &&
              PriorityAgent.isConfigured(provider)
            ) {
              memoryPromise = AgentMemory.scanAndRefresh(t, provider, {
                force: false
              })
                .then(function (memory) {
                  if (memory) cachedMemory = memory;
                  if (window.TpDebug) {
                    TpDebug.log('assistant', 'memory.scan', {
                      refreshed: !!memory
                    });
                  }
                  return memory;
                })
                .catch(function () {
                  return cachedMemory;
                });
            }

            return Promise.all([digestPromise, memoryPromise]);
          });
        })
        .then(function () {
          var needsAlign =
            typeof AgentMemory !== 'undefined' &&
            AgentMemory.needsOnboarding &&
            AgentMemory.needsOnboarding(cachedMemory);

          function refreshBoardDigest() {
            if (
              typeof PriorityTrello === 'undefined' ||
              typeof PriorityTrello.scanBoardCards !== 'function'
            ) {
              return Promise.resolve(cachedDigest || '');
            }
            return PriorityTrello.scanBoardCards(t, {
              maxCards: 100,
              descMax: 40,
              includePriority: false,
              sortBy: 'activity'
            })
              .then(function (scan) {
                cachedDigest = (scan && scan.digest) || '';
                return cachedDigest;
              })
              .catch(function () {
                return cachedDigest || '';
              });
          }

          AgentUI.mount(mount, {
            t: t,
            scope: 'project',
            standalone: true,
            initiallyOpen: true,
            focusComposer: true,
            openMemoryOnSettings: !!needsAlign,
            getScope: function () {
              return 'project';
            },
            getMemory: function () {
              return cachedMemory;
            },
            getProfile: function () {
              return cachedProfile;
            },
            getPeople: function () {
              return (
                cachedPeople || {
                  version: 1,
                  people: [],
                  updatedAt: ''
                }
              );
            },
            refreshPeople: async function () {
              if (typeof People === 'undefined' || !People.load) {
                return cachedPeople;
              }
              try {
                cachedPeople = await People.load(t, { force: true });
              } catch (e) {
                console.error('People.refresh failed', e);
              }
              return cachedPeople;
            },
            applyPeople: async function (next) {
              if (!next || typeof next !== 'object') return cachedPeople;
              cachedPeople = next;
              if (typeof People !== 'undefined' && typeof People.save === 'function') {
                try {
                  cachedPeople = await People.save(t, next);
                } catch (e) {
                  console.error('People.save failed', e);
                }
              }
              return cachedPeople;
            },
            getBoardDigest: function () {
              return cachedDigest || '';
            },
            refreshBoardDigest: refreshBoardDigest,
            onMemoryUpdate: function (next) {
              cachedMemory = next;
            },
            onLayoutChange: resize,
            playEffect: function (name, opts) {
              if (
                window.CelebrationEffects &&
                typeof CelebrationEffects.play === 'function'
              ) {
                return CelebrationEffects.play(name, opts || {});
              }
              return { ok: false, error: 'CelebrationEffects indisponible' };
            }
          });
          resize();
        });
    }).catch(function (err) {
      console.error('assistant init failed', err);
    });
  </script>
</body>
</html>
