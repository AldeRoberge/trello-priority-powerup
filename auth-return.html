<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autorisation</title>
  <script src="./components/shared/brand.js"></script>
  <script src="./components/shared/debug-log.js"></script>
  <link rel="icon" type="image/png" href="./assets/icon.png" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 2rem;
      color: #172b4d;
    }
  </style>
</head>
<body>
  <p id="msg">Autorisation en cours…</p>
  <script>
    (function () {
      var brand = window.PriorityBrand;
      var appName =
        brand && typeof brand.getAppName === 'function' ? brand.getAppName() : 'Trello Cerveau';
      document.title = 'Autorisation ' + appName;

      var msg = document.getElementById('msg');
      var hash = window.location.hash || '';
      var search = window.location.search || '';
      var denied = /(?:[#&?]error=)/.test(hash) || /(?:[#&?]error=)/.test(search);
      var match =
        /(?:[#&?]token=)([^&]*)/.exec(hash) ||
        /(?:[#&?]token=)([^&]*)/.exec(search);
      var token = match && match[1] ? decodeURIComponent(match[1]) : '';

      try {
        if (token && window.opener && typeof window.opener.authorize === 'function') {
          window.opener.authorize(token);
          if (window.TpDebug) TpDebug.log('authReturn', 'token.delivered');
          if (msg) msg.textContent = 'Autorisation réussie. Cette fenêtre va se fermer.';
        } else if (denied || !token) {
          if (window.TpDebug) {
            TpDebug.log('authReturn', 'token.missing', { denied: !!denied });
          }
          if (msg) {
            msg.textContent =
              'Autorisation annulée. Vous pouvez fermer cette fenêtre.';
          }
        } else if (msg) {
          if (window.TpDebug) TpDebug.warn('authReturn', 'opener.missing');
          msg.textContent =
            'Impossible de renvoyer le jeton à ' +
            appName +
            '. Fermez cette fenêtre et réessayez.';
        }
      } catch (err) {
        if (window.TpDebug) TpDebug.error('authReturn', 'callback', err);
        else console.error('Auth return failed', err);
        if (msg) {
          msg.textContent =
            'Erreur lors de l’autorisation. Fermez cette fenêtre et réessayez.';
        }
      }

      setTimeout(function () {
        try {
          window.close();
        } catch (closeErr) {
          /* ignore */
        }
      }, denied || !token ? 800 : 400);
    })();
  </script>
</body>
</html>
