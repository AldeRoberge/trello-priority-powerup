<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Définir le progrès</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./components/shared/brand.js"></script>
  <script src="./components/shared/rest-config.js"></script>
  <script src="./components/shared/debug-log.js"></script>
  <script src="./components/priority/priority-trello.js"></script>
</head>
<body class="tp-page">
  <p class="tp-subtitle" style="margin:16px;max-width:28rem;">
    Le progr&egrave;s s&rsquo;ouvre dans l&rsquo;&eacute;diteur de priorit&eacute;
    (section <strong>Progr&egrave;s</strong>). Utilisez le badge
    &laquo;&nbsp;D&eacute;finir le progr&egrave;s&nbsp;&raquo; sur la carte.
  </p>
  <script>
    // Legacy URL — progress UI lives in popup.html (openSection: 'progress').
    // Primary entry is index.html → openPriorityPopup({ openSection: 'progress' }).
    try {
      if (window.TrelloPowerUp && typeof TrelloPowerUp.iframe === 'function') {
        var t = TrelloPowerUp.iframe(
          (window.PriorityTrello && PriorityTrello.restClientOptions && PriorityTrello.restClientOptions()) || {}
        );
        if (t && typeof t.render === 'function') t.render(function () {});
        if (t && typeof t.sizeTo === 'function') t.sizeTo(document.body);
      }
    } catch (err) {
      console.error('Completion legacy page init failed', err);
    }
  </script>
</body>
</html>
