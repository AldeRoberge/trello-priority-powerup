<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Définir l’avancement</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <link rel="stylesheet" href="./trello-theme.css" />
  <link rel="stylesheet" href="./priority-ui.css" />
  <script src="./rest-config.js"></script>
  <script src="./priority-trello.js"></script>
  <script src="./completion-trello.js"></script>
  <script src="./completion-ui.js"></script>
</head>
<body class="tp-page tp-page--completion">
  <div id="completionMount"></div>

  <script>
    CompletionTrello.initIframePage(function (t) {
      var mountEl = document.getElementById('completionMount');
      var ui = null;
      var latestData = null;
      var saveChain = Promise.resolve();

      function saveData(data) {
        latestData = data;
        saveChain = saveChain
          .then(function () {
            return CompletionTrello.saveCardCompletion(t, data);
          })
          .catch(function (err) {
            console.error('Completion save failed', err);
          });
        return saveChain;
      }

      function resizePopup() {
        if (typeof t.sizeTo === 'function') {
          t.sizeTo(document.body);
        }
      }

      async function init() {
        var stored = await CompletionTrello.getCardCompletion(t);

        ui = CompletionUI.mountCompletionUI(mountEl, {
          data: stored,
          onChange: function (data) {
            saveData(data);
          },
          onResize: resizePopup,
        });

        if (typeof t.arg === 'function') {
          var argName = t.arg('cardName');
          if (argName) ui.setCardName(argName);
        }

        var cardNamePromise = CompletionTrello.getCardName(t).then(
          function (resolved) {
            if (resolved) ui.setCardName(resolved);
          },
          function () {
            ui.setCardName(null);
          }
        );

        latestData = ui.getData();
        await cardNamePromise;
        ui.focusAddInput();
        window.scrollTo(0, 0);
        resizePopup();
      }

      window.addEventListener('pagehide', function () {
        if (latestData) {
          saveData(latestData);
        }
      });

      return init();
    }).catch(function (err) {
      console.error('Completion popup init failed', err);
    });
  </script>
</body>
</html>
