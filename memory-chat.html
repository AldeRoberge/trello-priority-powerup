<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mémoire assistant</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./components/shared/brand.js"></script>
  <script src="./components/shared/rest-config.js"></script>
  <script src="./components/shared/debug-log.js"></script>
  <script src="./components/priority/priority-trello.js"></script>
  <script src="./components/agent/agent.js"></script>
  <script src="./components/agent/agent-memory.js"></script>
  <script src="./components/shared/tab-autocomplete.js"></script>
  <script src="./components/agent/memory-ui.js"></script>
  <link rel="stylesheet" href="./components/shared/trello-theme.css" />
  <link rel="stylesheet" href="./components/agent/agent-ui.css" />
  <link rel="stylesheet" href="./components/agent/memory-ui.css" />
</head>
<body class="tp-page memory-page memory-page--bar">
  <div id="memoryMount"></div>
  <script>
    PriorityTrello.initIframePage(function (t) {
      if (window.TpDebug && typeof TpDebug.configureFromProfile === 'function') {
        TpDebug.configureFromProfile(t).then(function (on) {
          if (on) TpDebug.log('memoryChat', 'page.init', { mode: 'ongoing' });
        });
      }
      var mount = document.getElementById('memoryMount');
      function resize() {
        if (typeof t.sizeTo === 'function') t.sizeTo(document.body);
      }
      MemoryUI.mount(mount, {
        t: t,
        mode: 'ongoing',
        showSkip: false,
        showSummary: true,
        onLayoutChange: resize,
        onComplete: function () {
          if (window.TpDebug) TpDebug.log('memoryChat', 'complete');
          if (typeof t.closeBoardBar === 'function') t.closeBoardBar();
          else if (typeof t.closeModal === 'function') t.closeModal();
        }
      });
      resize();
    }).catch(function (err) {
      if (window.TpDebug) TpDebug.error('memoryChat', 'init', err);
      else console.error('memory-chat init failed', err);
    });
  </script>
</body>
</html>
