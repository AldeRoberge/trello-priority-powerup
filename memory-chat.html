<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mémoire assistant</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./js/rest-config.js"></script>
  <script src="./js/priority-trello.js"></script>
  <script src="./js/agent.js"></script>
  <script src="./js/agent-memory.js"></script>
  <script src="./js/memory-ui.js"></script>
  <link rel="stylesheet" href="./css/trello-theme.css" />
  <link rel="stylesheet" href="./css/agent-ui.css" />
  <link rel="stylesheet" href="./css/memory-ui.css" />
</head>
<body class="tp-page memory-page memory-page--bar">
  <div id="memoryMount"></div>
  <script>
    PriorityTrello.initIframePage(function (t) {
      var mount = document.getElementById('memoryMount');
      function resize() {
        if (typeof t.sizeTo === 'function') t.sizeTo(document.body);
      }
      MemoryUI.mount(mount, {
        t: t,
        mode: 'ongoing',
        showSkip: false,
        showSummary: true,
        onLayoutChange: resize,
        onComplete: function () {
          if (typeof t.closeBoardBar === 'function') t.closeBoardBar();
          else if (typeof t.closeModal === 'function') t.closeModal();
        }
      });
      resize();
    }).catch(function (err) {
      console.error('memory-chat init failed', err);
    });
  </script>
</body>
</html>
