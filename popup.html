        });
    }

    function getBlockedSubtasks() {
      if (completionUi && typeof completionUi.getData === 'function') {
        var live = completionUi.getData();
        return (live && live.items) || [];
      }
      if (latestCompletion && latestCompletion.items) return latestCompletion.items;
      return [];
    }

    function syncBlockedSubtasks() {
      if (variant && typeof variant.refreshBlockedSubtasks === 'function') {
        variant.refreshBlockedSubtasks();
      }
    }

    function progressSummaryText() {
      if (!completionUi || typeof completionUi.getData !== 'function') return '';
      var progress = CompletionTrello.computeCardProgress(completionUi.getData());
      if (!progress) return '';
      if (progress.percent <= 0) return 'En attente';
      if (progress.hasItems) {
        var remaining = progress.totalCount - progress.doneCount;
        if (remaining <= 0) return 'Complété';
        if (remaining === 1) return 'Une tâche restante';
        if (remaining === 2) return 'Deux tâches restantes';
        return remaining + ' tâches restantes';
      }
      // Card-level progress only (no subtasks): keep percent.
      return progress.percent + '\u00a0%';
    }

    function progressIsFullyComplete(data) {
      if (!data || typeof CompletionTrello === 'undefined') return false;
      var progress = CompletionTrello.computeCardProgress(data);
      return !!(progress && progress.percent >= 100);
    }

    function syncDueBlockedForProgress(data) {
      if (!variant || typeof variant.setProgressCompleteLock !== 'function') return;
      variant.setProgressCompleteLock(progressIsFullyComplete(data));
    }

    /** Prevent Progrès ↔ Bloqué sync feedback loops. */
    var syncingBlockedBridge = false;

    function blockedLinksFingerprint(links) {
      if (!Array.isArray(links) || !links.length) return '';
      return links
        .map(function (link) {
          return link && link.id ? String(link.id) : '';
        })
        .filter(Boolean)
        .sort()
        .join(',');
    }

    function blockedReasonsFingerprint(reasons) {
      if (!Array.isArray(reasons) || !reasons.length) return '';
      return reasons
        .map(function (r) {
          return typeof r === 'string' ? reasonKeyFr(r) : '';
        })
        .filter(Boolean)
        .sort()
        .join('|');
    }

    /** True when a Motif string is clearly about this subtask title. */
    function blockedReasonMatchesTask(reason, taskName) {
      var r = reasonKeyFr(reason);
      var name = String(taskName || '').trim();
      if (!r || !name) return false;
      var nameKey = reasonKeyFr(name);
      if (r === nameKey) return true;
      var lower = name.charAt(0).toLocaleLowerCase('fr-FR') + name.slice(1);
      var lowerKey = reasonKeyFr(lower);
      if (r === reasonKeyFr('En attente de (' + name + ')')) return true;
      if (r === reasonKeyFr('En attente de (' + lower + ')')) return true;
      if (r === reasonKeyFr('En attente de ' + lower)) return true;
      if (r === reasonKeyFr("En attente d'" + lower)) return true;
      if (r === reasonKeyFr('En attente de ' + name)) return true;
      // "En attente de manger un hot-dog" ↔ subtask "Manger un hot-dog"
      var rest = r.replace(/^en\s+attente\s+(de|d\')\s*/i, '').trim();
      if (rest === lowerKey || rest === nameKey) return true;
      rest = rest.replace(/^\(|\)$/g, '').trim();
      if (rest === lowerKey || rest === nameKey) return true;
      return false;
    }

    /**
     * Drop Motif entries / links for subtasks that are no longer blocked
     * (completed, deleted, or unblocked).
     */
    function pruneBlockedReasonsForCompletion(state, data) {
      var WAITING_OTHER =
        (window.PriorityUI && PriorityUI.BLOCKED_REASON_WAITING_OTHER_TASK) ||
        "En attente d'une autre t\u00e2che";
      var items =
        data && Array.isArray(data.items) ? data.items : [];
      var byId = Object.create(null);
      for (var i = 0; i < items.length; i++) {
        if (items[i] && items[i].id) byId[String(items[i].id)] = items[i];
      }

      var prevLinks = Array.isArray(state && state.blockedLinks)
        ? state.blockedLinks
        : [];
      var liveLinks = CompletionTrello.blockedLinksFromCompletion
        ? CompletionTrello.blockedLinksFromCompletion(data)
        : [];
      var liveIds = Object.create(null);
      for (var li = 0; li < liveLinks.length; li++) {
        if (liveLinks[li] && liveLinks[li].id) {
          liveIds[String(liveLinks[li].id)] = true;
        }
      }

      var removedNames = [];
      var seenName = Object.create(null);
      function rememberRemovedName(label) {
        var key = reasonKeyFr(label);
        if (!key || seenName[key]) return;
        seenName[key] = true;
        removedNames.push(String(label).trim());
      }

      for (var p = 0; p < prevLinks.length; p++) {
        var link = prevLinks[p];
        if (!link || !link.id) continue;
        var id = String(link.id);
        if (liveIds[id]) continue;
        var item = byId[id];
        // Gone from blocked set: completed, unblocked, or removed.
        var label =
          (item && item.text) ||
          (typeof link.label === 'string' ? link.label : '') ||
          '';
        if (label) rememberRemovedName(label);
      }

      var reasons = Array.isArray(state && state.blockedReasons)
        ? state.blockedReasons.slice()
        : [];
      if (removedNames.length && reasons.length) {
        reasons = reasons.filter(function (reason) {
          if (typeof reason !== 'string') return false;
          if (reasonKeyFr(reason) === reasonKeyFr(WAITING_OTHER)) {
            return liveLinks.length > 0;
          }
          for (var n = 0; n < removedNames.length; n++) {
            if (blockedReasonMatchesTask(reason, removedNames[n])) {
              return false;
            }
          }
          return true;
        });
      } else if (!liveLinks.length && reasons.length) {
        // No remaining linked blockers: drop the generic waiting-other motif.
        reasons = reasons.filter(function (reason) {
          return reasonKeyFr(reason) !== reasonKeyFr(WAITING_OTHER);
        });
      }

      return {
        blockedLinks: liveLinks,
        blockedReasons: reasons,
      };
    }

    /**
     * For newly blocked Progrès subtasks: seed a humanized Motif immediately
     * (fallback), then polish with a quick AI call → "En attente d'essayer…".
     */
    function humanizeMotifsForNewBlockedLinks(prevLinks, nextLinks, data) {
      var prevIds = Object.create(null);
      var prev = Array.isArray(prevLinks) ? prevLinks : [];
      for (var p = 0; p < prev.length; p++) {
        if (prev[p] && prev[p].id) prevIds[String(prev[p].id)] = true;
      }
      var items =
        data && Array.isArray(data.items) ? data.items : [];
      var byId = Object.create(null);
      for (var i = 0; i < items.length; i++) {
        if (items[i] && items[i].id) byId[String(items[i].id)] = items[i];
      }
      var fresh = [];
      var list = Array.isArray(nextLinks) ? nextLinks : [];
      for (var n = 0; n < list.length; n++) {
        var link = list[n];
        if (!link || !link.id || prevIds[String(link.id)]) continue;
        var item = byId[String(link.id)];
        var taskName =
          (item && item.text) ||
          (typeof link.label === 'string' ? link.label : '') ||
          '';
        taskName = String(taskName || '').trim();
        if (!taskName) continue;
        fresh.push({ id: String(link.id), taskName: taskName });
      }
      if (!fresh.length) return;

      var st0 =
        typeof variant.getState === 'function' ? variant.getState() || {} : {};
      var reasons0 = Array.isArray(st0.blockedReasons)
        ? st0.blockedReasons.slice()
        : [];
      var seeded = false;
      var provisionals = [];
      for (var f = 0; f < fresh.length; f++) {
        var name = fresh[f].taskName;
        var already = false;
        for (var r = 0; r < reasons0.length; r++) {
          if (blockedReasonMatchesTask(reasons0[r], name)) {
            already = true;
            break;
          }
        }
        // Also skip if the item already has Motifs.
        var itemRow = byId[fresh[f].id];
        if (
          itemRow &&
          Array.isArray(itemRow.blockedReasons) &&
          itemRow.blockedReasons.length
        ) {
          already = true;
        }
        if (already) continue;
        var provisional =
          window.PriorityAgent &&
          typeof PriorityAgent.fallbackBlockedReasonText === 'function'
            ? PriorityAgent.fallbackBlockedReasonText(name)
            : window.PriorityUI &&
                typeof PriorityUI.formatBlockedWaitingOnLabel === 'function'
              ? PriorityUI.formatBlockedWaitingOnLabel(name)
              : 'En attente de ' +
                name.charAt(0).toLocaleLowerCase('fr-FR') +
                name.slice(1);
        if (!provisional) continue;
        var pKey = reasonKeyFr(provisional);
        var exists = false;
        for (var e = 0; e < reasons0.length; e++) {
          if (reasonKeyFr(reasons0[e]) === pKey) {
            exists = true;
            break;
          }
        }
        if (!exists) {
          reasons0.push(provisional);
          seeded = true;
        }
        fresh[f].provisional = provisional;
        provisionals.push({
          from: provisional,
          taskName: name,
          id: fresh[f].id
        });
      }
      if (seeded || provisionals.length) {
        // Persist Motifs onto the newly blocked items (completion source of truth).
        var liveComp =
          (completionUi &&
            typeof completionUi.getData === 'function' &&
            completionUi.getData()) ||
          data ||
          latestCompletion ||
          { items: [] };
        var nextComp = CompletionTrello.normalizeCompletionData(liveComp);
        for (var fi = 0; fi < provisionals.length; fi++) {
          var entry = provisionals[fi];
          if (
            entry.id &&
            typeof CompletionTrello.setItemBlockedReasons === 'function'
          ) {
            nextComp = CompletionTrello.setItemBlockedReasons(nextComp, entry.id, [
              entry.from
            ]);
          }
        }
        if (completionUi && typeof completionUi.setData === 'function') {
          latestCompletion = withProgressEnabledFlag(nextComp);
          completionUi.setData(latestCompletion);
          saveCompletion(latestCompletion);
        } else {
          latestCompletion = withProgressEnabledFlag(nextComp);
          saveCompletion(latestCompletion);
        }

        syncingBlockedBridge = true;
        try {
          variant.setState(
            Object.assign({}, st0, {
              enAttente: true,
              blockedReasons: CompletionTrello.aggregateBlockedReasons
                ? CompletionTrello.aggregateBlockedReasons(nextComp)
                : reasons0,
            })
          );
          if (
            typeof statutUi !== 'undefined' &&
            statutUi &&
            typeof statutUi.syncBlockedPanel === 'function'
          ) {
            statutUi.syncBlockedPanel();
          }
          attachBlockedIntoStatut();
        } finally {
          syncingBlockedBridge = false;
        }
      }

      if (
        !window.PriorityAgent ||
        typeof PriorityAgent.getProvider !== 'function' ||
        typeof PriorityAgent.suggestBlockedReasonText !== 'function'
      ) {
        return;
      }
      PriorityAgent.getProvider(t)
        .then(function (provider) {
          return Promise.all(
            provisionals.map(function (entry) {
              return PriorityAgent.suggestBlockedReasonText(
                provider,
                entry.taskName
              ).then(
                function (polished) {
                  return {
                    from: entry.from,
                    to:
                      typeof polished === 'string' && polished.trim()
                        ? polished.trim()
                        : entry.from,
                  };
                },
                function () {
                  return { from: entry.from, to: entry.from };
                }
              );
            })
          );
        })
        .then(function (updates) {
          if (!updates || !updates.length) return;
          for (var u = 0; u < updates.length; u++) {
            if (
              updates[u].to &&
              reasonKeyFr(updates[u].to) !== reasonKeyFr(updates[u].from)
            ) {
              replaceBlockedReasonChip(updates[u].from, updates[u].to);
            }
          }
          if (
            typeof statutUi !== 'undefined' &&
            statutUi &&
            typeof statutUi.syncBlockedPanel === 'function'
          ) {
            statutUi.syncBlockedPanel();
          }
          attachBlockedIntoStatut();
        })
        .catch(function (err) {
          console.error('humanizeMotifsForNewBlockedLinks failed', err);
        });
    }

    /**
     * Progrès blocked → Statut enAttente + blockedLinks + aggregated Motifs.
     * Card is Bloqué iff master or any item is blocked.
     * Entity Motifs (completion) are the source of truth for blockedReasons.
     */
    function syncPriorityFromProgressBlocked(data) {
      if (syncingBlockedBridge) {
        console.debug('[tp-blocked] syncPriorityFromProgressBlocked skipped (bridge busy)');
        return;
      }
      if (!variant || typeof variant.setState !== 'function') return;
      if (typeof CompletionTrello === 'undefined' || !CompletionTrello.hasAnyBlocked) {
        return;
      }
      var hasBlocked = CompletionTrello.hasAnyBlocked(data);
      var st =
        typeof variant.getState === 'function' ? variant.getState() || {} : {};
      var prevLinks = Array.isArray(st.blockedLinks) ? st.blockedLinks : [];
      var pruned = pruneBlockedReasonsForCompletion(st, data);
      var nextLinks = pruned.blockedLinks;
      var nextReasons = CompletionTrello.aggregateBlockedReasons
        ? CompletionTrello.aggregateBlockedReasons(data)
        : pruned.blockedReasons;
      // Keep waiting-other only while linked blockers remain.
      if (!nextLinks.length && nextReasons.length) {
        var WAITING_OTHER =
          (window.PriorityUI && PriorityUI.BLOCKED_REASON_WAITING_OTHER_TASK) ||
          "En attente d'une autre t\u00e2che";
        nextReasons = nextReasons.filter(function (reason) {
          return reasonKeyFr(reason) !== reasonKeyFr(WAITING_OTHER);
        });
      }
      var curEnAttente = !!st.enAttente;
      var curLinksFp = blockedLinksFingerprint(st.blockedLinks);
      var nextLinksFp = blockedLinksFingerprint(nextLinks);
      var curReasonsFp = blockedReasonsFingerprint(st.blockedReasons);
      var nextReasonsFp = blockedReasonsFingerprint(nextReasons);
      if (
        hasBlocked === curEnAttente &&
        nextLinksFp === curLinksFp &&
        nextReasonsFp === curReasonsFp
      ) {
        return;
      }

      console.debug('[tp-blocked] syncPriorityFromProgressBlocked', {
        hasBlocked: hasBlocked,
        curEnAttente: curEnAttente,
        nextEnAttente: hasBlocked,
        masterBlocked: !!(data && data.blocked),
        blockedItemIds: ((data && data.items) || [])
          .filter(function (it) {
            return it && it.blocked === true;
          })
          .map(function (it) {
            return it.id;
          }),
        linksChanged: nextLinksFp !== curLinksFp,
        reasonsChanged: nextReasonsFp !== curReasonsFp,
      });

      syncingBlockedBridge = true;
      try {
        variant.setState(
          Object.assign({}, st, {
            enAttente: hasBlocked,
            blockedLinks: nextLinks,
            blockedReasons: nextReasons,
          })
        );
        if (
          hasBlocked &&
          typeof statutUi !== 'undefined' &&
          statutUi &&
          typeof statutUi.syncBlockedPanel === 'function'
        ) {
          statutUi.syncBlockedPanel();
        }
        attachBlockedIntoStatut();
      } finally {
        syncingBlockedBridge = false;
      }
      if (hasBlocked) {
        humanizeMotifsForNewBlockedLinks(prevLinks, nextLinks, data);
      }
    }

    function completionHasEntityBlockedReasons(data) {
      var CT = CompletionTrello;
      var next = CT.normalizeCompletionData(data || { items: [] });
      if (
        CT.isMasterBlocked(next) &&
        Array.isArray(next.blockedReasons) &&
        next.blockedReasons.length
      ) {
        return true;
      }
      for (var i = 0; i < next.items.length; i++) {
        var item = next.items[i];
        if (
          CT.isItemBlocked(item) &&
          Array.isArray(item.blockedReasons) &&
          item.blockedReasons.length
        ) {
          return true;
        }
      }
      return false;
    }

    /**
     * Write card-level Motifs onto completion entities (seed / sole blocker).
     */
    function applyPriorityReasonsToCompletion(data, reasons) {
      var CT = CompletionTrello;
      var next = CT.normalizeCompletionData(data || { items: [] });
      var list = CT.normalizeBlockedReasons
        ? CT.normalizeBlockedReasons(reasons)
        : Array.isArray(reasons)
          ? reasons.slice()
          : [];
      if (completionHasEntityBlockedReasons(next)) {
        return next;
      }
      if (CT.seedBlockedReasonsFromPriority) {
        return CT.seedBlockedReasonsFromPriority(next, list);
      }
      return next;
    }

    /**
     * When Statut Motif is edited: map onto master (self-blocked), the sole
     * blocked item, or master when several blockers exist.
     */
    function writeStatutReasonsOntoCompletion(data, reasons) {
      var CT = CompletionTrello;
      var next = CT.normalizeCompletionData(data || { items: [] });
      var list = CT.normalizeBlockedReasons
        ? CT.normalizeBlockedReasons(reasons)
        : Array.isArray(reasons)
          ? reasons.slice()
          : [];
      var blockedItems = [];
      for (var i = 0; i < next.items.length; i++) {
        if (CT.isItemBlocked(next.items[i])) blockedItems.push(next.items[i]);
      }
      var masterOnly =
        CT.isMasterBlocked(next) && blockedItems.length === 0;
      var singleItem =
        !CT.isMasterBlocked(next) && blockedItems.length === 1;
      if (masterOnly || (!blockedItems.length && !CT.isMasterBlocked(next))) {
        // Statut Motif on a status/no-subtask block — keep status origin unless user.
        var origin =
          CT.isMasterBlockedByUser && CT.isMasterBlockedByUser(next)
            ? 'user'
            : 'status';
        return CT.setMasterBlockedReasons(next, list, { origin: origin });
      }
      if (singleItem) {
        return CT.setItemBlockedReasons(next, blockedItems[0].id, list);
      }
      // Multiple blockers: Statut list replaces per-item Motifs on master.
      next.items = next.items.map(function (item) {
        if (!item.blockedReasons) return item;
        var copy = Object.assign({}, item);
        delete copy.blockedReasons;
        return copy;
      });
      var multiOrigin =
        CT.isMasterBlockedByUser && CT.isMasterBlockedByUser(next)
          ? 'user'
          : 'status';
      return CT.setMasterBlockedReasons(next, list, { origin: multiOrigin });
    }

    /**
     * Apply priority blockedLinks onto matching Progrès items (item.blocked).
     * Returns next completion data (normalized).
     */
    function applyBlockedLinksToCompletion(data, links) {
      var CT = CompletionTrello;
      var next = CT.normalizeCompletionData(data || { items: [] });
      var ids = Object.create(null);
      var list = Array.isArray(links) ? links : [];
      for (var i = 0; i < list.length; i++) {
        var link = list[i];
        if (link && link.id) ids[String(link.id)] = true;
      }
      var linkCount = 0;
      for (var key in ids) {
        if (Object.prototype.hasOwnProperty.call(ids, key)) linkCount++;
      }
      if (!linkCount) return next;

      var known = Object.create(null);
      for (var j = 0; j < next.items.length; j++) {
        known[next.items[j].id] = true;
      }
      for (var id in ids) {
        if (!Object.prototype.hasOwnProperty.call(ids, id)) continue;
        if (!known[id]) continue;
        next = CT.setItemBlocked(next, id, true);
      }
      return CT.normalizeCompletionData(next);
    }

    /**
     * Statut / enAttente → Progrès blocked flags (+ Motif seed / write-back).
     * Prefer marking linked subtasks; only use master.blocked when there are
     * no blockedLinks and nothing is blocked yet.
     */
    function syncProgressFromPriorityBlocked(state) {
      if (syncingBlockedBridge) {
        console.debug('[tp-blocked] syncProgressFromPriorityBlocked skipped (bridge busy)');
        return;
      }
      if (!completionUi || typeof CompletionTrello === 'undefined') return;
      if (!CompletionTrello.hasAnyBlocked) return;
      var enAttente = !!(state && state.enAttente);
      var links = Array.isArray(state && state.blockedLinks)
        ? state.blockedLinks
        : [];
      var priorityReasons = Array.isArray(state && state.blockedReasons)
        ? state.blockedReasons
        : [];
      var live =
        typeof completionUi.getData === 'function'
          ? completionUi.getData()
          : latestCompletion || { items: [] };
      var hasBlocked = CompletionTrello.hasAnyBlocked(live);

      console.debug('[tp-blocked] syncProgressFromPriorityBlocked', {
        enAttente: enAttente,
        hasBlocked: hasBlocked,
        linkCount: links.length,
        masterBlocked: !!(live && live.blocked),
        masterOrigin:
          live && CompletionTrello.masterBlockedOrigin
            ? CompletionTrello.masterBlockedOrigin(live)
            : null,
        willSetMasterBlocked: !!(enAttente && !hasBlocked),
      });

      syncingBlockedBridge = true;
      try {
        if (!enAttente) {
          if (hasBlocked) {
            if (typeof completionUi.clearAllBlocked === 'function') {
              latestCompletion = withProgressEnabledFlag(
                completionUi.clearAllBlocked()
              );
            } else {
              latestCompletion = withProgressEnabledFlag(
                CompletionTrello.clearAllBlocked(live)
              );
              if (typeof completionUi.setData === 'function') {
                completionUi.setData(latestCompletion);
              }
              saveCompletion(latestCompletion);
            }
          }
        } else {
          // Card Bloqué: mirror blockedLinks onto items first.
          var withLinks = applyBlockedLinksToCompletion(live, links);
          // Links/items carry the block — drop a status-origin master flag so the
          // specific subtask shows as blocked. Keep an explicit user-pressed master.
          if (
            links.length &&
            CompletionTrello.hasAnyBlocked(withLinks) &&
            withLinks.blocked &&
            (!CompletionTrello.isMasterBlockedByUser ||
              !CompletionTrello.isMasterBlockedByUser(withLinks))
          ) {
            withLinks = CompletionTrello.setMasterBlocked(withLinks, false);
          }
          var linksApplied =
            JSON.stringify(CompletionTrello.normalizeCompletionData(live)) !==
            JSON.stringify(withLinks);
          if (linksApplied) {
            latestCompletion = withProgressEnabledFlag(withLinks);
            if (typeof completionUi.setData === 'function') {
              completionUi.setData(latestCompletion);
            }
            saveCompletion(latestCompletion);
            hasBlocked = CompletionTrello.hasAnyBlocked(latestCompletion);
          } else {
            hasBlocked = CompletionTrello.hasAnyBlocked(withLinks);
            latestCompletion = withProgressEnabledFlag(withLinks);
          }
          // No linked/item blocked yet → status-origin master is the block source.
          if (!hasBlocked) {
            if (typeof completionUi.setMasterBlocked === 'function') {
              latestCompletion = withProgressEnabledFlag(
                completionUi.setMasterBlocked(true, { origin: 'status' })
              );
            } else {
              latestCompletion = withProgressEnabledFlag(
                CompletionTrello.setMasterBlocked(
                  (completionUi.getData && completionUi.getData()) || live,
                  true,
                  { origin: 'status' }
                )
              );
              if (typeof completionUi.setData === 'function') {
                completionUi.setData(latestCompletion);
              }
              saveCompletion(latestCompletion);
            }
            hasBlocked = true;
          }
          // Motifs: seed legacy card reasons, or write Statut Motif onto entities
          // only when Statut differs from the completion aggregate.
          var afterBlock =
            (completionUi &&
              typeof completionUi.getData === 'function' &&
              completionUi.getData()) ||
            latestCompletion;
          var aggReasons = CompletionTrello.aggregateBlockedReasons
            ? CompletionTrello.aggregateBlockedReasons(afterBlock)
            : [];
          var withReasons = afterBlock;
          if (
            blockedReasonsFingerprint(priorityReasons) !==
            blockedReasonsFingerprint(aggReasons)
          ) {
            if (!completionHasEntityBlockedReasons(afterBlock)) {
              withReasons = applyPriorityReasonsToCompletion(
                afterBlock,
                priorityReasons
              );
            } else {
              withReasons = writeStatutReasonsOntoCompletion(
                afterBlock,
                priorityReasons
              );
            }
          }
          if (
            JSON.stringify(CompletionTrello.normalizeCompletionData(afterBlock)) !==
            JSON.stringify(CompletionTrello.normalizeCompletionData(withReasons))
          ) {
            latestCompletion = withProgressEnabledFlag(withReasons);
            if (typeof completionUi.setData === 'function') {
              completionUi.setData(latestCompletion);
            }
            saveCompletion(latestCompletion);
          }
        }
        if (progressCollapse) progressCollapse.refreshSummary();
        syncBlockedSubtasks();
        syncDueBlockedForProgress(
          (completionUi &&
            typeof completionUi.getData === 'function' &&
            completionUi.getData()) ||
            latestCompletion
        );
      } finally {
        syncingBlockedBridge = false;
      }
    }

    /**
     * After a new Statut motif: AI (or fallback) creates a blocked Progrès subtask.
     */
    function reasonKeyFr(value) {
      return String(value || '')
        .trim()
        .toLocaleLowerCase('fr-FR');
    }

    function looksLikeActionReason(value) {
      var text = String(value || '').trim();
      if (!text) return false;
      if (/^en\s+attente\s+(de|d\')/i.test(text)) return false;
      if (/^bloqu\u00e9\s+\u00e0\s+cause\s+de\s+/i.test(text)) return false;
      return (
        /^[A-Za-z\u00C0-\u024F]+(er|ir|re)\b/i.test(text) ||
        /^(mettre|faire|ouvrir|fermer|manger|obtenir|relancer)\b/i.test(text)
      );
    }

    /** Replace a typed motif chip with the AI-polished "En attente de …" form. */
    function replaceBlockedReasonChip(fromReason, toReason) {
      if (!variant || typeof variant.getState !== 'function') return toReason;
      var from = String(fromReason || '').trim();
      var to = String(toReason || '').trim();
      if (!from || !to || reasonKeyFr(from) === reasonKeyFr(to)) return to || from;
      var st = variant.getState() || {};
      var reasons = Array.isArray(st.blockedReasons) ? st.blockedReasons.slice() : [];
      var replaced = false;
      var next = [];
      var seen = Object.create(null);
      for (var i = 0; i < reasons.length; i++) {
        var r = typeof reasons[i] === 'string' ? reasons[i].trim() : '';
        if (!r) continue;
        if (reasonKeyFr(r) === reasonKeyFr(from)) {
          r = to;
          replaced = true;
        }
        var key = reasonKeyFr(r);
        if (seen[key]) continue;
        seen[key] = true;
        next.push(r);
      }
      if (!replaced && !seen[reasonKeyFr(to)]) next.push(to);
      syncingBlockedBridge = true;
      try {
        variant.setState(
          Object.assign({}, st, {
            enAttente: true,
            blockedReasons: next,
          })
        );
      } finally {
        syncingBlockedBridge = false;
      }
      // Mirror chip rename onto completion entity Motifs.
      if (
        typeof CompletionTrello !== 'undefined' &&
        CompletionTrello.normalizeCompletionData
      ) {
        var live =
          (completionUi &&
            typeof completionUi.getData === 'function' &&
            completionUi.getData()) ||
          latestCompletion ||
          { items: [] };
        var nextComp = CompletionTrello.normalizeCompletionData(live);
        var changed = false;
        if (
          nextComp.blocked &&
          Array.isArray(nextComp.blockedReasons)
        ) {
          var masterNext = nextComp.blockedReasons.map(function (reason) {
            return reasonKeyFr(reason) === reasonKeyFr(from) ? to : reason;
          });
          if (masterNext.join('\0') !== nextComp.blockedReasons.join('\0')) {
            nextComp = CompletionTrello.setMasterBlockedReasons(nextComp, masterNext);
            changed = true;
          }
        }
        for (var ii = 0; ii < nextComp.items.length; ii++) {
          var it = nextComp.items[ii];
          if (!CompletionTrello.isItemBlocked(it) || !it.blockedReasons) continue;
          var itemNext = it.blockedReasons.map(function (reason) {
            return reasonKeyFr(reason) === reasonKeyFr(from) ? to : reason;
          });
          if (itemNext.join('\0') !== it.blockedReasons.join('\0')) {
            nextComp = CompletionTrello.setItemBlockedReasons(
              nextComp,
              it.id,
              itemNext
            );
            changed = true;
          }
        }
        if (changed) {
          latestCompletion = withProgressEnabledFlag(nextComp);
          if (completionUi && typeof completionUi.setData === 'function') {
            completionUi.setData(latestCompletion);
          }
          saveCompletion(latestCompletion);
        }
      }
      return to;
    }

    /**
     * Motif commit: polish to a single "En attente de …" cause, then create
     * an actionable blocked Progrès subtask (not a second motif chip).
     */
    function createBlockedSubtaskFromReason(reason) {
      var text = typeof reason === 'string' ? reason.trim() : '';
      if (!text) return Promise.resolve(null);
      if (typeof CompletionTrello === 'undefined') return Promise.resolve(null);

      function titleMatches(itemText, candidate) {
        var a = String(itemText || '')
          .trim()
          .toLocaleLowerCase('fr-FR');
        var b = String(candidate || '')
          .trim()
          .toLocaleLowerCase('fr-FR');
        return !!a && !!b && (a === b || a.indexOf(b) !== -1 || b.indexOf(a) !== -1);
      }

      function findExistingMatch(items, title, reasonText) {
        for (var i = 0; i < (items || []).length; i++) {
          var item = items[i];
          if (!item || item.done) continue;
          if (titleMatches(item.text, title) || titleMatches(item.text, reasonText)) {
            return item;
          }
        }
        return null;
      }

      function applyBlockedItem(title) {
        var live =
          (completionUi &&
            typeof completionUi.getData === 'function' &&
            completionUi.getData()) ||
          latestCompletion ||
          { items: [] };
        var existing = findExistingMatch(live.items, title, text);
        if (existing) {
          if (!CompletionTrello.isItemBlocked(existing)) {
            if (completionUi && typeof completionUi.setItemBlocked === 'function') {
              latestCompletion = withProgressEnabledFlag(
                completionUi.setItemBlocked(existing.id, true)
              );
            } else {
              latestCompletion = withProgressEnabledFlag(
                CompletionTrello.setItemBlocked(live, existing.id, true)
              );
              if (completionUi && typeof completionUi.setData === 'function') {
                completionUi.setData(latestCompletion);
              }
              saveCompletion(latestCompletion);
            }
          }
          syncPriorityFromProgressBlocked(
            (completionUi &&
              typeof completionUi.getData === 'function' &&
              completionUi.getData()) ||
              latestCompletion
          );
          return existing;
        }

        var item = null;
        if (completionUi && typeof completionUi.addItem === 'function') {
          item = completionUi.addItem(title, { blocked: true });
        } else {
          var next = Object.assign({}, live, {
            items: (live.items || []).concat([
              {
                id: CompletionTrello.generateId(),
                text: title,
                progress: 0,
                blocked: true,
              },
            ]),
          });
          latestCompletion = withProgressEnabledFlag(
            CompletionTrello.normalizeCompletionData(next)
          );
          if (completionUi && typeof completionUi.setData === 'function') {
            completionUi.setData(latestCompletion);
          }
          saveCompletion(latestCompletion);
          item = latestCompletion.items[latestCompletion.items.length - 1] || null;
        }
        if (progressCollapse) progressCollapse.refreshSummary();
        syncBlockedSubtasks();
        syncPriorityFromProgressBlocked(
          (completionUi &&
            typeof completionUi.getData === 'function' &&
            completionUi.getData()) ||
            latestCompletion
        );
        resizePopup();
        return item;
      }

      function resolveSubtaskTitle(polishedReason, suggestedAction) {
        if (typeof suggestedAction === 'string' && suggestedAction.trim()) {
          return suggestedAction.trim();
        }
        if (looksLikeActionReason(text)) return text;
        if (
          window.PriorityAgent &&
          typeof PriorityAgent.fallbackUnblockSubtaskText === 'function'
        ) {
          return PriorityAgent.fallbackUnblockSubtaskText(polishedReason || text);
        }
        return text;
      }

      function polishReasonThenCreate() {
        var polishPromise =
          window.PriorityAgent &&
          typeof PriorityAgent.getProvider === 'function' &&
          typeof PriorityAgent.suggestBlockedReasonText === 'function'
            ? PriorityAgent.getProvider(t)
                .then(function (provider) {
                  return PriorityAgent.suggestBlockedReasonText(provider, text);
                })
                .catch(function () {
                  return null;
                })
            : Promise.resolve(null);

        return polishPromise.then(function (suggestedReason) {
          var polished =
            typeof suggestedReason === 'string' && suggestedReason.trim()
              ? suggestedReason.trim()
              : window.PriorityAgent &&
                  typeof PriorityAgent.fallbackBlockedReasonText === 'function'
                ? PriorityAgent.fallbackBlockedReasonText(text)
                : text;
          if (!polished) polished = text;
          replaceBlockedReasonChip(text, polished);

          var actionPromise =
            window.PriorityAgent &&
            typeof PriorityAgent.suggestUnblockSubtaskText === 'function' &&
            typeof PriorityAgent.getProvider === 'function'
              ? PriorityAgent.getProvider(t)
                  .then(function (provider) {
                    return PriorityAgent.suggestUnblockSubtaskText(
                      provider,
                      polished
                    );
                  })
                  .catch(function () {
                    return null;
                  })
              : Promise.resolve(null);

          return actionPromise.then(function (suggestedAction) {
            var title = resolveSubtaskTitle(polished, suggestedAction);
            if (!title) title = text;
            return applyBlockedItem(title);
          });
        });
      }

      return polishReasonThenCreate();
    }

    /** Mirror Terminé → Progrès 100% in the open popup (persistence already done in side effects). */
    function applyCompletionFromStatutComplete(completionData) {
      var CT = CompletionTrello;
      var next =
        completionData ||
        (CT.markFullyComplete
          ? CT.markFullyComplete(
              (completionUi && typeof completionUi.getData === 'function' && completionUi.getData()) ||
                latestCompletion ||
                { items: [] }
            )
          : null);
      if (!next) return;

      latestCompletion = withProgressEnabledFlag(next);
      if (completionUi && typeof completionUi.setData === 'function') {
        completionUi.setData(latestCompletion);
      }
      var live =
        completionUi && typeof completionUi.getData === 'function'
          ? completionUi.getData()
          : latestCompletion;
      // Persist again with progressEnabled on (statut side effect may have left it unset).
      saveCompletion(live);
      if (progressCollapse) progressCollapse.refreshSummary();
      syncBlockedSubtasks();
      syncDueBlockedForProgress(live);
      if (progressCollapse && !progressCollapse.isEnabled()) {
        setProgressEnabled(true, { expand: true, persist: true });
      } else {
        progressEnabled = true;
      }
    }

    /** Same side effects as clicking a Statut chip (shared by UI + agent). */
    function applyStatutListSelection(listId) {
      if (!window.StatutTrello) {
        return Promise.resolve({ ok: false, reason: 'no-statut' });
      }
      return StatutTrello.selectCardStatut(t, listId).then(function (result) {
        var historyAfter = function (out) {
          if (out && out.ok) {
            return commitHistoryNow('Statut / liste').then(function () {
              return out;
            });
          }
          return out;
        };
        if (result && result.ok && variant && result.sideEffects) {
          var side = result.sideEffects;
          var wasBlockedCat =
            !!(latestStatut && latestStatut.category === 'blocked');
          if (
            (side.enAttenteSet || side.category === 'blocked') &&
            typeof variant.setState === 'function'
          ) {
            if (typeof variant.setProgressCompleteLock === 'function') {
              variant.setProgressCompleteLock(false);
            }
            variant.setState(
              Object.assign({}, variant.getState(), { enAttente: true })
            );
            if (side.progressIncomplete && side.completion) {
              latestCompletion = withProgressEnabledFlag(side.completion);
              if (completionUi && typeof completionUi.setData === 'function') {
                completionUi.setData(latestCompletion);
              }
              var blockedLive =
                completionUi && typeof completionUi.getData === 'function'
                  ? completionUi.getData()
                  : latestCompletion;
              saveCompletion(blockedLive);
              if (progressCollapse) progressCollapse.refreshSummary();
              syncBlockedSubtasks();
              syncDueBlockedForProgress(blockedLive);
              syncDueCompleteFromProgress(blockedLive, { clearSuppress: true });
            }
            // Statut Bloqué with no progress blocked yet → mark master blocked.
            syncProgressFromPriorityBlocked({ enAttente: true });
            resizePopup();
          } else if (
            wasBlockedCat &&
            side.category !== 'blocked' &&
            side.category !== 'completed' &&
            typeof variant.setState === 'function'
          ) {
            // Leaving Bloqué: drop active block (keep motives for next time).
            variant.setState(
              Object.assign({}, variant.getState(), { enAttente: false })
            );
            syncProgressFromPriorityBlocked({ enAttente: false });
            resizePopup();
          }
          if (side.category === 'completed') {
            if (typeof variant.setState === 'function') {
              var cleared = Object.assign({}, variant.getState(), {
                enAttente: false,
                blockedReasons: [],
                blockedLinks: [],
              });
              variant.setState(cleared);
            }
            applyCompletionFromStatutComplete(side.completion);
            if (
              completionUi &&
              typeof completionUi.clearAllBlocked === 'function'
            ) {
              syncingBlockedBridge = true;
              try {
                latestCompletion = withProgressEnabledFlag(
                  completionUi.clearAllBlocked()
                );
              } finally {
                syncingBlockedBridge = false;
              }
            }
            resizePopup();
          } else if (side.dueCompleteCleared) {
            if (typeof variant.setProgressCompleteLock === 'function') {
              variant.setProgressCompleteLock(false);
            }
            // En cours (and similar): side effects may have pulled Progrès off 100%.
            if (
              side.progressIncomplete &&
              side.completion &&
              side.category !== 'blocked'
            ) {
              latestCompletion = withProgressEnabledFlag(side.completion);
              if (completionUi && typeof completionUi.setData === 'function') {
                completionUi.setData(latestCompletion);
              }
              var reopenedLive =
                completionUi && typeof completionUi.getData === 'function'
                  ? completionUi.getData()
                  : latestCompletion;
              saveCompletion(reopenedLive);
              if (progressCollapse) progressCollapse.refreshSummary();
              syncBlockedSubtasks();
              syncDueBlockedForProgress(reopenedLive);
              syncDueCompleteFromProgress(reopenedLive, { clearSuppress: true });
            }
            resizePopup();
          }
        }
        if (result && result.ok) {
          return StatutTrello.getCardStatut(t).then(function (statut) {
            latestStatut = buildLatestStatut(statut, listId);
            appliedStatutListId = latestStatut.listId || null;
            if (statutUi && typeof statutUi.setData === 'function') {
              statutUi.setData({
                listId: latestStatut.listId,
                lists: (statut && statut.lists) || [],
                settings: (statut && statut.settings) || undefined
              });
            } else if (statutUi && typeof statutUi.syncBlockedPanel === 'function') {
              statutUi.syncBlockedPanel();
            }
            return historyAfter(result);
          });
        }
        return historyAfter(result);
      });
    }

    function setProgressEnabled(enabled, options) {
      options = options || {};
      progressEnabled = true;
      if (progressCollapse) {
        var enableOpts = {
          persist: options.persist,
          focusAdd: options.focusAdd
        };
        if (options.preserveCollapse) {
          enableOpts.preserveCollapse = true;
        } else if (options.expand != null) {
          enableOpts.expand = !!options.expand;
        } else if (enabled) {
          enableOpts.expand = true;
        }
        // Progrès cannot be disabled — only expand/collapse.
        progressCollapse.setEnabled(true, enableOpts);
        return;
      }
      progressExpanded = options.expand != null ? !!options.expand : progressExpanded;
    }

    function mountStatutSection(hostEl) {
      if (!window.StatutTrello || !PriorityUI.createStatutField) {
        console.error('Priority popup: StatutTrello / createStatutField unavailable');
        return Promise.resolve();
      }
      if (!hostEl) {
        console.error('Priority popup: Statut mount requires Progrès body');
        return Promise.resolve();
      }

      // Nested under Progrès (list chips + Bloqué motif above completion UI).
      statutSection = hostEl;
      statutSection.className = 'statut-in-progress-mount';

      return Promise.all([
        StatutTrello.getCardStatut(t),
        PriorityTrello.isRestAuthorized
          ? PriorityTrello.isRestAuthorized(t)
          : Promise.resolve(false),
      ])
        .then(function (results) {
          var statut = results[0] || {};
          var authorized = !!results[1];
          var hasRest =
            PriorityTrello.restClientOptions && !!PriorityTrello.restClientOptions();
          var authReason = !hasRest
            ? 'no-app-key'
            : authorized
              ? ''
              : 'not-authorized';

          statutUi = PriorityUI.createStatutField({
            el: statutSection,
            embedded: true,
            listId: statut.listId,
            lists: statut.lists || [],
            settings: statut.settings,
            authReason: authReason,
            needsAuth: authReason === 'not-authorized',
            enabled: true,
            onLayoutChange: resizePopup,
            onAuthorize: function () {
              return PriorityTrello.authorizeRestForAutoSort(t);
            },
            onOpenSettings: function () {
              // Popup width is fixed (narrow) by Trello; modal is wide enough for statut mapping.
              return t
                .modal({
                  title: 'Paramètres de priorité',
                  url: PriorityTrello.pageUrl('./settings.html'),
                  height: 720,
                  fullscreen: false,
                  accentColor: '#22272B',
                })
                .then(function () {
                  return StatutTrello.getCardStatut(t).then(function (statut) {
                    if (statutUi && typeof statutUi.setData === 'function') {
                      statutUi.setData({
                        listId: statut.listId,
                        lists: statut.lists,
                        settings: statut.settings,
                      });
                    }
                  });
                });
            },
            onSelectList: function (listId) {
              return applyStatutListSelection(listId);
            },
          });
          latestStatut = buildLatestStatut(statut);
          appliedStatutListId = latestStatut.listId || null;
          attachBlockedIntoStatut();
          resizePopup();
        })
        .catch(function (err) {
          console.error('Statut section mount failed', err);
        });
    }

    function spellcheckGoalName(raw) {

    function appendObjectifCrumb(crumb, label, opts) {

    function bindCreateAction(btn, input, createFn) {
      function run() {
        var raw = input.value.trim();
        if (!raw) return;
        btn.disabled = true;
        spellcheckGoalName(raw)
          .then(function (name) {
            return createFn(name);
          })
          .then(function () {
            input.value = '';
            return refreshObjectifData();
          })
          .catch(function (err) {
            console.error('objectif create failed', err);
            window.alert((err && err.message) || 'Création impossible');
          })
          .then(function () {
            btn.disabled = false;
          });

      btn.addEventListener('click', run);
      input.addEventListener('keydown', function (e) {

          e.preventDefault();
          run();

    function renderObjectifBody() {

        appendObjectifSep(crumb);

        appendObjectifSep(crumb);
        appendObjectifCrumb(crumb, hierarchy.project && hierarchy.project.name, {

      if (activeProjects.length || (hierarchy.project && hierarchy.project.retired)) {

    function refreshObjectifData() {
      var GT = window.GoalsTrello;
      if (!GT) return Promise.resolve();
      return Promise.all([
        GT.getCardProjectId(t),
        GT.preloadBoardGoalsContext(t),
      ]).then(function (results) {
        var projectId = results[0];
        var cache = GT.getCachedBoardGoals();
        var hierarchy = projectId
          ? GT.resolveHierarchyFromCache(cache, projectId)
          : { vision: null, mission: null, project: null };
        latestGoals = {
          projectId: projectId,
          hierarchy: hierarchy,
          visions: cache.visions,
          missions: cache.missions,
          projects: cache.projects,
          metrics: cache.metrics,
        };
        appliedGoalsProjectId = projectId || null;
        renderObjectifBody();
        resizePopup();
        return latestGoals;
      });
    }

    function mountObjectifSection(cardEl, initiallyOpen) {
      if (!window.GoalsTrello) {
        console.error('Priority popup: GoalsTrello unavailable');
        return Promise.resolve();
      }
      if (!infoUi || typeof infoUi.getObjectifMount !== 'function') {
        console.error('Priority popup: Information Objectif mount unavailable');
        return Promise.resolve();
      }

      var mount = infoUi.getObjectifMount();
      if (!mount) return Promise.resolve();

      if (typeof infoUi.setObjectifVisible === 'function') {
        infoUi.setObjectifVisible(true);
      }
      objectifSection = mount.closest('.info-row--objectif') || mount;
      objectifUi = { body: mount };

      return refreshObjectifData().then(function () {
        if (initiallyOpen && typeof infoUi.setExpanded === 'function') {
          infoUi.setExpanded(true);
        }
        renderObjectifBody();
        resizePopup();
      });
    }

    function mountProgressSection(cardEl, initiallyOpen, options) {
      options = options || {};
      var shouldFocusAdd = !!initiallyOpen && options.focusAdd !== false;
      var shouldScrollIntoView = !!initiallyOpen && options.scrollIntoView !== false;
      progressPanel = document.createElement('div');
      progressPanel.className = 'variant-progress-section';

      progressField = document.createElement('div');
      progressField.className = 'field field--progress';

      var chrome = PriorityUI.createCollapsibleEnableChrome({
        title: 'Progr\u00e8s',
        bodyId: 'progress-section-body',
        hideEnable: true,
        leadingIcon: 'ti-check',
        iconClass: 'progress-leading-icon',
        titleClass: 'progress-enable-title',
        collapseLabel: 'Replier Progr\u00e8s',
