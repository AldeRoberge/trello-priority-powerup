    aria-live="polite"
    aria-busy="true"
  >

              <div class="tp-popup-boot-skel-chip"></div>

            <div class="tp-popup-boot-skel-row">

            </div>
            <div class="tp-popup-boot-skel-row">
              <div class="tp-popup-boot-skel-chip"></div>
              <div class="tp-popup-boot-skel-track"></div>
            </div>
          </div>

              <span></span><span></span><span></span>

            <div class="tp-popup-boot-skel-line is-label"></div>

          </div>
          <div class="tp-popup-boot-skel-card is-compact">

      <div
        class="tp-popup-boot-bar"
        id="popupBootBarTrack"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"

        class="cerveau-splitter"

        role="separator"
        aria-orientation="vertical"
        aria-label="Redimensionner l\u2019assistant"

  <div class="tp-build-info tp-popup-build-info" id="buildInfo" hidden></div>

  <script>
    // Visible before the Power-Up handshake so nested/broken hosts are not a blank spin.
    (function earlyBootWatch() {
      var el = document.getElementById('popupBootMsg');
      if (!el) return;
      setTimeout(function () {
        if (!document.body || !document.body.classList.contains('is-booting')) return;
        if (el.getAttribute('data-boot-alive') === '1') return;
        el.textContent = 'Connexion \u00e0 Trello\u2026';
      }, 2500);
      setTimeout(function () {
        if (!document.body || !document.body.classList.contains('is-booting')) return;
        if (el.getAttribute('data-boot-alive') === '1') return;
        el.textContent =
          'Toujours en attente de Trello. Fermez et rouvrez la carte depuis le Gantt.';
        document.body.classList.add('is-boot-error');
        var boot = document.getElementById('popupBoot');
        if (boot) boot.classList.add('is-error');
      }, 12000);
    })();

    PriorityTrello.initIframePage(function (t) {
    var bootMsg = document.getElementById('popupBootMsg');
    if (bootMsg) bootMsg.setAttribute('data-boot-alive', '1');
    if (window.TpDebug && typeof TpDebug.configureFromProfile === 'function') {
      TpDebug.configureFromProfile(t).then(function (on) {
        if (on) TpDebug.log('popup', 'page.init');
      });
    }
    // popup.html is opened as a fullscreen Trello modal (form + Assistant rail).
    document.body.classList.add('is-cerveau-fullscreen');

    var POPUP_BOOT_TIMEOUT_MS = 12000;
    var bootTimer = null;
    var bootSettled = false;
    var bootSteps = [
      { id: 'card', label: 'Carte', detail: 'Lecture de la carte\u2026' },
      { id: 'memory', label: 'M\u00e9moire', detail: 'Chargement de la m\u00e9moire\u2026' },
      { id: 'profile', label: 'Profil', detail: 'Chargement du profil\u2026' },
      { id: 'sync', label: '\u00c9ch\u00e9ances', detail: 'Synchronisation des \u00e9ch\u00e9ances\u2026' },
      { id: 'priority', label: 'Priorit\u00e9', detail: 'Chargement de la priorit\u00e9\u2026' },
      { id: 'info', label: 'Informations', detail: 'Chargement des informations\u2026' },
      { id: 'progress', label: 'Progr\u00e8s', detail: 'Chargement du progr\u00e8s\u2026' },
      { id: 'statut', label: 'Statut', detail: 'Chargement du statut\u2026' },
      { id: 'objectif', label: 'Objectif', detail: 'Chargement de l\u2019objectif\u2026' },
      { id: 'assistant', label: 'Assistant', detail: 'Pr\u00e9paration de l\u2019assistant\u2026' },
      { id: 'history', label: 'Historique', detail: 'Chargement de l\u2019historique\u2026' },
      { id: 'ready', label: 'Pr\u00eat', detail: 'Finalisation\u2026' }
    ];
    var bootStepState = {};
    var bootActiveId = null;

    function bootStepById(id) {
      for (var i = 0; i < bootSteps.length; i++) {
        if (bootSteps[i].id === id) return bootSteps[i];
      }
      return null;
    }

    function renderBootSteps() {
      var list = document.getElementById('popupBootSteps');
      if (!list) return;
      list.innerHTML = '';
      bootSteps.forEach(function (step) {
        var status = bootStepState[step.id] || 'pending';
        var li = document.createElement('li');
        li.className = 'tp-popup-boot-step is-' + status;
        li.setAttribute('data-boot-step', step.id);
        var icon = document.createElement('span');
        icon.className = 'tp-popup-boot-step-icon';
        icon.setAttribute('aria-hidden', 'true');
        if (status === 'done') {
          icon.innerHTML = '<i class="ti ti-check"></i>';
        } else if (status === 'active') {
          icon.innerHTML = '<i class="ti ti-loader-2"></i>';
        } else if (status === 'skipped') {
          icon.innerHTML = '<i class="ti ti-minus"></i>';
        } else {
          icon.innerHTML = '<i class="ti ti-circle"></i>';
        }
        var label = document.createElement('span');
        label.className = 'tp-popup-boot-step-label';
        label.textContent = step.label;
        li.appendChild(icon);
        li.appendChild(label);
        list.appendChild(li);
      });
      updateBootBar();
    }

    function updateBootBar() {
      var fill = document.getElementById('popupBootBar');
      var track = document.getElementById('popupBootBarTrack');
      if (!fill && !track) return;
      var total = bootSteps.length;
      var done = 0;
      bootSteps.forEach(function (step) {
        var status = bootStepState[step.id];
        if (status === 'done' || status === 'skipped') done += 1;
        else if (status === 'active') done += 0.35;
      });
      var pct = total ? Math.max(4, Math.min(100, Math.round((done / total) * 100))) : 0;
      if (fill) fill.style.width = pct + '%';
      if (track) track.setAttribute('aria-valuenow', String(pct));
    }

    function setBootMessage(text, isError) {
      var boot = document.getElementById('popupBoot');
      var msg = document.getElementById('popupBootMsg');
      var icon = boot && boot.querySelector('.tp-popup-boot-spinner .ti');
      var steps = document.getElementById('popupBootSteps');
      var bar = document.getElementById('popupBootBarTrack');
      if (msg) msg.textContent = text || 'Ouverture de Cerveau\u2026';
      if (boot) {
        boot.classList.toggle('is-error', !!isError);
        boot.setAttribute('aria-busy', isError ? 'false' : 'true');
      }
      if (icon) {
        icon.className = isError ? 'ti ti-alert-circle' : 'ti ti-loader-2';
      }
      if (steps) steps.hidden = !!isError;
      if (bar) bar.hidden = !!isError;
    }

    function clearBootTimer() {
      if (bootTimer) {
        clearTimeout(bootTimer);
        bootTimer = null;
      }
    }

    function bumpBootWatch() {
      if (bootSettled) return;
      startBootWatch();
    }

    function beginBootStep(id, detail) {
      if (bootSettled) return;
      var step = bootStepById(id);
      if (bootActiveId && bootActiveId !== id) {
        var prev = bootStepState[bootActiveId];
        if (prev === 'active') bootStepState[bootActiveId] = 'done';
      }
      bootActiveId = id;
      bootStepState[id] = 'active';
      setBootMessage(
        detail || (step && step.detail) || 'Chargement\u2026',
        false
      );
      renderBootSteps();
      bumpBootWatch();
      resizePopup();
    }

    function completeBootStep(id) {
      if (bootSettled) return;
      bootStepState[id] = 'done';
      if (bootActiveId === id) bootActiveId = null;
      renderBootSteps();
      bumpBootWatch();
    }

    function skipBootStep(id) {
      if (bootSettled) return;
      bootStepState[id] = 'skipped';
      if (bootActiveId === id) bootActiveId = null;
      renderBootSteps();
    }

    function finishBoot(options) {
      options = options || {};
      if (bootSettled && !options.forceError) return;
      clearBootTimer();
      if (options.error) {
        bootSettled = true;
        document.body.classList.remove('is-boot-leaving');
        document.body.classList.add('is-booting');
        document.body.classList.add('is-boot-error');
        var errBoot = document.getElementById('popupBoot');
        if (errBoot) {
          errBoot.hidden = false;
          errBoot.classList.remove('is-leaving');
        }
        setBootMessage(options.error, true);
        resizePopup();
        return;
      }
      bootSteps.forEach(function (step) {
        if (bootStepState[step.id] === 'active' || !bootStepState[step.id]) {
          bootStepState[step.id] = 'done';
        }
      });
      bootActiveId = null;
      setBootMessage('Cerveau est pr\u00eat', false);
      renderBootSteps();
      bootSettled = true;
      document.body.classList.remove('is-boot-error');
      var boot = document.getElementById('popupBoot');
      if (!boot) {
        document.body.classList.remove('is-booting');
        resizePopup();
        return;
      }
      boot.setAttribute('aria-busy', 'false');
      // Reveal real UI under the skeleton, then fade the overlay out.
      document.body.classList.add('is-boot-leaving');
      document.body.classList.remove('is-booting');
      resizePopup();
      var settled = false;
      function settleLeave() {
        if (settled) return;
        settled = true;
        document.body.classList.remove('is-boot-leaving');
        boot.hidden = true;
        boot.classList.remove('is-leaving');
        resizePopup();
      }
      requestAnimationFrame(function () {
        boot.classList.add('is-leaving');
      });
      boot.addEventListener('transitionend', function onLeave(ev) {
        if (ev.target !== boot) return;
        boot.removeEventListener('transitionend', onLeave);
        settleLeave();
      });
      setTimeout(settleLeave, 420);
    }

    function startBootWatch() {
      clearBootTimer();
      bootTimer = setTimeout(function () {
        bootTimer = null;
        if (bootSettled) return;
        var active = bootActiveId && bootStepById(bootActiveId);
        var hint = active
          ? 'Toujours en cours\u00a0: ' +
            (active.detail || active.label).replace(/\u2026$/, '') +
            '. Cela prend plus longtemps que pr\u00e9vu\u2026'
          : 'Le chargement prend plus longtemps que pr\u00e9vu\u2026';
        setBootMessage(hint, false);
        document.body.classList.remove('is-boot-error');
        resizePopup();
      }, POPUP_BOOT_TIMEOUT_MS);
    }

    renderBootSteps();

    var buildStampTimer = null;
    function renderBuildInfo(builtAt) {
      var el = document.getElementById('buildInfo');
      if (!el || !window.BuildVersion) return;
      el.hidden = false;
      el.textContent =
        BuildVersion.updatedLabel(builtAt) +
        ' · ' +
        BuildVersion.formatUtc(builtAt);
    }
    function loadBuildInfo() {
      var el = document.getElementById('buildInfo');
      if (!el || !window.BuildVersion || typeof BuildVersion.fetchBuiltAt !== 'function') {
        if (el) {
          el.hidden = false;
          el.textContent = 'Build : indisponible';
        }
        return;
      }
      BuildVersion.fetchBuiltAt(
        t.signUrl('./build-info.json'),
        t.signUrl('./index.html')
      )
        .then(function (builtAt) {
          renderBuildInfo(builtAt);
          if (buildStampTimer) clearInterval(buildStampTimer);
          buildStampTimer = setInterval(function () {
            renderBuildInfo(builtAt);
          }, 30000);
          resizePopup();
        })
        .catch(function () {
          el.hidden = false;
          el.textContent = 'Build : indisponible';
        });
    }

    startBootWatch();
    // Build stamp loads after the UI is ready — do not use it as a boot placeholder.
    const mountEl = document.getElementById('priorityMount');
    let variant = null;
    let completionUi = null;
    let latestState = null;
    let latestCompletion = null;
    let saveChain = Promise.resolve();
    let completionSaveChain = Promise.resolve();
    let progressEnabled = true;
    let progressExpanded = false;
    let progressPanel = null;
    let progressField = null;
    let progressBody = null;
    let progressCollapse = null;
    let progressSummaryEl = null;
    let dueCompleteSyncChain = Promise.resolve();
    let statutUi = null;
    let statutSection = null;
    let latestStatut = null;
    let latestGoals = null;
    let objectifUi = null;
    let objectifSection = null;
    let infoUi = null;
    let infoSection = null;
    let overviewUi = null;
    let overviewSection = null;
    let cardDesc = '';
    let cardNameCache = '';
    let cardNamePromise = Promise.resolve('');
    let cachedMemory = null;
    let cachedCardMemory = null;
    let cachedProfile = null;
    let boardDigestCache = '';
    let latestMembersFp = '';
    let latestLabelsFp = '';
    let latestCardMembers = [];
    let latestBoardMembers = [];
    let latestCardLabels = [];
    let latestBoardLabels = [];
    let currentMemberCache = null;
    var progressSummaryTimer = null;
    var progressSummaryGen = 0;
    var progressSummaryFp = '';
    var progressSummaryAiCache = { fp: '', sentence: '' };
    var PROGRESS_SUMMARY_DEBOUNCE_MS = 800;

    function rememberCardMembers(members) {
      latestCardMembers = Array.isArray(members) ? members.slice() : [];
    }

    function rememberBoardMembers(members) {
      latestBoardMembers = Array.isArray(members) ? members.slice() : [];
    }

    function rememberCardLabels(labels) {
      latestCardLabels = Array.isArray(labels) ? labels.slice() : [];
    }

    function rememberBoardLabels(labels) {
      latestBoardLabels = Array.isArray(labels) ? labels.slice() : [];
    }

    function getOwnershipSnapshot() {
      var members = latestCardMembers || [];
      var you = currentMemberCache;
      var youId = you && you.id != null ? String(you.id) : '';
      var youAssigned =
        !!youId &&
        members.some(function (m) {
          return m && m.id != null && String(m.id) === youId;
        });
      return {
        members: members,
        you: you,
        youAssigned: youAssigned,
        assigneeCount: members.length,
        unassigned: members.length === 0
      };
    }

    /** Read-only agent bridge for status / progress summary (no mutators). */
    function buildStatusBriefBridge() {
      return {
        getScope: function () {
          return 'task';
        },
        getCardName: function () {
          return readCardNameLabel() || cardNameCache || '';
        },
        getCardDesc: function () {
          if (infoUi && typeof infoUi.getDesc === 'function') {
            return infoUi.getDesc() || '';
          }
          return cardDesc || '';
        },
        getFormulaKey: function () {
          if (variant && typeof variant.getFormulaKey === 'function') {
            return variant.getFormulaKey();
          }
          return (
            (PriorityTrello &&
              typeof PriorityTrello.getCachedBoardFormulaKey === 'function' &&
              PriorityTrello.getCachedBoardFormulaKey()) ||
            'baseline'
          );
        },
        getPriorityState: function () {
          return variant && typeof variant.getState === 'function'
            ? variant.getState()
            : latestState || {};
        },
        getCompletion: function () {
          if (completionUi && typeof completionUi.getData === 'function') {
            return completionUi.getData();
          }
          return latestCompletion || { items: [] };
        },
        getStatut: function () {
          return latestStatut;
        },
        getOwnership: getOwnershipSnapshot,
        getProfile: function () {
          return cachedProfile;
        },
        getMemory: function () {
          return cachedMemory;
        },
        getCardMemory: function () {
          return cachedCardMemory;
        }
      };
    }

    function getProgressLinkedTreeByItemId() {
      if (
        completionUi &&
        typeof completionUi.getLinkedTreeByItemId === 'function'
      ) {
        try {
          return completionUi.getLinkedTreeByItemId() || null;
        } catch (e) {
          return null;
        }
      }
      return null;
    }

    function progressSummaryFallbackText() {
      if (!completionUi || typeof completionUi.getData !== 'function') return '';
      var completionSnap = completionUi.getData();
      if (
        window.CompletionTrello &&
        typeof CompletionTrello.hasAnyBlocked === 'function' &&
        CompletionTrello.hasAnyBlocked(completionSnap)
      ) {
        var blockedReasons =
          typeof CompletionTrello.aggregateBlockedReasons === 'function'
            ? CompletionTrello.aggregateBlockedReasons(completionSnap)
            : [];
        if (
          (!blockedReasons || !blockedReasons.length) &&
          variant &&
          typeof variant.getState === 'function'
        ) {
          var blockedState = variant.getState() || {};
          if (
            blockedState.enAttente &&
            Array.isArray(blockedState.blockedReasons)
          ) {
            blockedReasons = blockedState.blockedReasons;
          }
        }
        if (
          window.PriorityUI &&
          typeof PriorityUI.formatBlockedReasonsSummary === 'function'
        ) {
          return PriorityUI.formatBlockedReasonsSummary(blockedReasons, {
            empty: 'Bloqué',
            links:
              variant && typeof variant.getState === 'function'
                ? (variant.getState() || {}).blockedLinks
                : null,
            items:
              completionSnap && Array.isArray(completionSnap.items)
                ? completionSnap.items
                : []
          });
        }
        if (blockedReasons && blockedReasons.length) return blockedReasons[0];
        return 'Bloqué';
      }
      if (
        !window.PriorityAgent ||
        typeof PriorityAgent.buildContext !== 'function' ||
        typeof PriorityAgent.buildProgressSummarySnapshot !== 'function' ||
        typeof PriorityAgent.buildHeuristicProgressSummary !== 'function'

    function scheduleHistoryCommit(hint) {
      if (!historyReady || !cardHistory) return;
      if (cardHistory.isMuted && cardHistory.isMuted()) return;
      if (applyingRemote) return;
      if (historyCommitTimer) clearTimeout(historyCommitTimer);
      historyCommitTimer = setTimeout(function () {
        historyCommitTimer = null;
        commitHistoryNow(hint);
      }, HISTORY_DEBOUNCE_MS);

    function commitHistoryNow(hint) {
      if (!historyReady || !cardHistory) return Promise.resolve(null);
      if (cardHistory.isMuted && cardHistory.isMuted()) return Promise.resolve(null);
      if (applyingRemote) return Promise.resolve(null);
      if (historyCommitTimer) {
        clearTimeout(historyCommitTimer);
        historyCommitTimer = null;

      historyCommitChain = historyCommitChain
        .then(function () {
          return captureHistorySnapshot();
        })
        .then(function (after) {
          if (!historyBaseline) {
            historyBaseline = after;
            return null;
          }
          var entry = cardHistory.record(historyBaseline, after, hint);
          historyBaseline = after;
          if (entry && historyUi && typeof historyUi.refresh === 'function') {
            historyUi.refresh();
          }
          return entry;
        })
        .catch(function (err) {
          console.error('History commit failed', err);
          return null;
        });
      return historyCommitChain;

    function syncIdsViaAddRemove(wantIds, getCurrent, addOne, removeOne) {

        var currentIds = idListFromMembersOrLabels(currentList);
        var wantSet = Object.create(null);
        wantIds.forEach(function (id) {
          wantSet[id] = true;
        });
        var curSet = Object.create(null);
        currentIds.forEach(function (id) {
          curSet[id] = true;
        });
        var chain = Promise.resolve();
        wantIds.forEach(function (id) {
          if (!curSet[id]) {
            chain = chain.then(function () {
              return addOne(id);
            });
          }
        });
        currentIds.forEach(function (id) {
          if (!wantSet[id]) {
            chain = chain.then(function () {
              return removeOne(id);
            });
          }
        });
        return chain;
      });
    }

    function isEditableHistoryTarget(target) {
      if (!target || target === document.body) return false;
      var tag = (target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || tag === 'select') return true;
      if (target.isContentEditable) return true;
      var editable = target.closest && target.closest('[contenteditable="true"]');
      return !!editable;
    }

    function onHistoryKeyDown(ev) {
      var mod = ev.ctrlKey || ev.metaKey;
      if (!mod || !cardHistory) return;
      if (isEditableHistoryTarget(ev.target)) return;
      var key = ev.key || '';
      var isZ = key === 'z' || key === 'Z';
      var isY = key === 'y' || key === 'Y';
      if (isZ && ev.shiftKey) {
        ev.preventDefault();
        runHistoryRedo();
        return;
      }
      if (isY) {
        ev.preventDefault();
        runHistoryRedo();
        return;
      }
      if (isZ) {
        ev.preventDefault();
        runHistoryUndo();
      }
    }

          variant.card &&
          variant.card.querySelector('.variant-chat-section'));
      if (!chatSection) return;

      ) {

    /** Expanded → right rail; collapsed → back with other section summaries. */
    function syncAssistantSplitDock(chatSection, expanded) {
      var rail = document.getElementById('assistantRail');
      var splitter = document.getElementById('cerveauSplitter');
      var shell = document.getElementById('cerveauShell');
      var card = variant && variant.card;
      if (!chatSection) return;

      if (expanded) {
        if (!rail) return;
        rail.appendChild(chatSection);
        rail.hidden = false;
        if (splitter) splitter.hidden = false;
        document.body.classList.add('is-split-assistant');
        bindAssistantSplit(shell, rail, splitter);
        return;
      }

      if (card) {
        var hist = card.querySelector('.variant-historique-section');
        if (hist) {
          if (hist.nextSibling) card.insertBefore(chatSection, hist.nextSibling);
          else card.appendChild(chatSection);
        } else {
          card.appendChild(chatSection);
        }
      }
      if (rail) rail.hidden = true;
      if (splitter) splitter.hidden = true;
      document.body.classList.remove('is-split-assistant');

    var ASSISTANT_RAIL_W_KEY = 'cerveau-assistant-rail-width';
    var ASSISTANT_RAIL_W_MIN = 280;
    var ASSISTANT_RAIL_W_DEFAULT = 380;
    var assistantSplitBound = false;

    function readAssistantRailWidth() {
      try {
        var raw =
          window.localStorage &&
          window.localStorage.getItem(ASSISTANT_RAIL_W_KEY);
        var n = raw != null ? parseInt(raw, 10) : NaN;
        if (isFinite(n) && n >= ASSISTANT_RAIL_W_MIN && n <= 1200) return n;
      } catch (e) {
        /* ignore */
      }
      return ASSISTANT_RAIL_W_DEFAULT;
    }

    function storeAssistantRailWidth(w) {
      try {
        if (window.localStorage) {
          window.localStorage.setItem(ASSISTANT_RAIL_W_KEY, String(Math.round(w)));
        }
      } catch (e) {
        /* ignore */
      }
    }

    function clampAssistantRailWidth(width, shellEl) {
      var shellW =
        (shellEl && shellEl.clientWidth) ||
        (document.documentElement && document.documentElement.clientWidth) ||
        1000;
      // Leave room for the form column + splitter.
      var max = Math.max(ASSISTANT_RAIL_W_MIN, shellW - 360);
      var w = Math.round(Number(width) || ASSISTANT_RAIL_W_DEFAULT);
      return Math.max(ASSISTANT_RAIL_W_MIN, Math.min(max, w));
    }

    function applyAssistantRailWidth(rail, shellEl, width) {
      if (!rail) return ASSISTANT_RAIL_W_DEFAULT;
      // Stacked under the form: drop fixed rail widths so CSS can use 100%.
      if (
        window.matchMedia &&
        window.matchMedia('(max-width: 860px)').matches
      ) {
        rail.style.flex = '';
        rail.style.width = '';
        rail.style.maxWidth = '';
        return ASSISTANT_RAIL_W_DEFAULT;
      }
      var w = clampAssistantRailWidth(width, shellEl);
      rail.style.flex = '0 0 ' + w + 'px';
      rail.style.width = w + 'px';
      rail.style.maxWidth = w + 'px';
      return w;
    }

    function bindAssistantSplit(shell, rail, splitter) {
      if (!shell || !rail || !splitter || assistantSplitBound) {
        applyAssistantRailWidth(rail, shell, readAssistantRailWidth());
        return;
      }
      assistantSplitBound = true;
      var width = applyAssistantRailWidth(rail, shell, readAssistantRailWidth());

      splitter.addEventListener('pointerdown', function (ev) {
        if (ev.button != null && ev.button !== 0) return;
        // Stacked (narrow) layout — ignore drag.
        if (window.matchMedia && window.matchMedia('(max-width: 860px)').matches) {
          return;
        }
        ev.preventDefault();
        var startX = ev.clientX;
        var startW =
          rail.getBoundingClientRect().width || width || ASSISTANT_RAIL_W_DEFAULT;
        splitter.classList.add('is-dragging');
        shell.classList.add('is-resizing');
        try {
          splitter.setPointerCapture(ev.pointerId);
        } catch (e) {
          /* ignore */
        }

        function onMove(moveEv) {
          // Dragging left grows the assistant (right column).
          var delta = startX - moveEv.clientX;
          width = applyAssistantRailWidth(rail, shell, startW + delta);
        }

        function onUp(upEv) {
          try {
            splitter.releasePointerCapture(upEv.pointerId);
          } catch (e) {
            /* ignore */
          }
          splitter.removeEventListener('pointermove', onMove);
          splitter.removeEventListener('pointerup', onUp);
          splitter.removeEventListener('pointercancel', onUp);
          splitter.classList.remove('is-dragging');
          shell.classList.remove('is-resizing');
          width = applyAssistantRailWidth(rail, shell, width);
          storeAssistantRailWidth(width);
        }

        splitter.addEventListener('pointermove', onMove);
        splitter.addEventListener('pointerup', onUp);
        splitter.addEventListener('pointercancel', onUp);
      });

      window.addEventListener('resize', function () {
        if (!document.body.classList.contains('is-split-assistant')) return;
        width = applyAssistantRailWidth(rail, shell, width || readAssistantRailWidth());
      });
    }

    function syncOverview(stateOverride) {

            : variant && typeof variant.getState === 'function'

      try {

    /** Fill missing unlocked subtask estimates via AI (toast-free). */
    function maybeSilentEstimateDurations() {
      if (silentEstimateSuppress) return;
      if (silentEstimateTimer) {
        clearTimeout(silentEstimateTimer);
        silentEstimateTimer = null;
      }
      silentEstimateTimer = setTimeout(function () {
        silentEstimateTimer = null;
        runSilentEstimateDurations();
      }, 400);
    }

    function runSilentEstimateDurations() {
      if (silentEstimateSuppress) return;
      if (silentEstimateBusy) {
        silentEstimateQueued = true;
        return;
      }
      if (!window.PriorityAgent || !window.CompletionTrello) return;
      if (!completionUi || typeof completionUi.getData !== 'function') return;
      if (typeof PriorityAgent.estimateSubtaskDurations !== 'function') return;
      var data = completionUi.getData();
      var needing =
        typeof CompletionTrello.itemsNeedingEstimate === 'function'
          ? CompletionTrello.itemsNeedingEstimate(data)
          : [];
      if (!needing.length) {
        clearSilentEstimateUi();
        return;
      }
      silentEstimateBusy = true;
      silentEstimateQueued = false;
      var needingPayload = needing.map(function (it) {
        return { id: it.id, text: it.text };
      });

      function applyEstimates(estimates) {
        if (!estimates || !estimates.length || !completionUi) return false;
        silentEstimateSuppress = true;
        try {
          if (typeof completionUi.applyItemEstimates === 'function') {
            completionUi.applyItemEstimates(estimates, { lock: false });
          }
          syncInfoRecap();
        } finally {
          silentEstimateSuppress = false;
        }
        return true;
      }

      function localFallback() {
        if (typeof PriorityAgent.heuristicSubtaskEstimates === 'function') {
          return PriorityAgent.heuristicSubtaskEstimates({ items: needingPayload });
        }
        return needingPayload.map(function (it) {
          return {
            id: it.id,
            matchText: it.text,
            estimatedMinutes: 30
          };
        });
      }

      function withTimeout(promise, ms) {
        return new Promise(function (resolve, reject) {
          var settled = false;
          var timer = setTimeout(function () {
            if (settled) return;
            settled = true;
            reject(new Error('Estimation timeout'));
          }, ms);
          Promise.resolve(promise).then(
            function (value) {
              if (settled) return;
              settled = true;
              clearTimeout(timer);
              resolve(value);
            },
            function (err) {
              if (settled) return;
              settled = true;
              clearTimeout(timer);
              reject(err);
            }
          );
        });
      }

      PriorityAgent.getProvider(t)
        .then(function (provider) {
          if (!PriorityAgent.isConfigured(provider)) {
            return applyEstimates(localFallback());
          }
          if (typeof completionUi.setEstimatingItemIds === 'function') {
            completionUi.setEstimatingItemIds(
              needing.map(function (it) {
                return it.id;
              })
            );
          }
          return resolveCardNameForAi()
            .then(function (cardName) {
              return withTimeout(
                PriorityAgent.estimateSubtaskDurations(provider, {
                  cardName: cardName || readCardNameLabel(),
                  cardDesc:
                    (infoUi && typeof infoUi.getDesc === 'function'
                      ? infoUi.getDesc()
                      : '') ||
                    cardDesc ||
                    '',
                  items: needingPayload
                }),
                20000
              );
            })
            .then(function (estimates) {
              if (estimates && estimates.length) {
                applyEstimates(estimates);
                return;
              }
              applyEstimates(localFallback());
            })
            .catch(function (err) {
              console.error('Silent subtask estimate failed', err);
              applyEstimates(localFallback());
            });
        })
        .catch(function (err) {
          console.error('Silent subtask estimate failed', err);
          applyEstimates(localFallback());
        })
        .then(function () {
          silentEstimateBusy = false;
          clearSilentEstimateUi();
          if (silentEstimateQueued) {
            silentEstimateQueued = false;
            maybeSilentEstimateDurations();
          }
        });
    }

    function handleOverviewAction(actionId, payload) {
      if (actionId === 'unblock') {

      if (actionId === 'postpone-tomorrow') {
        overviewPostponeDueTomorrow();
        return;
      }
      if (actionId === 'complete') {
        overviewCompleteCard();
        return;
      }
      if (actionId === 'block') {
        overviewBlockWithReasons(payload && payload.reasons);
        return;
      }
      if (actionId === 'add-subtask') {
        overviewAddSubtask(payload && payload.text);
        return;
      }
      if (actionId === 'toggle-task') {
        overviewToggleTask(payload && payload.id);

    function getBlockedSubtasks() {

    }

    function syncBlockedSubtasks() {
      if (variant && typeof variant.refreshBlockedSubtasks === 'function') {
        variant.refreshBlockedSubtasks();
      }
    }

    function progressIsFullyComplete(data) {
      if (!data || typeof CompletionTrello === 'undefined') return false;
      var progress = CompletionTrello.computeCardProgress(data);
      return !!(progress && progress.percent >= 100);
    }

    function syncDueBlockedForProgress(data) {
      if (!variant || typeof variant.setProgressCompleteLock !== 'function') return;
      variant.setProgressCompleteLock(progressIsFullyComplete(data));
    }

    /** Prevent Progrès ↔ Bloqué sync feedback loops. */
    var syncingBlockedBridge = false;

    function blockedLinksFingerprint(links) {
      if (!Array.isArray(links) || !links.length) return '';
      return links
        .map(function (link) {
          return link && link.id ? String(link.id) : '';
        })
        .filter(Boolean)
        .sort()
        .join(',');
    }

    function blockedReasonsFingerprint(reasons) {
      if (!Array.isArray(reasons) || !reasons.length) return '';
      return reasons
        .map(function (r) {
          return typeof r === 'string' ? reasonKeyFr(r) : '';
        })
        .filter(Boolean)
        .sort()
        .join('|');
    }

    /** True when a Motif string is clearly about this subtask title. */
    function blockedReasonMatchesTask(reason, taskName) {
      var r = reasonKeyFr(reason);
      var name = String(taskName || '').trim();
      if (!r || !name) return false;
      var nameKey = reasonKeyFr(name);
      if (r === nameKey) return true;
      var lower = name.charAt(0).toLocaleLowerCase('fr-FR') + name.slice(1);
      var lowerKey = reasonKeyFr(lower);
      if (r === reasonKeyFr('En attente de (' + name + ')')) return true;
      if (r === reasonKeyFr('En attente de (' + lower + ')')) return true;
      if (r === reasonKeyFr('En attente de ' + lower)) return true;
      if (r === reasonKeyFr("En attente d'" + lower)) return true;
      if (r === reasonKeyFr('En attente de ' + name)) return true;
      // "En attente de manger un hot-dog" ↔ subtask "Manger un hot-dog"
      var rest = r.replace(/^en\s+attente\s+(de|d\')\s*/i, '').trim();
      if (rest === lowerKey || rest === nameKey) return true;
      rest = rest.replace(/^\(|\)$/g, '').trim();
      if (rest === lowerKey || rest === nameKey) return true;
      return false;
    }

    /**
     * Drop Motif entries / links for subtasks that are no longer blocked
     * (completed, deleted, or unblocked).
     */
    function pruneBlockedReasonsForCompletion(state, data) {
      var WAITING_OTHER =
        (window.PriorityUI && PriorityUI.BLOCKED_REASON_WAITING_OTHER_TASK) ||
        "En attente d'une autre t\u00e2che";
      var items =
        data && Array.isArray(data.items) ? data.items : [];
      var byId = Object.create(null);
      for (var i = 0; i < items.length; i++) {
        if (items[i] && items[i].id) byId[String(items[i].id)] = items[i];
      }

      var prevLinks = Array.isArray(state && state.blockedLinks)
        ? state.blockedLinks
        : [];
      var liveLinks = CompletionTrello.blockedLinksFromCompletion
        ? CompletionTrello.blockedLinksFromCompletion(data)
        : [];
      var liveIds = Object.create(null);
      for (var li = 0; li < liveLinks.length; li++) {
        if (liveLinks[li] && liveLinks[li].id) {
          liveIds[String(liveLinks[li].id)] = true;
        }
      }

      var removedNames = [];
      var seenName = Object.create(null);
      function rememberRemovedName(label) {
        var key = reasonKeyFr(label);
        if (!key || seenName[key]) return;
        seenName[key] = true;
        removedNames.push(String(label).trim());
      }

      for (var p = 0; p < prevLinks.length; p++) {
        var link = prevLinks[p];
        if (!link || !link.id) continue;
        var id = String(link.id);
        if (liveIds[id]) continue;
        var item = byId[id];
        // Gone from blocked set: completed, unblocked, or removed.
        var label =
          (item && item.text) ||
          (typeof link.label === 'string' ? link.label : '') ||
          '';
        if (label) rememberRemovedName(label);
      }

      var reasons = Array.isArray(state && state.blockedReasons)
        ? state.blockedReasons.slice()
        : [];
      if (removedNames.length && reasons.length) {
        reasons = reasons.filter(function (reason) {
          if (typeof reason !== 'string') return false;
          if (reasonKeyFr(reason) === reasonKeyFr(WAITING_OTHER)) {
            return liveLinks.length > 0;
          }
          for (var n = 0; n < removedNames.length; n++) {
            if (blockedReasonMatchesTask(reason, removedNames[n])) {
              return false;
            }
          }
          return true;
        });
      } else if (!liveLinks.length && reasons.length) {
        // No remaining linked blockers: drop the generic waiting-other motif.
        reasons = reasons.filter(function (reason) {
          return reasonKeyFr(reason) !== reasonKeyFr(WAITING_OTHER);
        });
      }

      return {
        blockedLinks: liveLinks,
        blockedReasons: reasons,
      };
    }

    /**
     * For newly blocked Progrès subtasks: seed a humanized Motif on the card
     * only (temporary "En attente de [subtask]"). Do not write it onto the
     * subtask itself — that waits for an explicit WHY refine.
     */
    function humanizeMotifsForNewBlockedLinks(prevLinks, nextLinks, data) {
      var prevIds = Object.create(null);
      var prev = Array.isArray(prevLinks) ? prevLinks : [];
      for (var p = 0; p < prev.length; p++) {
        if (prev[p] && prev[p].id) prevIds[String(prev[p].id)] = true;
      }
      var items =
        data && Array.isArray(data.items) ? data.items : [];
      var byId = Object.create(null);
      for (var i = 0; i < items.length; i++) {
        if (items[i] && items[i].id) byId[String(items[i].id)] = items[i];
      }
      var fresh = [];
      var list = Array.isArray(nextLinks) ? nextLinks : [];
      for (var n = 0; n < list.length; n++) {
        var link = list[n];
        if (!link || !link.id || prevIds[String(link.id)]) continue;
        var item = byId[String(link.id)];
        var taskName =
          (item && item.text) ||
          (typeof link.label === 'string' ? link.label : '') ||
          '';
        taskName = String(taskName || '').trim();
        if (!taskName) continue;
        fresh.push({ id: String(link.id), taskName: taskName });
      }
      if (!fresh.length) return;

      var st0 =
        typeof variant.getState === 'function' ? variant.getState() || {} : {};
      var reasons0 = Array.isArray(st0.blockedReasons)
        ? st0.blockedReasons.slice()
        : [];
      var seeded = false;
      var provisionals = [];
      for (var f = 0; f < fresh.length; f++) {
        var name = fresh[f].taskName;
        var already = false;
        for (var r = 0; r < reasons0.length; r++) {
          if (blockedReasonMatchesTask(reasons0[r], name)) {
            already = true;
            break;
          }
        }
        // Also skip if the item already has Motifs (user/agent WHY already set).
        var itemRow = byId[fresh[f].id];
        if (
          itemRow &&
          Array.isArray(itemRow.blockedReasons) &&
          itemRow.blockedReasons.length
        ) {
          already = true;
        }
        if (already) continue;
        var provisional =
          window.PriorityAgent &&
          typeof PriorityAgent.fallbackBlockedReasonText === 'function'
            ? PriorityAgent.fallbackBlockedReasonText(name)
            : window.PriorityUI &&
                typeof PriorityUI.formatBlockedWaitingOnLabel === 'function'
              ? PriorityUI.formatBlockedWaitingOnLabel(name)
              : 'En attente de ' +
                name.charAt(0).toLocaleLowerCase('fr-FR') +
                name.slice(1);
        if (!provisional) continue;
        var pKey = reasonKeyFr(provisional);
        var exists = false;
        for (var e = 0; e < reasons0.length; e++) {
          if (reasonKeyFr(reasons0[e]) === pKey) {
            exists = true;
            break;
          }
        }
        if (!exists) {
          reasons0.push(provisional);
          seeded = true;
        }
        fresh[f].provisional = provisional;
        provisionals.push({
          from: provisional,
          taskName: name,
          id: fresh[f].id
        });
      }
      if (seeded || provisionals.length) {
        // Card-only provisional Motifs — leave item.blockedReasons empty.
        syncingBlockedBridge = true;
        try {
          variant.setState(
            Object.assign({}, st0, {
              enAttente: true,
              blockedReasons: reasons0,
            })
          );
          if (
            typeof statutUi !== 'undefined' &&
            statutUi &&
            typeof statutUi.syncBlockedPanel === 'function'
          ) {
            statutUi.syncBlockedPanel();
          }
          attachBlockedIntoStatut();
        } finally {
          syncingBlockedBridge = false;
        }
      }

      if (
        !window.PriorityAgent ||
        typeof PriorityAgent.getProvider !== 'function' ||
        typeof PriorityAgent.suggestBlockedReasonText !== 'function'
      ) {
        return;
      }
      PriorityAgent.getProvider(t)
        .then(function (provider) {
          return Promise.all(
            provisionals.map(function (entry) {
              return PriorityAgent.suggestBlockedReasonText(
                provider,
                entry.taskName
              ).then(
                function (polished) {
                  return {
                    from: entry.from,
                    to:
                      typeof polished === 'string' && polished.trim()
                        ? polished.trim()
                        : entry.from,
                  };
                },
                function () {
                  return { from: entry.from, to: entry.from };
                }
              );
            })
          );
        })
        .then(function (updates) {
          if (!updates || !updates.length) return;
          for (var u = 0; u < updates.length; u++) {
            if (
              updates[u].to &&
              reasonKeyFr(updates[u].to) !== reasonKeyFr(updates[u].from)
            ) {
              replaceBlockedReasonChip(updates[u].from, updates[u].to);
            }
          }
          if (
            typeof statutUi !== 'undefined' &&
            statutUi &&
            typeof statutUi.syncBlockedPanel === 'function'
          ) {
            statutUi.syncBlockedPanel();
          }
          attachBlockedIntoStatut();
        })
        .catch(function (err) {
          console.error('humanizeMotifsForNewBlockedLinks failed', err);
        });
    }

    /**
     * When completion has no entity Motifs yet, keep/reseed card provisional
     * "En attente de [linked subtask]" Motifs so sync does not wipe them.
     */
    function preserveOrReseedProvisionalReasons(cardReasons, links, data) {
      var items =
        data && Array.isArray(data.items) ? data.items : [];
      var byId = Object.create(null);
      for (var i = 0; i < items.length; i++) {
        if (items[i] && items[i].id) byId[String(items[i].id)] = items[i];
      }
      var out = [];
      var seen = Object.create(null);
      function push(reason) {
        var text = typeof reason === 'string' ? reason.trim() : '';
        if (!text) return;
        var key = reasonKeyFr(text);
        if (seen[key]) return;
        seen[key] = true;
        out.push(text);
      }
      var reasons = Array.isArray(cardReasons) ? cardReasons : [];
      for (var r = 0; r < reasons.length; r++) {
        push(reasons[r]);
      }
      var list = Array.isArray(links) ? links : [];
      for (var li = 0; li < list.length; li++) {
        var link = list[li];
        if (!link || !link.id) continue;
        var item = byId[String(link.id)];
        if (
          item &&
          Array.isArray(item.blockedReasons) &&
          item.blockedReasons.length
        ) {
          continue;
        }
        var label =
          (item && item.text) ||
          (typeof link.label === 'string' ? link.label : '') ||
          '';
        label = String(label || '').trim();
        if (!label) continue;
        var hasMatch = false;
        for (var j = 0; j < out.length; j++) {
          if (blockedReasonMatchesTask(out[j], label)) {
            hasMatch = true;
            break;
          }
        }
        if (hasMatch) continue;
        var provisional =
          window.PriorityAgent &&
          typeof PriorityAgent.fallbackBlockedReasonText === 'function'
            ? PriorityAgent.fallbackBlockedReasonText(label)
            : window.PriorityUI &&
                typeof PriorityUI.formatBlockedWaitingOnLabel === 'function'
              ? PriorityUI.formatBlockedWaitingOnLabel(label)
              : 'En attente de ' +
                label.charAt(0).toLocaleLowerCase('fr-FR') +
                label.slice(1);
        if (provisional) push(provisional);
      }
      return out;
    }

    /**
     * Progrès blocked → Statut enAttente + blockedLinks + aggregated Motifs.
     * Card is Bloqué iff master or any item is blocked.
     * Entity Motifs (completion) are the source of truth when present; otherwise
     * card-only provisional waiting-on Motifs are preserved.
     */
    function syncPriorityFromProgressBlocked(data) {
      if (syncingBlockedBridge) {
        console.debug('[tp-blocked] syncPriorityFromProgressBlocked skipped (bridge busy)');
        return;
      }
      if (!variant || typeof variant.setState !== 'function') return;
      if (typeof CompletionTrello === 'undefined' || !CompletionTrello.hasAnyBlocked) {
        return;
      }
      var hasBlocked = CompletionTrello.hasAnyBlocked(data);
      var st =
        typeof variant.getState === 'function' ? variant.getState() || {} : {};
      var prevLinks = Array.isArray(st.blockedLinks) ? st.blockedLinks : [];
      var pruned = pruneBlockedReasonsForCompletion(st, data);
      var nextLinks = pruned.blockedLinks;
      var aggReasons = CompletionTrello.aggregateBlockedReasons
        ? CompletionTrello.aggregateBlockedReasons(data)
        : [];

      if (aggReasons.length) {
        // Keep distinct card-level Motifs (woven parent WHY) that are not
        // pure provisionals and not already present on entities.
        var preservedCard = [];
        var aggKeys = Object.create(null);
        for (var ai = 0; ai < aggReasons.length; ai++) {
          aggKeys[reasonKeyFr(aggReasons[ai])] = true;
        }
        var cardPrev = Array.isArray(pruned.blockedReasons)
          ? pruned.blockedReasons
          : [];
        var itemsForProv =
          data && Array.isArray(data.items) ? data.items : [];
        for (var ci = 0; ci < cardPrev.length; ci++) {
          var cr = cardPrev[ci];
          if (typeof cr !== 'string' || !cr.trim()) continue;
          if (aggKeys[reasonKeyFr(cr)]) continue;
          var isProv = false;
          for (var ii = 0; ii < itemsForProv.length; ii++) {
            var it = itemsForProv[ii];
            if (!it || !CompletionTrello.isItemBlocked(it)) continue;
            var pure =
              window.PriorityAgent &&
              typeof PriorityAgent.isPureWaitingOnTaskReason === 'function'
                ? PriorityAgent.isPureWaitingOnTaskReason(cr, it.text)
                : blockedReasonMatchesTask(cr, it.text);
            if (pure) {
              isProv = true;
              break;
            }
          }
          if (isProv) continue;
          preservedCard.push(cr);
