        nextReasons = preservedCard.length ? preservedCard : aggReasons;
      } else if (nextLinks.length) {
        nextReasons = preserveOrReseedProvisionalReasons(
          pruned.blockedReasons,
          nextLinks,
          data
        );
      } else {
        nextReasons = pruned.blockedReasons;
      }
      // Keep waiting-other only while linked blockers remain.
      if (!nextLinks.length && nextReasons.length) {
        var WAITING_OTHER =
          (window.PriorityUI && PriorityUI.BLOCKED_REASON_WAITING_OTHER_TASK) ||
          "En attente d'une autre t\u00e2che";
        nextReasons = nextReasons.filter(function (reason) {
          return reasonKeyFr(reason) !== reasonKeyFr(WAITING_OTHER);
        });
      }
      var curEnAttente = !!st.enAttente;
      var curLinksFp = blockedLinksFingerprint(st.blockedLinks);
      var nextLinksFp = blockedLinksFingerprint(nextLinks);
      var curReasonsFp = blockedReasonsFingerprint(st.blockedReasons);
      var nextReasonsFp = blockedReasonsFingerprint(nextReasons);
      if (
        hasBlocked === curEnAttente &&
        nextLinksFp === curLinksFp &&
        nextReasonsFp === curReasonsFp
      ) {
        return;
      }

      console.debug('[tp-blocked] syncPriorityFromProgressBlocked', {
        hasBlocked: hasBlocked,
        curEnAttente: curEnAttente,
        nextEnAttente: hasBlocked,
        masterBlocked: !!(data && data.blocked),
        blockedItemIds: ((data && data.items) || [])
          .filter(function (it) {
            return it && it.blocked === true;
          })
          .map(function (it) {
            return it.id;
          }),
        linksChanged: nextLinksFp !== curLinksFp,
        reasonsChanged: nextReasonsFp !== curReasonsFp,
      });

      syncingBlockedBridge = true;
      try {
        variant.setState(
          Object.assign({}, st, {
            enAttente: hasBlocked,
            blockedLinks: nextLinks,
            blockedReasons: nextReasons,
          })
        );
        if (
          hasBlocked &&
          typeof statutUi !== 'undefined' &&
          statutUi &&
          typeof statutUi.syncBlockedPanel === 'function'
        ) {
          statutUi.syncBlockedPanel();
        }
        attachBlockedIntoStatut();
      } finally {
        syncingBlockedBridge = false;
      }
      if (hasBlocked) {
        humanizeMotifsForNewBlockedLinks(prevLinks, nextLinks, data);
      }
    }

    function completionHasEntityBlockedReasons(data) {
      var CT = CompletionTrello;
      var next = CT.normalizeCompletionData(data || { items: [] });
      if (
        CT.isMasterBlocked(next) &&
        Array.isArray(next.blockedReasons) &&
        next.blockedReasons.length
      ) {
        return true;
      }
      for (var i = 0; i < next.items.length; i++) {
        var item = next.items[i];
        if (
          CT.isItemBlocked(item) &&
          Array.isArray(item.blockedReasons) &&
          item.blockedReasons.length
        ) {
          return true;
        }
      }
      return false;
    }

    /**
     * Write card-level Motifs onto completion entities (seed / sole blocker).
     */
    function applyPriorityReasonsToCompletion(data, reasons) {
      var CT = CompletionTrello;
      var next = CT.normalizeCompletionData(data || { items: [] });
      var list = CT.normalizeBlockedReasons
        ? CT.normalizeBlockedReasons(reasons)
        : Array.isArray(reasons)
          ? reasons.slice()
          : [];
      if (completionHasEntityBlockedReasons(next)) {
        return next;
      }
      if (CT.seedBlockedReasonsFromPriority) {
        return CT.seedBlockedReasonsFromPriority(next, list);
      }
      return next;
    }

    /**
     * When Statut Motif is edited: map onto master (self-blocked), the sole
     * blocked item, or master when several blockers exist.
     * Pure provisional "En attente de [this item]" Motifs stay card-only.
     */
    function writeStatutReasonsOntoCompletion(data, reasons) {
      var CT = CompletionTrello;
      var next = CT.normalizeCompletionData(data || { items: [] });
      var list = CT.normalizeBlockedReasons
        ? CT.normalizeBlockedReasons(reasons)
        : Array.isArray(reasons)
          ? reasons.slice()
          : [];
      var blockedItems = [];
      for (var i = 0; i < next.items.length; i++) {
        if (CT.isItemBlocked(next.items[i])) blockedItems.push(next.items[i]);
      }
      var masterOnly =
        CT.isMasterBlocked(next) && blockedItems.length === 0;
      var singleItem =
        !CT.isMasterBlocked(next) && blockedItems.length === 1;
      if (masterOnly || (!blockedItems.length && !CT.isMasterBlocked(next))) {
        // Statut Motif on a status/no-subtask block — keep status origin unless user.
        var origin =
          CT.isMasterBlockedByUser && CT.isMasterBlockedByUser(next)
            ? 'user'
            : 'status';
        return CT.setMasterBlockedReasons(next, list, { origin: origin });
      }
      if (singleItem) {
        var only = blockedItems[0];
        var filtered = list.filter(function (reason) {
          return !blockedReasonMatchesTask(reason, only.text);
        });
        if (!filtered.length) {
          // Card-only provisional — do not dump onto the subtask.
          return next;
        }
        // Prefer writing only non-provisional Motifs (WHY / woven causes).
        return CT.setItemBlockedReasons(next, only.id, filtered);
      }
      // Multiple blockers: Statut list replaces per-item Motifs on master.
      next.items = next.items.map(function (item) {
        if (!item.blockedReasons) return item;
        var copy = Object.assign({}, item);
        delete copy.blockedReasons;
        return copy;
      });
      var multiOrigin =
        CT.isMasterBlockedByUser && CT.isMasterBlockedByUser(next)
          ? 'user'
          : 'status';
      return CT.setMasterBlockedReasons(next, list, { origin: multiOrigin });
    }

    /**
     * Apply priority blockedLinks onto matching Progrès items (item.blocked).
     * Returns next completion data (normalized).
     */
    function applyBlockedLinksToCompletion(data, links) {
      var CT = CompletionTrello;
      var next = CT.normalizeCompletionData(data || { items: [] });
      var ids = Object.create(null);
      var list = Array.isArray(links) ? links : [];
      for (var i = 0; i < list.length; i++) {
        var link = list[i];
        if (link && link.id) ids[String(link.id)] = true;
      }
      var linkCount = 0;
      for (var key in ids) {
        if (Object.prototype.hasOwnProperty.call(ids, key)) linkCount++;
      }
      if (!linkCount) return next;

      var known = Object.create(null);
      for (var j = 0; j < next.items.length; j++) {
        known[next.items[j].id] = true;
      }
      for (var id in ids) {
        if (!Object.prototype.hasOwnProperty.call(ids, id)) continue;
        if (!known[id]) continue;
        next = CT.setItemBlocked(next, id, true);
      }
      return CT.normalizeCompletionData(next);
    }

    /**
     * Statut / enAttente → Progrès blocked flags (+ Motif seed / write-back).
     * Prefer marking linked subtasks; only use master.blocked when there are
     * no blockedLinks and nothing is blocked yet.
     */
    function syncProgressFromPriorityBlocked(state) {
      if (syncingBlockedBridge) {
        console.debug('[tp-blocked] syncProgressFromPriorityBlocked skipped (bridge busy)');
        return;
      }
      if (!completionUi || typeof CompletionTrello === 'undefined') return;
      if (!CompletionTrello.hasAnyBlocked) return;
      var enAttente = !!(state && state.enAttente);
      var links = Array.isArray(state && state.blockedLinks)
        ? state.blockedLinks
        : [];
      var priorityReasons = Array.isArray(state && state.blockedReasons)
        ? state.blockedReasons
        : [];
      var live =
        typeof completionUi.getData === 'function'
          ? completionUi.getData()
          : latestCompletion || { items: [] };
      var hasBlocked = CompletionTrello.hasAnyBlocked(live);

      console.debug('[tp-blocked] syncProgressFromPriorityBlocked', {
        enAttente: enAttente,
        hasBlocked: hasBlocked,
        linkCount: links.length,
        masterBlocked: !!(live && live.blocked),
        masterOrigin:
          live && CompletionTrello.masterBlockedOrigin
            ? CompletionTrello.masterBlockedOrigin(live)
            : null,
        willSetMasterBlocked: !!(enAttente && !hasBlocked),
      });

      syncingBlockedBridge = true;
      try {
        if (!enAttente) {
          if (hasBlocked) {
            if (typeof completionUi.clearAllBlocked === 'function') {
              latestCompletion = withProgressEnabledFlag(
                completionUi.clearAllBlocked()
              );
            } else {
              latestCompletion = withProgressEnabledFlag(
                CompletionTrello.clearAllBlocked(live)
              );
              if (typeof completionUi.setData === 'function') {
                completionUi.setData(latestCompletion);
              }
              saveCompletion(latestCompletion);
            }
          }
        } else {
          // Card Bloqué: mirror blockedLinks onto items first.
          var withLinks = applyBlockedLinksToCompletion(live, links);
          // Links/items carry the block — drop a status-origin master flag so the
          // specific subtask shows as blocked. Keep an explicit user-pressed master.
          if (
            links.length &&
            CompletionTrello.hasAnyBlocked(withLinks) &&
            withLinks.blocked &&
            (!CompletionTrello.isMasterBlockedByUser ||
              !CompletionTrello.isMasterBlockedByUser(withLinks))
          ) {
            withLinks = CompletionTrello.setMasterBlocked(withLinks, false);
          }
          var linksApplied =
            JSON.stringify(CompletionTrello.normalizeCompletionData(live)) !==
            JSON.stringify(withLinks);
          if (linksApplied) {
            latestCompletion = withProgressEnabledFlag(withLinks);
            if (typeof completionUi.setData === 'function') {
              completionUi.setData(latestCompletion);
            }
            saveCompletion(latestCompletion);
            hasBlocked = CompletionTrello.hasAnyBlocked(latestCompletion);
          } else {
            hasBlocked = CompletionTrello.hasAnyBlocked(withLinks);
            latestCompletion = withProgressEnabledFlag(withLinks);
          }
          // No linked/item blocked yet → status-origin master is the block source.
          if (!hasBlocked) {
            if (typeof completionUi.setMasterBlocked === 'function') {
              latestCompletion = withProgressEnabledFlag(
                completionUi.setMasterBlocked(true, { origin: 'status' })
              );
            } else {
              latestCompletion = withProgressEnabledFlag(
                CompletionTrello.setMasterBlocked(
                  (completionUi.getData && completionUi.getData()) || live,
                  true,
                  { origin: 'status' }
                )
              );
              if (typeof completionUi.setData === 'function') {
                completionUi.setData(latestCompletion);
              }
              saveCompletion(latestCompletion);
            }
            hasBlocked = true;
          }
          // Motifs: seed legacy card reasons, or write Statut Motif onto entities
          // only when Statut differs from the completion aggregate.
          var afterBlock =
            (completionUi &&
              typeof completionUi.getData === 'function' &&
              completionUi.getData()) ||
            latestCompletion;
          var aggReasons = CompletionTrello.aggregateBlockedReasons
            ? CompletionTrello.aggregateBlockedReasons(afterBlock)
            : [];
          var withReasons = afterBlock;
          if (
            blockedReasonsFingerprint(priorityReasons) !==
            blockedReasonsFingerprint(aggReasons)
          ) {
            if (!completionHasEntityBlockedReasons(afterBlock)) {
              withReasons = applyPriorityReasonsToCompletion(
                afterBlock,
                priorityReasons
              );
            } else {
              withReasons = writeStatutReasonsOntoCompletion(
                afterBlock,
                priorityReasons
              );
            }
          }
          if (
            JSON.stringify(CompletionTrello.normalizeCompletionData(afterBlock)) !==
            JSON.stringify(CompletionTrello.normalizeCompletionData(withReasons))
          ) {
            latestCompletion = withProgressEnabledFlag(withReasons);
            if (typeof completionUi.setData === 'function') {
              completionUi.setData(latestCompletion);
            }
            saveCompletion(latestCompletion);
          }
        }
        scheduleProgressSummary();
        syncBlockedSubtasks();
        syncDueBlockedForProgress(
          (completionUi &&
            typeof completionUi.getData === 'function' &&
            completionUi.getData()) ||
            latestCompletion
        );
      } finally {
        syncingBlockedBridge = false;
      }
    }

    /**
     * After a new Statut motif: AI (or fallback) creates a blocked Progrès subtask.
     */
    function reasonKeyFr(value) {
      return String(value || '')
        .trim()
        .toLocaleLowerCase('fr-FR');
    }

    function looksLikeActionReason(value) {
      var text = String(value || '').trim();
      if (!text) return false;
      if (/^en\s+attente\s+(de|d\')/i.test(text)) return false;
      if (/^bloqu\u00e9\s+\u00e0\s+cause\s+de\s+/i.test(text)) return false;
      return (
        /^[A-Za-z\u00C0-\u024F]+(er|ir|re)\b/i.test(text) ||
        /^(mettre|faire|ouvrir|fermer|manger|obtenir|relancer)\b/i.test(text)
      );
    }

    /** Replace a typed motif chip with the AI-polished "En attente de …" form. */
    function replaceBlockedReasonChip(fromReason, toReason) {
      if (!variant || typeof variant.getState !== 'function') return toReason;
      var from = String(fromReason || '').trim();
      var to = String(toReason || '').trim();
      if (!from || !to || reasonKeyFr(from) === reasonKeyFr(to)) return to || from;
      var st = variant.getState() || {};
      var reasons = Array.isArray(st.blockedReasons) ? st.blockedReasons.slice() : [];
      var replaced = false;
      var next = [];
      var seen = Object.create(null);
      for (var i = 0; i < reasons.length; i++) {
        var r = typeof reasons[i] === 'string' ? reasons[i].trim() : '';
        if (!r) continue;
        if (reasonKeyFr(r) === reasonKeyFr(from)) {
          r = to;
          replaced = true;
        }
        var key = reasonKeyFr(r);
        if (seen[key]) continue;
        seen[key] = true;
        next.push(r);
      }
      if (!replaced && !seen[reasonKeyFr(to)]) next.push(to);
      syncingBlockedBridge = true;
      try {
        variant.setState(
          Object.assign({}, st, {
            enAttente: true,
            blockedReasons: next,
          })
        );
      } finally {
        syncingBlockedBridge = false;
      }
      // Mirror chip rename onto completion entity Motifs.
      if (
        typeof CompletionTrello !== 'undefined' &&
        CompletionTrello.normalizeCompletionData
      ) {
        var live =
          (completionUi &&
            typeof completionUi.getData === 'function' &&
            completionUi.getData()) ||
          latestCompletion ||
          { items: [] };
        var nextComp = CompletionTrello.normalizeCompletionData(live);
        var changed = false;
        if (
          nextComp.blocked &&
          Array.isArray(nextComp.blockedReasons)
        ) {
          var masterNext = nextComp.blockedReasons.map(function (reason) {
            return reasonKeyFr(reason) === reasonKeyFr(from) ? to : reason;
          });
          if (masterNext.join('\0') !== nextComp.blockedReasons.join('\0')) {
            nextComp = CompletionTrello.setMasterBlockedReasons(nextComp, masterNext);
            changed = true;
          }
        }
        for (var ii = 0; ii < nextComp.items.length; ii++) {
          var it = nextComp.items[ii];
          if (!CompletionTrello.isItemBlocked(it) || !it.blockedReasons) continue;
          var itemNext = it.blockedReasons.map(function (reason) {
            return reasonKeyFr(reason) === reasonKeyFr(from) ? to : reason;
          });
          if (itemNext.join('\0') !== it.blockedReasons.join('\0')) {
            nextComp = CompletionTrello.setItemBlockedReasons(
              nextComp,
              it.id,
              itemNext
            );
            changed = true;
          }
        }
        if (changed) {
          latestCompletion = withProgressEnabledFlag(nextComp);
          if (completionUi && typeof completionUi.setData === 'function') {
            completionUi.setData(latestCompletion);
          }
          saveCompletion(latestCompletion);
        }
      }
      return to;
    }

    /**
     * Sole blocked subtask with empty Motifs (card may still hold provisional).
     */
    function findRefineWhyTarget(data) {
      if (typeof CompletionTrello === 'undefined') return null;
      var next = CompletionTrello.normalizeCompletionData(data || { items: [] });
      if (CompletionTrello.isMasterBlocked(next)) return null;
      var emptyBlocked = [];
      for (var i = 0; i < next.items.length; i++) {
        var item = next.items[i];
        if (!CompletionTrello.isItemBlocked(item)) continue;
        if (item.done) continue;
        var hasReasons =
          Array.isArray(item.blockedReasons) && item.blockedReasons.length > 0;
        if (!hasReasons) emptyBlocked.push(item);
      }
      if (emptyBlocked.length === 1) return emptyBlocked[0];
      return null;
    }

    /**
     * Card still shows a pure provisional waiting-on Motif for this subtask.
     */
    function cardHasProvisionalForTask(taskName) {
      if (!variant || typeof variant.getState !== 'function') return false;
      var st = variant.getState() || {};
      var reasons = Array.isArray(st.blockedReasons) ? st.blockedReasons : [];
      for (var i = 0; i < reasons.length; i++) {
        if (
          window.PriorityAgent &&
          typeof PriorityAgent.isPureWaitingOnTaskReason === 'function'
            ? PriorityAgent.isPureWaitingOnTaskReason(reasons[i], taskName)
            : blockedReasonMatchesTask(reasons[i], taskName)
        ) {
          return true;
        }
      }
      return false;
    }

    var refiningBlockedWhy = false;

    /**
     * Apply dual Motifs after the user explains WHY a linked subtask is blocked.
     */
    function applyBlockedWhyPair(itemId, why) {
      var text = typeof why === 'string' ? why.trim() : '';
      if (!text || !itemId) return Promise.resolve(null);
      if (typeof CompletionTrello === 'undefined') return Promise.resolve(null);

      var live =
        (completionUi &&
          typeof completionUi.getData === 'function' &&
          completionUi.getData()) ||
        latestCompletion ||
        { items: [] };
      var next = CompletionTrello.normalizeCompletionData(live);
      var target = null;
      for (var i = 0; i < next.items.length; i++) {
        if (next.items[i] && String(next.items[i].id) === String(itemId)) {
          target = next.items[i];
          break;
        }
      }
      if (!target) return Promise.resolve(null);
      var subtaskTitle = String(target.text || '').trim();
      if (!subtaskTitle) return Promise.resolve(null);

      refiningBlockedWhy = true;
      var cardTitle =
        (typeof readCardNameLabel === 'function' && readCardNameLabel()) ||
        cardNameCache ||
        '';

      function applyPair(pair) {
        var subtaskReason =
          pair && typeof pair.subtaskReason === 'string'
            ? pair.subtaskReason.trim()
            : '';
        var cardReason =
          pair && typeof pair.cardReason === 'string'
            ? pair.cardReason.trim()
            : '';
        if (!subtaskReason && !cardReason) return null;

        var withItem = CompletionTrello.setItemBlockedReasons(
          next,
          itemId,
          subtaskReason ? [subtaskReason] : []
        );
        latestCompletion = withProgressEnabledFlag(withItem);
        if (completionUi && typeof completionUi.setData === 'function') {
          completionUi.setData(latestCompletion);
        }
        saveCompletion(latestCompletion);

        if (variant && typeof variant.getState === 'function') {
          var st = variant.getState() || {};
          var prevReasons = Array.isArray(st.blockedReasons)
            ? st.blockedReasons.slice()
            : [];
          var nextCardReasons = [];
          var seen = Object.create(null);
          function pushCard(reason) {
            var r = typeof reason === 'string' ? reason.trim() : '';
            if (!r) return;
            var key = reasonKeyFr(r);
            if (seen[key]) return;
            seen[key] = true;
            nextCardReasons.push(r);
          }
          for (var p = 0; p < prevReasons.length; p++) {
            var reason = prevReasons[p];
            // Drop provisional waiting-on-[this subtask] and the raw WHY chip.
            if (blockedReasonMatchesTask(reason, subtaskTitle)) continue;
            if (
              window.PriorityAgent &&
              typeof PriorityAgent.isPureWaitingOnTaskReason === 'function' &&
              PriorityAgent.isPureWaitingOnTaskReason(reason, subtaskTitle)
            ) {
              continue;
            }
            if (reasonKeyFr(reason) === reasonKeyFr(text)) continue;
            pushCard(reason);
          }
          if (cardReason) pushCard(cardReason);
          else if (subtaskReason) pushCard(subtaskReason);

          syncingBlockedBridge = true;
          try {
            variant.setState(
              Object.assign({}, st, {
                enAttente: true,
                blockedReasons: nextCardReasons,
                blockedLinks: CompletionTrello.blockedLinksFromCompletion
                  ? CompletionTrello.blockedLinksFromCompletion(latestCompletion)
                  : st.blockedLinks,
              })
            );
            if (
              typeof statutUi !== 'undefined' &&
              statutUi &&
              typeof statutUi.syncBlockedPanel === 'function'
            ) {
              statutUi.syncBlockedPanel();
            }
            attachBlockedIntoStatut();
          } finally {
            syncingBlockedBridge = false;
          }
        }
        scheduleProgressSummary();
        syncBlockedSubtasks();
        resizePopup();
        return { subtaskReason: subtaskReason, cardReason: cardReason };
      }

      var pairPromise =
        window.PriorityAgent &&
        typeof PriorityAgent.getProvider === 'function' &&
        typeof PriorityAgent.suggestBlockedReasonPair === 'function'
          ? PriorityAgent.getProvider(t)
              .then(function (provider) {
                return PriorityAgent.suggestBlockedReasonPair(provider, {
                  subtaskTitle: subtaskTitle,
                  why: text,
                  cardTitle: cardTitle,
                });
              })
              .catch(function () {
                return PriorityAgent.fallbackBlockedReasonPair({
                  subtaskTitle: subtaskTitle,
                  why: text,
                });
              })
          : Promise.resolve(
              window.PriorityAgent &&
                typeof PriorityAgent.fallbackBlockedReasonPair === 'function'
                ? PriorityAgent.fallbackBlockedReasonPair({
                    subtaskTitle: subtaskTitle,
                    why: text,
                  })
                : {
                    subtaskReason: text,
                    cardReason: text,
                  }
            );

      return pairPromise
        .then(function (pair) {
          return applyPair(pair);
        })
        .finally(function () {
          refiningBlockedWhy = false;
        });
    }

    /**
     * If a linked subtask is blocked without Motifs, treat the new Motif as WHY
     * and dual-rewrite card + subtask. Returns a Promise when handled, else null.
     */
    function tryRefineBlockedWhy(why) {
      var text = typeof why === 'string' ? why.trim() : '';
      if (!text) return null;
      if (refiningBlockedWhy) return null;
      var live =
        (completionUi &&
          typeof completionUi.getData === 'function' &&
          completionUi.getData()) ||
        latestCompletion ||
        { items: [] };
      var target = findRefineWhyTarget(live);
      if (!target) return null;
      // Prefer refine when card still shows provisional, or when there is a
      // single empty-reason blocker (pause-then-WHY flow).
      if (
        !cardHasProvisionalForTask(target.text) &&
        !CompletionTrello.hasAnyBlocked(live)
      ) {
        return null;
      }
      return applyBlockedWhyPair(target.id, text);
    }

    /**
     * After a Motif is typed on a previously empty blocked subtask row,
     * dual-rewrite card + item Motifs.
     */
    function maybeRefineFromItemMotifs(data) {
      if (refiningBlockedWhy) return;
      if (!variant || typeof variant.getState !== 'function') return;
      if (typeof CompletionTrello === 'undefined') return;
      var next = CompletionTrello.normalizeCompletionData(data || { items: [] });
      if (CompletionTrello.isMasterBlocked(next)) return;
      var withReasons = [];
      var emptyBlocked = 0;
      for (var i = 0; i < next.items.length; i++) {
        var item = next.items[i];
        if (!CompletionTrello.isItemBlocked(item) || item.done) continue;
        if (
          Array.isArray(item.blockedReasons) &&
          item.blockedReasons.length
        ) {
          withReasons.push(item);
        } else {
          emptyBlocked++;
        }
      }
      if (withReasons.length !== 1 || emptyBlocked > 0) return;
      var only = withReasons[0];
      var why = only.blockedReasons[only.blockedReasons.length - 1];
      if (
        window.PriorityAgent &&
        typeof PriorityAgent.isPureWaitingOnTaskReason === 'function' &&
        PriorityAgent.isPureWaitingOnTaskReason(why, only.text)
      ) {
        return;
      }
      if (blockedReasonMatchesTask(why, only.text)) return;

      var st = variant.getState() || {};
      var cardReasons = Array.isArray(st.blockedReasons)
        ? st.blockedReasons
        : [];
      var hasProvisional = cardHasProvisionalForTask(only.text);
      var cardMatchesItem =
        blockedReasonsFingerprint(cardReasons) ===
        blockedReasonsFingerprint(only.blockedReasons);
      var taskLower =
        String(only.text || '')
          .charAt(0)
          .toLocaleLowerCase('fr-FR') + String(only.text || '').slice(1);
      var alreadyWoven = false;
      for (var c = 0; c < cardReasons.length; c++) {
        var cr = String(cardReasons[c] || '');
        if (
          /\spour\s+/i.test(cr) &&
          reasonKeyFr(cr).indexOf(reasonKeyFr(taskLower)) >= 0 &&
          reasonKeyFr(cr) !== reasonKeyFr(why)
        ) {
          alreadyWoven = true;
          break;
        }
      }
      if (alreadyWoven && !hasProvisional) return;
      if (!hasProvisional && !cardMatchesItem) return;

      applyBlockedWhyPair(only.id, why).catch(function (err) {
        console.error('maybeRefineFromItemMotifs failed', err);
      });
    }

    /**
     * Motif commit: polish to a single "En attente de …" cause, then create
     * an actionable blocked Progrès subtask (not a second motif chip).
     */
    function createBlockedSubtaskFromReason(reason) {
      var text = typeof reason === 'string' ? reason.trim() : '';
      if (!text) return Promise.resolve(null);
      if (typeof CompletionTrello === 'undefined') return Promise.resolve(null);

      function titleMatches(itemText, candidate) {
        var a = String(itemText || '')
          .trim()
          .toLocaleLowerCase('fr-FR');
        var b = String(candidate || '')
          .trim()
          .toLocaleLowerCase('fr-FR');
        return !!a && !!b && (a === b || a.indexOf(b) !== -1 || b.indexOf(a) !== -1);
      }

      function findExistingMatch(items, title, reasonText) {
        for (var i = 0; i < (items || []).length; i++) {
          var item = items[i];
          if (!item || item.done) continue;
          if (titleMatches(item.text, title) || titleMatches(item.text, reasonText)) {
            return item;
          }
        }
        return null;
      }

      function applyBlockedItem(title) {
        var live =
          (completionUi &&
            typeof completionUi.getData === 'function' &&
            completionUi.getData()) ||
          latestCompletion ||
          { items: [] };
        var existing = findExistingMatch(live.items, title, text);
        if (existing) {
          if (!CompletionTrello.isItemBlocked(existing)) {
            if (completionUi && typeof completionUi.setItemBlocked === 'function') {
              latestCompletion = withProgressEnabledFlag(
                completionUi.setItemBlocked(existing.id, true)
              );
            } else {
              latestCompletion = withProgressEnabledFlag(
                CompletionTrello.setItemBlocked(live, existing.id, true)
              );
              if (completionUi && typeof completionUi.setData === 'function') {
                completionUi.setData(latestCompletion);
              }
              saveCompletion(latestCompletion);
            }
          }
          syncPriorityFromProgressBlocked(
            (completionUi &&
              typeof completionUi.getData === 'function' &&
              completionUi.getData()) ||
              latestCompletion
          );
          return existing;
        }

        var item = null;
        if (completionUi && typeof completionUi.addItem === 'function') {
          item = completionUi.addItem(title, { blocked: true });
        } else {
          var next = Object.assign({}, live, {
            items: (live.items || []).concat([
              {
                id: CompletionTrello.generateId(),
                text: title,
                progress: 0,
                blocked: true,
              },
            ]),
          });
          latestCompletion = withProgressEnabledFlag(
            CompletionTrello.normalizeCompletionData(next)
          );
          if (completionUi && typeof completionUi.setData === 'function') {
            completionUi.setData(latestCompletion);
          }
          saveCompletion(latestCompletion);
          item = latestCompletion.items[latestCompletion.items.length - 1] || null;
        }
        scheduleProgressSummary();
        syncBlockedSubtasks();
        syncPriorityFromProgressBlocked(
          (completionUi &&
            typeof completionUi.getData === 'function' &&
            completionUi.getData()) ||
            latestCompletion
        );
        resizePopup();
        return item;
      }

      function resolveSubtaskTitle(polishedReason, suggestedAction) {
        if (typeof suggestedAction === 'string' && suggestedAction.trim()) {
          return suggestedAction.trim();
        }
        if (looksLikeActionReason(text)) return text;
        if (
          window.PriorityAgent &&
          typeof PriorityAgent.fallbackUnblockSubtaskText === 'function'
        ) {
          return PriorityAgent.fallbackUnblockSubtaskText(polishedReason || text);
        }
        return text;
      }

      function polishReasonThenCreate() {
        var polishPromise =
          window.PriorityAgent &&
          typeof PriorityAgent.getProvider === 'function' &&
          typeof PriorityAgent.suggestBlockedReasonText === 'function'
            ? PriorityAgent.getProvider(t)
                .then(function (provider) {
                  return PriorityAgent.suggestBlockedReasonText(provider, text, {
                    cardTitle:
                      (typeof readCardNameLabel === 'function' &&
                        readCardNameLabel()) ||
                      cardNameCache ||
                      '',
                  });
                })
                .catch(function () {
                  return null;
                })
            : Promise.resolve(null);

        return polishPromise.then(function (suggestedReason) {
          var polished =
            typeof suggestedReason === 'string' && suggestedReason.trim()
              ? suggestedReason.trim()
              : window.PriorityAgent &&
                  typeof PriorityAgent.fallbackBlockedReasonText === 'function'
                ? PriorityAgent.fallbackBlockedReasonText(text)
                : text;
          if (!polished) polished = text;
          replaceBlockedReasonChip(text, polished);

          var actionPromise =
            window.PriorityAgent &&
            typeof PriorityAgent.suggestUnblockSubtaskText === 'function' &&
            typeof PriorityAgent.getProvider === 'function'
              ? PriorityAgent.getProvider(t)
                  .then(function (provider) {
                    return PriorityAgent.suggestUnblockSubtaskText(
                      provider,
                      polished
                    );
                  })
                  .catch(function () {
                    return null;
                  })
              : Promise.resolve(null);

          return actionPromise.then(function (suggestedAction) {
            var title = resolveSubtaskTitle(polished, suggestedAction);
            if (!title) title = text;
            return applyBlockedItem(title);
          });
        });
      }

      return polishReasonThenCreate();
    }

    /** Mirror Terminé → Progrès 100% in the open popup (persistence already done in side effects). */
    function applyCompletionFromStatutComplete(completionData) {
      var CT = CompletionTrello;
      var next =
        completionData ||
        (CT.markFullyComplete
          ? CT.markFullyComplete(
              (completionUi && typeof completionUi.getData === 'function' && completionUi.getData()) ||
                latestCompletion ||
                { items: [] }
            )
          : null);
      if (!next) return;

      latestCompletion = withProgressEnabledFlag(next);
      if (completionUi && typeof completionUi.setData === 'function') {
        completionUi.setData(latestCompletion);
      }
      var live =
        completionUi && typeof completionUi.getData === 'function'
          ? completionUi.getData()
          : latestCompletion;
      // Persist again with progressEnabled on (statut side effect may have left it unset).
      saveCompletion(live);
      scheduleProgressSummary();
      syncBlockedSubtasks();
      syncDueBlockedForProgress(live);
      if (progressCollapse && !progressCollapse.isEnabled()) {
        setProgressEnabled(true, { expand: true, persist: true });
      } else {
        progressEnabled = true;
      }
    }

    /** Same side effects as clicking a Statut chip (shared by UI + agent). */
    function applyStatutListSelection(listId) {
      if (!window.StatutTrello) {
        return Promise.resolve({ ok: false, reason: 'no-statut' });
      }
      return StatutTrello.selectCardStatut(t, listId).then(function (result) {
        var historyAfter = function (out) {
          if (out && out.ok) {
            return commitHistoryNow('Statut / liste').then(function () {
              return out;
            });
          }
          return out;
        };
        if (result && result.ok && variant && result.sideEffects) {
          var side = result.sideEffects;
          var wasBlockedCat =
            !!(latestStatut && latestStatut.category === 'blocked');
          if (
            (side.enAttenteSet || side.category === 'blocked') &&
            typeof variant.setState === 'function'
          ) {
            if (typeof variant.setProgressCompleteLock === 'function') {
              variant.setProgressCompleteLock(false);
            }
            variant.setState(
              Object.assign({}, variant.getState(), { enAttente: true })
            );
            if (side.progressIncomplete && side.completion) {
              latestCompletion = withProgressEnabledFlag(side.completion);
              if (completionUi && typeof completionUi.setData === 'function') {
                completionUi.setData(latestCompletion);
              }
              var blockedLive =
                completionUi && typeof completionUi.getData === 'function'
                  ? completionUi.getData()
                  : latestCompletion;
              saveCompletion(blockedLive);
              scheduleProgressSummary();
              syncBlockedSubtasks();
              syncDueBlockedForProgress(blockedLive);
              syncDueCompleteFromProgress(blockedLive, { clearSuppress: true });
            }
            // Statut Bloqué with no progress blocked yet → mark master blocked.
            syncProgressFromPriorityBlocked({ enAttente: true });
            resizePopup();
          } else if (
            wasBlockedCat &&
            side.category !== 'blocked' &&
            side.category !== 'completed' &&
            typeof variant.setState === 'function'
          ) {
            // Leaving Bloqué: drop active block (keep motives for next time).
            variant.setState(
              Object.assign({}, variant.getState(), { enAttente: false })
            );
            syncProgressFromPriorityBlocked({ enAttente: false });
            resizePopup();
          }
          if (side.category === 'completed') {
            if (typeof variant.setState === 'function') {
              var cleared = Object.assign({}, variant.getState(), {
                enAttente: false,
                blockedReasons: [],
                blockedLinks: [],
              });
              variant.setState(cleared);
            }
            applyCompletionFromStatutComplete(side.completion);
            if (
              completionUi &&
              typeof completionUi.clearAllBlocked === 'function'
            ) {
              syncingBlockedBridge = true;
              try {
                latestCompletion = withProgressEnabledFlag(
                  completionUi.clearAllBlocked()
                );
              } finally {
                syncingBlockedBridge = false;
              }
            }
            resizePopup();
          } else if (side.dueCompleteCleared) {
            if (typeof variant.setProgressCompleteLock === 'function') {
              variant.setProgressCompleteLock(false);
            }
            // En cours (and similar): side effects may have pulled Progrès off 100%.
            if (
              side.progressIncomplete &&
              side.completion &&
              side.category !== 'blocked'
            ) {
              latestCompletion = withProgressEnabledFlag(side.completion);
              if (completionUi && typeof completionUi.setData === 'function') {
                completionUi.setData(latestCompletion);
              }
              var reopenedLive =
                completionUi && typeof completionUi.getData === 'function'
                  ? completionUi.getData()
                  : latestCompletion;
              saveCompletion(reopenedLive);
              scheduleProgressSummary();
              syncBlockedSubtasks();
              syncDueBlockedForProgress(reopenedLive);
              syncDueCompleteFromProgress(reopenedLive, { clearSuppress: true });
            }
            resizePopup();
          }
        }
        if (result && result.ok) {
          return StatutTrello.getCardStatut(t).then(function (statut) {
            latestStatut = buildLatestStatut(statut, listId);
            appliedStatutListId = latestStatut.listId || null;
            if (statutUi && typeof statutUi.setData === 'function') {
              statutUi.setData({
                listId: latestStatut.listId,
                lists: (statut && statut.lists) || [],
                settings: (statut && statut.settings) || undefined
              });
            } else if (statutUi && typeof statutUi.syncBlockedPanel === 'function') {
              statutUi.syncBlockedPanel();
            }
            return historyAfter(result);
          });
        }
        return historyAfter(result);
      });
    }

    function setProgressEnabled(enabled, options) {
      options = options || {};
      progressEnabled = true;
      if (progressCollapse) {
        var enableOpts = {
          persist: options.persist,
          focusAdd: options.focusAdd
        };
        if (options.preserveCollapse) {
          enableOpts.preserveCollapse = true;
        } else if (options.expand != null) {
          enableOpts.expand = !!options.expand;
        } else if (enabled) {
          enableOpts.expand = true;
        }
        // Progrès cannot be disabled — only expand/collapse.
        progressCollapse.setEnabled(true, enableOpts);
        return;
      }
      progressExpanded = options.expand != null ? !!options.expand : progressExpanded;
    }

      if (featureOn('statut')) {
        beginBootStep('statut');
        var statutMount =
          (progressBody &&
            progressBody.querySelector('.statut-in-progress-mount')) ||
          null;
        await mountStatutSection(statutMount);
        attachBlockedIntoStatut();
        completeBootStep('statut');
      } else {
        skipBootStep('statut');
      }
      if (experimentalOn('objectif') || focusObjectif) {
        beginBootStep('objectif');
        await mountObjectifSection(variant.card, focusObjectif);
        completeBootStep('objectif');
      } else {
        skipBootStep('objectif');
      }
      syncBlockedSubtasks();
      syncInfoRecap();

      var agentUi = null;
      if (featureOn('assistant') && window.AgentUI && window.PriorityAgent) {
        beginBootStep('assistant');
        agentUi = AgentUI.mount(variant.card, {
          t: t,
          scope: 'task',
          initiallyOpen: true,
          focusComposer: focusProgress,
          getScope: function () {
            return 'task';
          },
          getCardName: function () {
            return readCardNameLabel();
          },
          getCardDesc: function () {
            if (infoUi && typeof infoUi.getDesc === 'function') {
              return infoUi.getDesc() || '';
            }
            return cardDesc || '';
          },
          setCardName: function (name) {
            var next = typeof name === 'string' ? name.trim() : '';
            if (!next) {
              return Promise.resolve({ ok: false, reason: 'empty-name', changed: false });
            }
            if (!PriorityTrello || typeof PriorityTrello.setCardName !== 'function') {
              return Promise.resolve({ ok: false, reason: 'no-setCardName', changed: false });
            }
            return PriorityTrello.setCardName(t, next).then(function (result) {
              if (result && result.ok) {
                markTitleDirty();
                appliedTitleFp = next;
                setCardNameLabel(next);
                if (infoUi && typeof infoUi.setTitle === 'function') {
                  infoUi.setTitle(next, { force: true });
                }
                return commitHistoryNow('Titre modifié').then(function () {
                  return result;
                });
              }
              return result;
            });
          },
          setCardDesc: function (desc) {
            var next = typeof desc === 'string' ? desc : '';
            if (!PriorityTrello || typeof PriorityTrello.setCardDesc !== 'function') {
              return Promise.resolve({ ok: false, reason: 'no-setCardDesc', changed: false });
            }
            return PriorityTrello.setCardDesc(t, next).then(function (result) {
              if (result && result.ok) {
                markDescDirty();
                appliedDescFp = next;
                cardDesc = next;
                if (infoUi && typeof infoUi.setDesc === 'function') {
                  infoUi.setDesc(next, { force: true });
                }
                return commitHistoryNow('Description modifiée').then(function () {
                  return result;
                });
              }
              return result;
            });
          },
          getMemory: function () {
            return (
              cachedMemory || {
                version: 2,
                summary: '',
                facts: [],
                longTerm: { summary: '', facts: [] },
                shortTerm: { boardSummary: '', notes: [], recentCards: [] },
                onboardingComplete: false
              }
            );
          },
          onMemoryUpdate: function (next) {
            if (next && typeof next === 'object') {
              cachedMemory = next;
            }
          },
          getCardMemory: function () {
            return (
              cachedCardMemory || {
                version: 1,
                facts: [],
                updatedAt: ''
              }
            );
          },
          onCardMemoryUpdate: function (next) {
            if (next && typeof next === 'object') {
              cachedCardMemory = next;
            }
          },
          getProfile: function () {
            return cachedProfile;
          },
          getBoardDigest: function () {
            return boardDigestCache || '';
          },
          getFormulaKey: function () {
            if (variant && typeof variant.getFormulaKey === 'function') {
              return variant.getFormulaKey();
            }
            return boardFormula || 'baseline';
          },
          getPriorityState: function () {
            return variant && typeof variant.getState === 'function'
              ? variant.getState()
              : latestState || {};
          },
          getCompletion: function () {
            if (completionUi && typeof completionUi.getData === 'function') {
              return completionUi.getData();
            }
            return latestCompletion || { items: [] };
          },
          applyPriority: function (partial) {
            if (!variant || typeof variant.setState !== 'function') return;
            variant.setState(Object.assign({}, variant.getState(), partial || {}), {
              preserveCollapse: true
            });
            if (
              partial &&
              (Object.prototype.hasOwnProperty.call(partial, 'enAttente') ||
                Object.prototype.hasOwnProperty.call(partial, 'blockedLinks'))
            ) {
              syncProgressFromPriorityBlocked(
                typeof variant.getState === 'function' ? variant.getState() : partial
              );
            }
            scheduleHistoryCommit('Priorité (assistant)');
          },
          applyCompletion: function (next) {
            if (!completionUi || typeof completionUi.setData !== 'function') return;
            completionUi.setData(next);
            var live = completionUi.getData();
            saveCompletion(live);
            scheduleProgressSummary();
            syncBlockedSubtasks();
            syncDueBlockedForProgress(live);
            syncPriorityFromProgressBlocked(live);
            syncInfoRecap();
            maybeSilentEstimateDurations();
            // setData may have fired onAllCompleteChange; sync again so agent
            // updates to 100% always set Trello "Mark complete".
            syncDueCompleteFromProgress(live, {
              clearSuppress: progressIsFullyComplete(live),
            });
            if (live.progressEnabled !== false) {
              setProgressEnabled(true, {
                expand: false,
                preserveCollapse: true,
                persist: false
              });
            }
            scheduleHistoryCommit('Progrès (assistant)');
          },
          playEffect: function (name, opts) {
            if (
              !window.CelebrationEffects ||
              typeof CelebrationEffects.play !== 'function'
            ) {
              return { ok: false, error: 'CelebrationEffects indisponible' };
            }
            var options = opts && typeof opts === 'object' ? Object.assign({}, opts) : {};
            if (!options.root) options.root = document.body;
            return CelebrationEffects.play(name, options);
          },
          openSection: function (key, opts) {
            opts = opts || {};
            var expand = opts.expand === true;
            var target = null;
            if (key === 'progress') {
              if (progressCollapse && typeof progressCollapse.setExpanded === 'function') {
                if (expand) {
                  if (
                    typeof progressCollapse.isExpanded === 'function' &&
                    !progressCollapse.isExpanded()
                  ) {
                    progressCollapse.setExpanded(true);
                  }
                } else if (typeof progressCollapse.isExpanded === 'function') {
                  progressCollapse.setExpanded(!progressCollapse.isExpanded());
                }
              }
              target =
                (variant &&
                  variant.card &&
                  variant.card.querySelector('.variant-progress-section')) ||
                null;
            } else if (key === 'statut') {
              expandProgressSection();
              target =
                statutSection ||
                (variant &&
                  variant.card &&
                  variant.card.querySelector(
                    '.statut-in-progress-mount, .field--statut-embedded'
                  )) ||
                (variant &&
                  variant.card &&
                  variant.card.querySelector('.variant-progress-section')) ||
                null;
            } else if (key === 'objectif' || key === 'info') {
              if (infoUi && typeof infoUi.setExpanded === 'function') {
                infoUi.setExpanded(true);
              }
              if (key === 'objectif') {
                target =
                  (variant &&
                    variant.card &&
                    variant.card.querySelector(
                      '.variant-objectif-section, .info-row--objectif'
                    )) ||
                  null;
              } else {
                target =
                  (variant &&
                    variant.card &&
                    variant.card.querySelector(
                      '.variant-info-section, .info-section-body'
                    )) ||
                  null;
              }
            } else if (key === 'blocked') {
              if (expand) {
                expandProgressSection();
                if (statutUi && typeof statutUi.syncBlockedPanel === 'function') {
                  statutUi.syncBlockedPanel();
                }
              }
              jumpToSection('blocked');
              target =
                (typeof variant.getBlockedSection === 'function' &&
                  variant.getBlockedSection()) ||
                (variant.card &&
                  variant.card.querySelector('.statut-blocked-panel')) ||
                null;
            } else if (typeof variant.openSection === 'function') {
              target = variant.openSection(key, { expand: expand });
            } else if (variant.card) {
              if (key === 'priority') {
                target = variant.card.querySelector('.variant-priority-section');
              } else if (key === 'due') {
                target = variant.card.querySelector('.variant-due-section');
              }
            }
            if (target && expand) {
              setTimeout(function () {
                try {
                  target.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                } catch (e) { /* ignore */ }
                resizePopup();
              }, 0);
            }
            return target;
          },
          setFormulaKey: function (key) {
            if (variant && typeof variant.setFormulaKey === 'function') {
              variant.setFormulaKey(key);
            }
          },
          getStatut: function () {
            return latestStatut;
          },
          getOwnership: getOwnershipSnapshot,
          getCardLabels: function () {
            return latestCardLabels.slice();
          },
          getBoardMembers: function () {
            return latestBoardMembers.slice();
          },
          getBoardLabels: function () {
            return latestBoardLabels.slice();
          },
          loadBoardMembers: function () {
            if (latestBoardMembers.length) {
              return Promise.resolve(latestBoardMembers.slice());
            }
            if (typeof PriorityTrello.getBoardMembers !== 'function') {
              return Promise.resolve([]);
            }
            return PriorityTrello.getBoardMembers(t).then(function (list) {
              rememberBoardMembers(list);
              return latestBoardMembers.slice();
            });
          },
          loadBoardLabels: function () {
            if (latestBoardLabels.length) {
              return Promise.resolve(latestBoardLabels.slice());
            }
            if (typeof PriorityTrello.getBoardLabels !== 'function') {
              return Promise.resolve([]);
            }
            return PriorityTrello.getBoardLabels(t).then(function (list) {
              rememberBoardLabels(list);
              return latestBoardLabels.slice();
            });
          },
          loadCardLabels: function () {
            if (latestCardLabels.length) {
              return Promise.resolve(latestCardLabels.slice());
            }
            if (typeof PriorityTrello.getCardLabels !== 'function') {
              return Promise.resolve([]);
            }
            return PriorityTrello.getCardLabels(t).then(function (list) {
              rememberCardLabels(list);
              return latestCardLabels.slice();
            });
          },
          addMember: function (memberId) {
            if (!memberId || typeof PriorityTrello.addCardMember !== 'function') {
              return Promise.resolve({ ok: false, reason: 'unavailable' });
            }
            markMembersDirty();
            return PriorityTrello.addCardMember(t, memberId).then(function (result) {
              if (result && result.ok === false) return result;
              return PriorityTrello.getCardMembers(t).then(function (members) {
                rememberCardMembers(members);
                latestMembersFp = fingerprintIds(members);
                appliedMembersFp = latestMembersFp;
                if (infoUi && typeof infoUi.setMembers === 'function') {
                  infoUi.setMembers(members || []);
                }
                return commitHistoryNow('Membre ajouté (assistant)').then(function () {
                  return {
                    ok: true,
                    memberId: memberId,
                    changed: !!(result && result.changed)
                  };
                });
              });
            });
          },
          removeMember: function (memberId) {
            if (!memberId || typeof PriorityTrello.removeCardMember !== 'function') {
              return Promise.resolve({ ok: false, reason: 'unavailable' });
            }
            markMembersDirty();
            return PriorityTrello.removeCardMember(t, memberId).then(function (result) {
              if (result && result.ok === false) return result;
              return PriorityTrello.getCardMembers(t).then(function (members) {
                rememberCardMembers(members);
                latestMembersFp = fingerprintIds(members);
                appliedMembersFp = latestMembersFp;
                if (infoUi && typeof infoUi.setMembers === 'function') {
                  infoUi.setMembers(members || []);
                }
                return commitHistoryNow('Membre retiré (assistant)').then(function () {
                  return {
                    ok: true,
                    memberId: memberId,
                    changed: !!(result && result.changed)
                  };
                });
              });
            });
          },
          addLabel: function (labelId) {
            if (!labelId || typeof PriorityTrello.addCardLabel !== 'function') {
              return Promise.resolve({ ok: false, reason: 'unavailable' });
            }
            markLabelsDirty();
            return PriorityTrello.addCardLabel(t, labelId).then(function (result) {
              if (result && result.ok === false) return result;
              return PriorityTrello.getCardLabels(t).then(function (labels) {
                rememberCardLabels(labels);
                latestLabelsFp = fingerprintIds(labels);
                appliedLabelsFp = latestLabelsFp;
                if (infoUi && typeof infoUi.setLabels === 'function') {
                  infoUi.setLabels(labels || []);
                }
                return commitHistoryNow('Étiquette ajoutée (assistant)').then(function () {
                  return {
                    ok: true,
                    labelId: labelId,
                    changed: !!(result && result.changed)
                  };
                });
              });
            });
          },
          removeLabel: function (labelId) {
            if (!labelId || typeof PriorityTrello.removeCardLabel !== 'function') {
              return Promise.resolve({ ok: false, reason: 'unavailable' });
            }
            markLabelsDirty();
            return PriorityTrello.removeCardLabel(t, labelId).then(function (result) {
              if (result && result.ok === false) return result;
              return PriorityTrello.getCardLabels(t).then(function (labels) {
                rememberCardLabels(labels);
                latestLabelsFp = fingerprintIds(labels);
                appliedLabelsFp = latestLabelsFp;
                if (infoUi && typeof infoUi.setLabels === 'function') {
                  infoUi.setLabels(labels || []);
                }
                return commitHistoryNow('Étiquette retirée (assistant)').then(function () {
                  return {
                    ok: true,
                    labelId: labelId,
                    changed: !!(result && result.changed)
                  };
                });
              });
            });
          },
          createLabel: function (payload) {
            if (typeof PriorityTrello.createBoardLabel !== 'function') {
              return Promise.resolve({ ok: false, reason: 'unavailable' });
            }
            var name =
              payload && typeof payload.name === 'string' ? payload.name.trim() : '';
            if (!name) {
              return Promise.resolve({ ok: false, reason: 'empty-name' });
            }
            markLabelsDirty();
            return PriorityTrello.createBoardLabel(t, {
              name: name,
              color: payload && payload.color,
              addToCard: true
            }).then(function (result) {
              if (result && result.ok === false) return result;
              return Promise.all([
                PriorityTrello.getCardLabels(t),
                PriorityTrello.getBoardLabels
                  ? PriorityTrello.getBoardLabels(t)
                  : Promise.resolve([])
              ]).then(function (parts) {
                var labels = parts[0] || [];
                var boardLabels = parts[1] || [];
                rememberCardLabels(labels);
                rememberBoardLabels(boardLabels);
                latestLabelsFp = fingerprintIds(labels);
                appliedLabelsFp = latestLabelsFp;
                if (infoUi && typeof infoUi.setLabels === 'function') {
                  infoUi.setLabels(labels);
                }
                if (infoUi && typeof infoUi.setBoardLabels === 'function') {
                  infoUi.setBoardLabels(boardLabels);
                }
                return commitHistoryNow('Étiquette créée (assistant)').then(function () {
                  return {
                    ok: true,
                    changed: true,
                    label: (result && result.label) || null,
                    labelId: result && result.labelId
                  };
                });
              });
            });
          },
          setCustomAssignees: function (list) {
            var people =
              PriorityUI && typeof PriorityUI.normalizeCustomAssignees === 'function'
                ? PriorityUI.normalizeCustomAssignees(list)
                : Array.isArray(list)
                  ? list
                  : [];
            var base =
              (variant && typeof variant.getState === 'function'
                ? variant.getState()
                : null) ||
              latestState ||
              {};
            var next = Object.assign({}, base, { customAssignees: people });
            if (!people.length) delete next.customAssignees;
            if (variant && typeof variant.setState === 'function') {
              variant.setState(next, { preserveCollapse: true });
            }
            latestState = Object.assign({}, next);
            if (infoUi && typeof infoUi.setCustomAssignees === 'function') {
              infoUi.setCustomAssignees(people);
            }
            return Promise.resolve(saveState(next)).then(function () {
              return commitHistoryNow('Personnes assignées (assistant)').then(
                function () {
                  return { ok: true, changed: true, customAssignees: people };
                }
              );
            });
          },
          setMemberRoles: function (rolesMap) {
            var map =
              PriorityUI && typeof PriorityUI.normalizeMemberRoles === 'function'
                ? PriorityUI.normalizeMemberRoles(rolesMap)
                : rolesMap && typeof rolesMap === 'object'
                  ? rolesMap
                  : {};
            var base =
              (variant && typeof variant.getState === 'function'
                ? variant.getState()
                : null) ||
              latestState ||
              {};
            var customs =
              PriorityUI && typeof PriorityUI.pruneMemberRoleCustoms === 'function'
                ? PriorityUI.pruneMemberRoleCustoms(
                    base.memberRoleCustoms,
                    map
                  )
                : Array.isArray(base.memberRoleCustoms)
                  ? base.memberRoleCustoms
                  : [];
            var next = Object.assign({}, base, {
              memberRoles: map,
              memberRoleCustoms: customs,
            });
            if (!Object.keys(map).length) delete next.memberRoles;
            if (!customs.length) delete next.memberRoleCustoms;
            if (variant && typeof variant.setState === 'function') {
              variant.setState(next, { preserveCollapse: true });
            }
            latestState = Object.assign({}, next);
            if (infoUi && typeof infoUi.setMemberRoles === 'function') {
              infoUi.setMemberRoles(map);
            }
            return Promise.resolve(saveState(next)).then(function () {
              return commitHistoryNow('Rôles des assignés (assistant)').then(
                function () {
                  return { ok: true, changed: true, memberRoles: map };
                }
              );
            });
          },
          getHistory: function () {
            if (!cardHistory) {
              return { canUndo: false, canRedo: false, entries: [] };
            }
            var entries =
              typeof cardHistory.list === 'function' ? cardHistory.list() : [];
            return {
              canUndo:
                typeof cardHistory.canUndo === 'function'
                  ? !!cardHistory.canUndo()
                  : false,
              canRedo:
                typeof cardHistory.canRedo === 'function'
                  ? !!cardHistory.canRedo()
                  : false,
              entries: Array.isArray(entries) ? entries : [],
            };
          },
          historyUndo: function () {
            return runHistoryUndo();
          },
          historyRedo: function () {
            return runHistoryRedo();
          },
          historyRevert: function (entryId) {
            return runHistoryRevert(entryId);
          },
          selectStatut: function (listId) {
            return applyStatutListSelection(listId);
          },
          getGoals: function () {
            return latestGoals;
          },
          setProject: function (projectId) {
            if (!window.GoalsTrello) {
              return Promise.resolve({ ok: false, reason: 'no-goals' });
            }
            return GoalsTrello.setCardProjectId(t, projectId || null)
              .then(function (id) {
                return refreshObjectifData().then(function () {
                  return commitHistoryNow('Projet lié').then(function () {
                    return { ok: true, projectId: id };
                  });
                });
              })
              .catch(function (err) {
                return {
                  ok: false,
                  reason: (err && err.message) || 'set-project-failed',
                };
              });
          },
          onLayoutChange: resizePopup,
          onExpandChange: function (isExpanded) {
            var chatSection =
              (agentUi && agentUi.el) ||
              (variant &&
                variant.card &&
                variant.card.querySelector('.variant-chat-section')) ||
              document.querySelector('.variant-chat-section');
            syncAssistantSplitDock(chatSection, !!isExpanded);
            resizePopup();
          }
        });
        completeBootStep('assistant');
      } else if (featureOn('assistant')) {
        console.error('Priority popup: AgentUI / PriorityAgent unavailable');
        skipBootStep('assistant');
      } else {
        skipBootStep('assistant');
      }

      if (window.CardHistory && typeof CardHistory.create === 'function') {
        beginBootStep('history');
        cardHistory = CardHistory.create({
          t: t,
          onChange: function () {
            if (historyUi && typeof historyUi.refresh === 'function') {
              historyUi.refresh();
            }
          }
        });
        try {
          await cardHistory.load();
        } catch (histLoadErr) {
          console.error('CardHistory.load failed', histLoadErr);
        }
        historyUi = mountHistoriqueSection(variant.card);
        try {
          historyBaseline = await captureHistorySnapshot();
        } catch (histSnapErr) {
          console.error('History baseline failed', histSnapErr);
          historyBaseline = null;
        }
        historyReady = true;
        document.addEventListener('keydown', onHistoryKeyDown, true);
        if (historyUi && typeof historyUi.refresh === 'function') {
          historyUi.refresh();
        }
        completeBootStep('history');
      } else {
        skipBootStep('history');
      }

      placeAssistantInRail(agentUi);

      beginBootStep('ready');
      if (window.UserProfile && typeof UserProfile.applyFeaturesToCard === 'function' && variant && variant.card) {
        UserProfile.applyFeaturesToCard(variant.card, cachedProfile);
        syncOverview();
      }

      await cardNamePromise;
      if (focusProgress && agentUi && typeof agentUi.focusComposer === 'function') {
        agentUi.focusComposer();
      } else if (focusBlocked && typeof jumpToSection === 'function') {
        jumpToSection('blocked');
      } else if (focusDue && typeof jumpToSection === 'function') {
        jumpToSection('due');
      } else if (focusObjectif && objectifSection) {
        if (infoUi && typeof infoUi.setExpanded === 'function') {
          infoUi.setExpanded(true);
        }
        objectifSection.scrollIntoView({ block: 'nearest' });
      } else if (!focusProgress) {
        window.scrollTo(0, 0);
      }
      resizePopup();
      startLiveSync();
      if (window.TpDebug) TpDebug.log('popup', 'init.ready');
      completeBootStep('ready');
      finishBoot();
      loadBuildInfo();
    }

    window.addEventListener('pagehide', function () {
      if (window.TpDebug) TpDebug.log('popup', 'pagehide');
      clearBootTimer();
      if (buildStampTimer) {
        clearInterval(buildStampTimer);
        buildStampTimer = null;
      }
      if (liveSyncTimer) {
        clearInterval(liveSyncTimer);
        liveSyncTimer = null;
      }
      document.removeEventListener('keydown', onHistoryKeyDown, true);
      if (historyCommitTimer) {
        clearTimeout(historyCommitTimer);
        historyCommitTimer = null;
      }
      if (infoUi && typeof infoUi.flushDesc === 'function') {
        infoUi.flushDesc();
      }
      if (latestState) {
        saveState(latestState);
      }
      if (latestCompletion) {
        saveCompletion(latestCompletion);
      }
    });

    return init().catch(function (err) {
      finishBoot({
        error:
          'Impossible de charger la carte. Fermez cette fenêtre et réessayez.',
      });
      throw err;
    });
    }).catch(function (err) {
      if (window.TpDebug) TpDebug.error('popup', 'init', err);
      else console.error('Priority popup init failed', err);
      // Fallback if boot helpers never ran (iframe client failed before callback body).
      if (!document.body.classList.contains('is-boot-error')) {
        document.body.classList.remove('is-boot-leaving');
        document.body.classList.add('is-booting');
        document.body.classList.add('is-boot-error');
        var boot = document.getElementById('popupBoot');
        var msg = document.getElementById('popupBootMsg');
        if (boot) {
          boot.hidden = false;
          boot.classList.remove('is-leaving');
          boot.classList.add('is-error');
          boot.setAttribute('aria-busy', 'false');
        }
        if (msg) {
          msg.textContent =
            'Impossible de charger la carte. Fermez cette fenêtre et réessayez.';
        }
      }
    });
  </script>
</body>
