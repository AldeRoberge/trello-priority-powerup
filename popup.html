      console.error('Priority popup: priority-ui.js did not expose window.PriorityUI');
    }
  </script>
  <script src="./components/priority/priority-trello.js?v=task-types-dismiss-1"></script>
  <script src="./components/statut/statut-match.js?v=attente-hourglass-1"></script>
  <script src="./components/statut/statut-trello.js?v=encours-progress-1"></script>

    src="./components/completion/completion-ui.js?v=ui-sfx-1"
    onerror="console.error('Priority popup: failed to load completion-ui.js', this.src)"
  ></script>
  <script
    src="./components/completion/completion-trello.js?v=encours-progress-1"
    onerror="console.error('Priority popup: failed to load completion-trello.js', this.src)"
  ></script>
  <script>
    if (!window.CompletionUI || !window.CompletionTrello) {
      console.error('Priority popup: completion modules did not expose globals', {
        CompletionUI: typeof window.CompletionUI,
        CompletionTrello: typeof window.CompletionTrello
      });
    }
  </script>

  <script src="./components/profile/user-profile.js?v=agent-identity-1"></script>
  <script src="./components/shared/spellcheck.js?v=spellcheck-4"></script>
  <script src="./components/agent/agent-ui.js?v=attente-hourglass-1"></script>

<body class="tp-page tp-page--priority">
  <div class="compare-page">
    <div class="compare-grid" id="priorityMount"></div>
  </div>

  <script>
    PriorityTrello.initIframePage(function (t) {
    const mountEl = document.getElementById('priorityMount');
    let variant = null;
    let completionUi = null;
    let latestState = null;
    let latestCompletion = null;
    let saveChain = Promise.resolve();
    let completionSaveChain = Promise.resolve();
    let progressEnabled = true;
    let progressExpanded = false;
    let progressPanel = null;
    let progressField = null;
    let progressBody = null;
    let progressCollapse = null;
    let progressSummaryEl = null;
    let dueCompleteSyncChain = Promise.resolve();
    let statutUi = null;
    let statutSection = null;
    let latestStatut = null;
    let latestGoals = null;
    let objectifUi = null;
    let objectifSection = null;
    let infoUi = null;
    let infoSection = null;
    let overviewUi = null;
    let overviewSection = null;
    let cardDesc = '';
    let cardNameCache = '';
    let cardNamePromise = Promise.resolve('');
    let cachedMemory = null;
    let cachedCardMemory = null;
    let cachedProfile = null;
    let boardDigestCache = '';
    let latestMembersFp = '';
    let latestLabelsFp = '';

    // Cross-user live sync: re-read shared plugin data on t.render + light poll.
    var LIVE_SYNC_POLL_MS = 3000;
    var LOCAL_DIRTY_MS = 2500;
    var applyingRemote = false;
    var priorityDirtyUntil = 0;
    var completionDirtyUntil = 0;
    var prioritySavePending = false;
    var completionSavePending = false;
    var appliedPriorityFp = '';
    var appliedCompletionFp = '';
    var appliedStatutListId = undefined;
    var appliedGoalsProjectId = undefined;
    var appliedTitleFp = undefined;
    var appliedDescFp = undefined;
    var appliedMembersFp = undefined;
    var appliedLabelsFp = undefined;
    var titleDirtyUntil = 0;
    var descDirtyUntil = 0;
    var membersDirtyUntil = 0;
    var labelsDirtyUntil = 0;
    var titleSavePending = false;
    var descSavePending = false;
    var liveSyncTimer = null;
    var syncFromRemoteChain = Promise.resolve();
    var liveSyncStarted = false;

    // Card edit history (Ctrl+Z / Historique)
    var cardHistory = null;
    var historyUi = null;
    var historyBaseline = null;
    var historyReady = false;
    var historyCommitTimer = null;
    var historyCommitChain = Promise.resolve();
    var HISTORY_DEBOUNCE_MS = 450;

    function stableFp(value) {
      try {
        return JSON.stringify(value == null ? null : value);
      } catch (e) {
        return '';
      }
    }

    function fingerprintPriority(inputs) {
      var n =
        PriorityTrello.normalizeInputs
          ? PriorityTrello.normalizeInputs(inputs)
          : inputs;
      return stableFp(n);
    }

    function fingerprintCompletion(data) {
      var n =
        typeof CompletionTrello !== 'undefined' &&
        CompletionTrello.normalizeCompletionData
          ? CompletionTrello.normalizeCompletionData(data)
          : data;
      return stableFp(withProgressEnabledFlag(n));
    }

    function markPriorityDirty() {
      priorityDirtyUntil = Date.now() + LOCAL_DIRTY_MS;
    }

    function markCompletionDirty() {
      completionDirtyUntil = Date.now() + LOCAL_DIRTY_MS;
    }

    function isPriorityDirty() {
      return prioritySavePending || Date.now() < priorityDirtyUntil;
    }

    function isCompletionDirty() {
      return completionSavePending || Date.now() < completionDirtyUntil;
    }

    function isTitleDirty() {
      return titleSavePending || Date.now() < titleDirtyUntil;
    }

    function isDescDirty() {
      return descSavePending || Date.now() < descDirtyUntil;
    }

    function isMembersDirty() {
      return Date.now() < membersDirtyUntil;
    }

    function isLabelsDirty() {
      return Date.now() < labelsDirtyUntil;
    }

    function markTitleDirty() {
      titleDirtyUntil = Date.now() + LOCAL_DIRTY_MS;
    }

    function markDescDirty() {
      descDirtyUntil = Date.now() + LOCAL_DIRTY_MS;
    }

    function markMembersDirty() {
      membersDirtyUntil = Date.now() + LOCAL_DIRTY_MS;
    }

    function markLabelsDirty() {
      labelsDirtyUntil = Date.now() + LOCAL_DIRTY_MS;
    }

    function fingerprintIds(list) {
      return (list || [])
        .map(function (item) {
          return item && item.id != null ? String(item.id) : '';
        })
        .filter(Boolean)
        .sort()
        .join(',');
    }

    /** Live Trello card fields — bypass getCardName (prefers stale popup arg). */
    function fetchLiveCardInfo() {
      var basicsPromise = t
        .card('name', 'desc')
        .then(function (card) {
          return {
            name:
              card && typeof card.name === 'string' ? card.name : '',
            desc:
              card && typeof card.desc === 'string' ? card.desc : '',
          };
        })
        .catch(function (err) {
          console.error('Live sync card basics failed', err);
          return { name: null, desc: null };
        });

      return Promise.all([
        basicsPromise,
        PriorityTrello.getCardMembers
          ? PriorityTrello.getCardMembers(t)
          : Promise.resolve(null),
        PriorityTrello.getCardLabels
          ? PriorityTrello.getCardLabels(t)
          : Promise.resolve(null),
      ]).then(function (parts) {
        return {
          name: parts[0].name,
          desc: parts[0].desc,
          members: parts[1],
          labels: parts[2],
        };
      });
    }

    function applyRemoteTitle(name) {
      var trimmed = typeof name === 'string' ? name.trim() : '';
      if (infoUi && typeof infoUi.setTitle === 'function') {
        infoUi.setTitle(trimmed);
        // setTitle no-ops while dirty/focused — retry next poll.
        if ((infoUi.getTitle() || '').trim() !== trimmed) return;
      }
      appliedTitleFp = trimmed;
      setCardNameLabel(trimmed);
      resizePopup();
      refreshHistoryBaseline();
    }

    function applyRemoteDesc(desc) {
      var next = typeof desc === 'string' ? desc : '';
      if (infoUi && typeof infoUi.setDesc === 'function') {
        infoUi.setDesc(next);
        if (typeof infoUi.getDesc === 'function' && infoUi.getDesc() !== next) {
          return;
        }
      }
      cardDesc = next;
      appliedDescFp = next;
      resizePopup();
      refreshHistoryBaseline();
    }

    function applyRemoteMembers(members) {
      var list = Array.isArray(members) ? members : [];
      appliedMembersFp = fingerprintIds(list);
      latestMembersFp = appliedMembersFp;
      if (infoUi && typeof infoUi.setMembers === 'function') {
        infoUi.setMembers(list);
      }
      resizePopup();
      refreshHistoryBaseline();
    }

    function applyRemoteLabels(labels) {
      var list = Array.isArray(labels) ? labels : [];
      appliedLabelsFp = fingerprintIds(list);
      latestLabelsFp = appliedLabelsFp;
      if (infoUi && typeof infoUi.setLabels === 'function') {
        infoUi.setLabels(list);
      }
      resizePopup();
      refreshHistoryBaseline();
    }

    function buildLatestStatut(statut, fallbackListId) {
      statut = statut || {};
      return {
        listId: statut.listId || fallbackListId || null,
        listName: statut.listName || '',
        category: statut.category || null,
        lists: (statut.lists || []).map(function (list) {
          return {
            id: list.id,
            name: list.name,
            category:
              (statut.settings &&
                statut.settings.listCategories &&
                statut.settings.listCategories[list.id]) ||
              null,
          };
        }),
        roleLists: (statut.settings && statut.settings.roleLists) || {},
      };
    }

    function applyRemotePriority(remote) {
      if (!variant || typeof variant.setState !== 'function') return;
      var normalized =
        PriorityTrello.normalizeInputs
          ? PriorityTrello.normalizeInputs(remote)
          : Object.assign({}, remote || {});
      if (!normalized) return;
      applyingRemote = true;
      try {
        variant.setState(Object.assign({}, normalized), {
          preserveCollapse: true,
          silent: true,
        });
      } finally {
        applyingRemote = false;
      }
      latestState = Object.assign({}, normalized);
      appliedPriorityFp = fingerprintPriority(latestState);
      syncInfoRecap(latestState);
      attachBlockedIntoStatut();
      resizePopup();
      refreshHistoryBaseline();
    }

    function applyRemoteCompletion(remote) {
      var next = withProgressEnabledFlag(remote);
      latestCompletion = next;
      if (completionUi && typeof completionUi.setData === 'function') {
        completionUi.setData(next);
      }
      appliedCompletionFp = fingerprintCompletion(next);
      if (progressCollapse) progressCollapse.refreshSummary();
      syncBlockedSubtasks();
      syncDueBlockedForProgress(next);
      syncDueCompleteFromProgress(next);
      syncInfoRecap();
      resizePopup();
      refreshHistoryBaseline();
    }

    function applyRemoteStatut(statut) {
      if (!statutUi) return;
      latestStatut = buildLatestStatut(statut);
      appliedStatutListId = latestStatut.listId || null;
      if (typeof statutUi.setData === 'function') {
        statutUi.setData({
          listId: statut.listId,
          lists: statut.lists,
          settings: statut.settings,
        });
      } else if (typeof statutUi.syncBlockedPanel === 'function') {
        statutUi.syncBlockedPanel();
      }
      attachBlockedIntoStatut();
      syncOverview();
      resizePopup();
      refreshHistoryBaseline();
    }

    function syncFromRemote() {
      var colorPromise = PriorityTrello.getBoardColorScheme(t)
        .then(function () {
          if (variant && typeof variant.repaint === 'function') variant.repaint();
        })
        .catch(function (err) {
          console.error('Priority popup color scheme refresh failed', err);
        });

      if (typeof CompletionTrello !== 'undefined' && CompletionTrello.getBoardCompletionColorScheme) {
        CompletionTrello.getBoardCompletionColorScheme(t).catch(function (err) {
          console.error('Completion color scheme refresh failed', err);
        });
      }

      if (!liveSyncStarted || !variant) return colorPromise;

      syncFromRemoteChain = syncFromRemoteChain
        .then(function () {
          return Promise.all([
            PriorityTrello.getCardInputs(t),
            typeof CompletionTrello !== 'undefined' &&
              CompletionTrello.getCardCompletion
              ? CompletionTrello.getCardCompletion(t)
              : Promise.resolve(null),
            window.StatutTrello && statutUi
              ? StatutTrello.getCardStatut(t)
              : Promise.resolve(null),
            window.GoalsTrello && objectifUi
              ? GoalsTrello.getCardProjectId(t)
              : Promise.resolve(undefined),
            fetchLiveCardInfo(),
          ]);
        })
        .then(function (results) {
          var remotePriority = results[0];
          var remoteCompletion = results[1];
          var remoteStatut = results[2];
          var remoteProjectId = results[3];
          var remoteInfo = results[4];

          if (remotePriority) {
            var remotePriorityFp = fingerprintPriority(remotePriority);
            if (remotePriorityFp !== appliedPriorityFp && !isPriorityDirty()) {
              applyRemotePriority(remotePriority);
            }
          }

          if (remoteCompletion && completionUi) {
            var remoteCompletionFp = fingerprintCompletion(remoteCompletion);
            if (
              remoteCompletionFp !== appliedCompletionFp &&
              !isCompletionDirty()
            ) {
              applyRemoteCompletion(remoteCompletion);
            }
          }

          if (remoteStatut && statutUi) {
            var listId = remoteStatut.listId || null;
            if (listId !== appliedStatutListId) {
              applyRemoteStatut(remoteStatut);
            }
          }

          if (remoteInfo) {
            if (remoteInfo.name != null) {
              var remoteTitle = String(remoteInfo.name || '').trim();
              if (remoteTitle !== appliedTitleFp && !isTitleDirty()) {
                applyRemoteTitle(remoteTitle);
              }
            }
            if (remoteInfo.desc != null) {
              var remoteDesc = String(remoteInfo.desc || '');
              if (remoteDesc !== appliedDescFp && !isDescDirty()) {
                applyRemoteDesc(remoteDesc);
              }
            }
            if (Array.isArray(remoteInfo.members)) {
              var remoteMembersFp = fingerprintIds(remoteInfo.members);
              if (remoteMembersFp !== appliedMembersFp && !isMembersDirty()) {
                applyRemoteMembers(remoteInfo.members);
              }
            }
            if (Array.isArray(remoteInfo.labels)) {
              var remoteLabelsFp = fingerprintIds(remoteInfo.labels);
              if (remoteLabelsFp !== appliedLabelsFp && !isLabelsDirty()) {
                applyRemoteLabels(remoteInfo.labels);
              }
            }
          }

          if (objectifUi && remoteProjectId !== appliedGoalsProjectId) {
            appliedGoalsProjectId = remoteProjectId;
            return refreshObjectifData().then(function () {
              refreshHistoryBaseline();
            });
          }
        })
        .catch(function (err) {
          console.error('Priority popup live sync failed', err);
        });

      return syncFromRemoteChain;
    }

    function startLiveSync() {
      if (liveSyncStarted) return;
      liveSyncStarted = true;
      appliedPriorityFp = fingerprintPriority(
        latestState ||
          (variant && typeof variant.getState === 'function'
            ? variant.getState()
            : null)
      );
      if (latestCompletion || completionUi) {
        appliedCompletionFp = fingerprintCompletion(
          (completionUi && typeof completionUi.getData === 'function'
            ? completionUi.getData()
            : null) || latestCompletion
        );
      }
      if (latestStatut) {
        appliedStatutListId = latestStatut.listId || null;
      }
      if (latestGoals) {
        appliedGoalsProjectId = latestGoals.projectId || null;
      }
      appliedTitleFp = readCardNameLabel() || cardNameCache || '';
      appliedDescFp =
        (infoUi && typeof infoUi.getDesc === 'function'
          ? infoUi.getDesc()
          : null) ||
        cardDesc ||
        '';
      appliedMembersFp =
        typeof latestMembersFp === 'string' ? latestMembersFp : '';
      appliedLabelsFp =
        typeof latestLabelsFp === 'string' ? latestLabelsFp : '';
      if (liveSyncTimer) clearInterval(liveSyncTimer);
      liveSyncTimer = setInterval(function () {
        if (document.visibilityState === 'hidden') return;
        syncFromRemote();
      }, LIVE_SYNC_POLL_MS);
      syncFromRemote();
    }

    t.render(function () {
      syncFromRemote();
    });

    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible' && liveSyncStarted) {
        syncFromRemote();
      }
    });

    function saveState(state) {
      var wasBlocked = !!(latestState && latestState.enAttente);
      // Snapshot — variant state is mutated during slider animation / getState sync.
      var snapshot = Object.assign({}, state || {});
      latestState = snapshot;
      appliedPriorityFp = fingerprintPriority(snapshot);
      if (applyingRemote) {
        return Promise.resolve();
      }
      markPriorityDirty();
      prioritySavePending = true;
      saveChain = saveChain
        .then(function () {
          return PriorityTrello.saveCardInputs(t, snapshot);
        })
        .then(function () {
          if (
            ((snapshot.enAttente && !wasBlocked) ||
              (wasBlocked && !snapshot.enAttente)) &&
            statutUi &&
            StatutTrello
          ) {
            return StatutTrello.getCardStatut(t).then(function (statut) {
              if (statutUi && typeof statutUi.setData === 'function') {
                statutUi.setData({
                  listId: statut.listId,
                  lists: statut.lists,
                  settings: statut.settings,
                });
              }
              appliedStatutListId = (statut && statut.listId) || null;
              if (statut) latestStatut = buildLatestStatut(statut);
            });
          }
        })
        .catch(function (err) {
          console.error('Priority save failed', err);
        })
        .then(function () {
          prioritySavePending = false;
          scheduleHistoryCommit('priority');
        });
      return saveChain;
    }

    function withProgressEnabledFlag(data) {
      var next = Object.assign({}, data || {});
      // Progrès is always on — drop any legacy progressEnabled:false.
      delete next.progressEnabled;
      return next;
    }

    function saveCompletion(data) {
      latestCompletion = withProgressEnabledFlag(data);
      appliedCompletionFp = fingerprintCompletion(latestCompletion);
      markCompletionDirty();
      completionSavePending = true;
      completionSaveChain = completionSaveChain
        .then(function () {
          return CompletionTrello.saveCardCompletion(t, latestCompletion);
        })
        .catch(function (err) {
          console.error('Completion save failed', err);
        })
        .then(function () {
          completionSavePending = false;
          scheduleHistoryCommit('completion');
        });
      return completionSaveChain;
    }

    function cloneHistoryValue(value) {
      if (window.CardHistory && typeof CardHistory.clone === 'function') {
        return CardHistory.clone(value);
      }
      try {
        return JSON.parse(JSON.stringify(value == null ? null : value));
      } catch (e) {
        return value;
      }
    }

    function idListFromMembersOrLabels(list) {
      if (!Array.isArray(list)) return [];
      return list
        .map(function (item) {
          return item && item.id ? String(item.id) : '';
        })
        .filter(Boolean)
        .sort();
    }

    function normalizePriorityForHistory(raw) {
      if (
        window.PriorityTrello &&
        typeof PriorityTrello.normalizeInputs === 'function'
      ) {
        return PriorityTrello.normalizeInputs(raw) || cloneHistoryValue(raw) || {};
      }
      return cloneHistoryValue(raw) || {};
    }

    function normalizeCompletionForHistory(raw) {
      if (
        typeof CompletionTrello !== 'undefined' &&
        CompletionTrello.normalizeCompletionData
      ) {
        return withProgressEnabledFlag(
          CompletionTrello.normalizeCompletionData(raw)
        );
      }
      return withProgressEnabledFlag(cloneHistoryValue(raw) || { items: [] });
    }

    function captureHistorySnapshot() {
      var priorityRaw =
        (variant && typeof variant.getState === 'function'
          ? variant.getState()
          : null) ||
        latestState ||
        {};
      var completionRaw =
        (completionUi && typeof completionUi.getData === 'function'
          ? completionUi.getData()
          : null) ||
        latestCompletion ||
        { items: [] };

      var name =
        (infoUi && typeof infoUi.getTitle === 'function' && infoUi.getTitle()) ||
        cardNameCache ||
        '';
      var desc =
        (infoUi && typeof infoUi.getDesc === 'function' && infoUi.getDesc()) ||
        cardDesc ||
        '';

      var listId = (latestStatut && latestStatut.listId) || null;
      var listName = '';
      if (latestStatut) {
        listName = latestStatut.listName || '';
        if (!listName && listId && Array.isArray(latestStatut.lists)) {
          for (var li = 0; li < latestStatut.lists.length; li++) {
            var list = latestStatut.lists[li];
            if (list && String(list.id) === String(listId)) {
              listName = list.name || '';
              break;
            }
          }
        }
      }
      var projectId =
        latestGoals && latestGoals.projectId != null
          ? latestGoals.projectId
          : null;
      var projectName = '';
      if (
        latestGoals &&
        latestGoals.hierarchy &&
        latestGoals.hierarchy.project &&
        latestGoals.hierarchy.project.name
      ) {
        projectName = latestGoals.hierarchy.project.name;
      }

      var dueCompletePromise =
        PriorityTrello && typeof PriorityTrello.getCardDueComplete === 'function'
          ? PriorityTrello.getCardDueComplete(t)
          : Promise.resolve(false);
      var membersPromise =
        PriorityTrello && typeof PriorityTrello.getCardMembers === 'function'
          ? PriorityTrello.getCardMembers(t)
          : Promise.resolve([]);
      var labelsPromise =
        PriorityTrello && typeof PriorityTrello.getCardLabels === 'function'
          ? PriorityTrello.getCardLabels(t)
          : Promise.resolve([]);

      return Promise.all([dueCompletePromise, membersPromise, labelsPromise]).then(
        function (results) {
          var members = results[1] || [];
          var labels = results[2] || [];
          return {
            priority: normalizePriorityForHistory(priorityRaw),
            completion: normalizeCompletionForHistory(completionRaw),
            statut: {
              listId: listId ? String(listId) : null,
              listName: listName || '',
              dueComplete: !!results[0]
            },
            info: {
              name: typeof name === 'string' ? name : '',
              desc: typeof desc === 'string' ? desc : '',
              memberIds: idListFromMembersOrLabels(members),
              labelIds: idListFromMembersOrLabels(labels),
              members: members.map(function (m) {
                return {
                  id: m && m.id ? String(m.id) : '',
                  name:
                    (m && (m.fullName || m.username || m.initials)) ||
                    'membre'
                };
              }).filter(function (m) { return m.id; }),
              labels: labels.map(function (l) {
                return {
                  id: l && l.id ? String(l.id) : '',
                  name: (l && (l.name || l.color)) || 'étiquette'
                };
              }).filter(function (l) { return l.id; })
            },
            goals: {
              projectId: projectId ? String(projectId) : null,
              projectName: projectName || ''
            }
          };
        }
      );
    }

    function refreshHistoryBaseline() {
      if (!historyReady || !cardHistory) return Promise.resolve();
      if (cardHistory.isMuted && cardHistory.isMuted()) return Promise.resolve();
      return captureHistorySnapshot().then(function (snap) {
        historyBaseline = snap;
      });
    }

    function scheduleHistoryCommit(hint) {
      if (!historyReady || !cardHistory) return;
      if (cardHistory.isMuted && cardHistory.isMuted()) return;
      if (applyingRemote) return;
      if (historyCommitTimer) clearTimeout(historyCommitTimer);
      historyCommitTimer = setTimeout(function () {
        historyCommitTimer = null;
        commitHistoryNow(hint);

    function commitHistoryNow(hint) {

      if (historyCommitTimer) {

        .then(function () {

        .then(function (after) {

          var entry = cardHistory.record(historyBaseline, after, hint);

          if (entry && historyUi && typeof historyUi.refresh === 'function') {
            historyUi.refresh();
          }
          return entry;
        })
        .catch(function (err) {
          console.error('History commit failed', err);
          return null;
        });

    function syncIdsViaAddRemove(wantIds, getCurrent, addOne, removeOne) {
      wantIds = (wantIds || []).map(String);
      return Promise.resolve(getCurrent()).then(function (currentList) {
        var currentIds = idListFromMembersOrLabels(currentList);
        var wantSet = Object.create(null);
        wantIds.forEach(function (id) {
          wantSet[id] = true;
        });
        var curSet = Object.create(null);
        currentIds.forEach(function (id) {
          curSet[id] = true;
        });
        var chain = Promise.resolve();
        wantIds.forEach(function (id) {
          if (!curSet[id]) {
            chain = chain.then(function () {
              return addOne(id);
            });
          }
        });
        currentIds.forEach(function (id) {
          if (!wantSet[id]) {
            chain = chain.then(function () {
              return removeOne(id);
            });
          }
        });
        return chain;
      });

        if (info.memberIds && PriorityTrello.getCardMembers) {

            return syncIdsViaAddRemove(

    function isEditableHistoryTarget(target) {
      if (!target || target === document.body) return false;
      var tag = (target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || tag === 'select') return true;
      if (target.isContentEditable) return true;
      var editable = target.closest && target.closest('[contenteditable="true"]');
      return !!editable;
    }

    function onHistoryKeyDown(ev) {
      var mod = ev.ctrlKey || ev.metaKey;
      if (!mod || !cardHistory) return;
      if (isEditableHistoryTarget(ev.target)) return;
      var key = ev.key || '';
      var isZ = key === 'z' || key === 'Z';
      var isY = key === 'y' || key === 'Y';
      if (isZ && ev.shiftKey) {
        ev.preventDefault();
        runHistoryRedo();
        return;
      }
      if (isY) {
        ev.preventDefault();
        runHistoryRedo();
        return;
      }
      if (isZ) {
        ev.preventDefault();
        runHistoryUndo();
      }
    }

    function syncInfoRecap(stateOverride) {

        stateOverride != null

          : latestState != null
            ? latestState
            : variant && typeof variant.getState === 'function'
              ? variant.getState()
              : {};
      // Priority label is kept for Information label suggestions only (not displayed).

    var silentEstimateBusy = false;

    function clearSilentEstimateUi() {

        completionUi &&
        typeof completionUi.setEstimatingItemIds === 'function'
      ) {
        completionUi.setEstimatingItemIds([]);
      }

    /** Fill missing unlocked subtask estimates via AI (toast-free). */
    function maybeSilentEstimateDurations() {
      if (silentEstimateSuppress) return;
      if (silentEstimateTimer) {
        clearTimeout(silentEstimateTimer);
        silentEstimateTimer = null;
      }
      silentEstimateTimer = setTimeout(function () {
        silentEstimateTimer = null;
        runSilentEstimateDurations();
      }, 400);
    }

    function runSilentEstimateDurations() {
      if (silentEstimateSuppress) return;
      if (silentEstimateBusy) {
        silentEstimateQueued = true;
        return;
      }
      if (!window.PriorityAgent || !window.CompletionTrello) return;
      if (!completionUi || typeof completionUi.getData !== 'function') return;
      if (typeof PriorityAgent.estimateSubtaskDurations !== 'function') return;
      var data = completionUi.getData();
      var needing =
        typeof CompletionTrello.itemsNeedingEstimate === 'function'
          ? CompletionTrello.itemsNeedingEstimate(data)
          : [];
      if (!needing.length) {
        clearSilentEstimateUi();
        return;
      }
      silentEstimateBusy = true;
      silentEstimateQueued = false;
      var needingPayload = needing.map(function (it) {
        return { id: it.id, text: it.text };
      });

      function applyEstimates(estimates) {
        if (!estimates || !estimates.length || !completionUi) return false;
        silentEstimateSuppress = true;
        try {
          if (typeof completionUi.applyItemEstimates === 'function') {
            completionUi.applyItemEstimates(estimates, { lock: false });
          }
          syncInfoRecap();
        } finally {
          silentEstimateSuppress = false;
        }
        return true;
      }

      function localFallback() {
        if (typeof PriorityAgent.heuristicSubtaskEstimates === 'function') {
          return PriorityAgent.heuristicSubtaskEstimates({ items: needingPayload });
        }
        return needingPayload.map(function (it) {
          return {
            id: it.id,
            matchText: it.text,
            estimatedMinutes: 30
          };
        });
      }

      function withTimeout(promise, ms) {
        return new Promise(function (resolve, reject) {
          var settled = false;
          var timer = setTimeout(function () {
            if (settled) return;
            settled = true;
            reject(new Error('Estimation timeout'));
          }, ms);
          Promise.resolve(promise).then(
            function (value) {
              if (settled) return;
              settled = true;
              clearTimeout(timer);
              resolve(value);
            },
            function (err) {
              if (settled) return;
              settled = true;
              clearTimeout(timer);
              reject(err);
            }
          );
        });
      }

      PriorityAgent.getProvider(t)
        .then(function (provider) {
          if (!PriorityAgent.isConfigured(provider)) {
            return applyEstimates(localFallback());
          }
          if (typeof completionUi.setEstimatingItemIds === 'function') {
            completionUi.setEstimatingItemIds(
              needing.map(function (it) {
                return it.id;
              })
            );
          }
          return resolveCardNameForAi()
            .then(function (cardName) {
              return withTimeout(
                PriorityAgent.estimateSubtaskDurations(provider, {
                  cardName: cardName || readCardNameLabel(),
                  cardDesc:
                    (infoUi && typeof infoUi.getDesc === 'function'
                      ? infoUi.getDesc()
                      : '') ||
                    cardDesc ||
                    '',
                  items: needingPayload
                }),
                20000
              );
            })
            .then(function (estimates) {
              if (estimates && estimates.length) {
                applyEstimates(estimates);
                return;
              }
              applyEstimates(localFallback());
            })
            .catch(function (err) {
              console.error('Silent subtask estimate failed', err);
              applyEstimates(localFallback());
            });
        })
        .catch(function (err) {
          console.error('Silent subtask estimate failed', err);
          applyEstimates(localFallback());
        })
        .then(function () {
          silentEstimateBusy = false;
          clearSilentEstimateUi();
          if (silentEstimateQueued) {
            silentEstimateQueued = false;
            maybeSilentEstimateDurations();
          }
        });
    }

    function attachBlockedIntoStatut() {
      if (!statutUi || !variant) return;
      var mount =
        typeof statutUi.getBlockedMount === 'function'
          ? statutUi.getBlockedMount()
          : null;
      var blockedEl =
        typeof variant.getBlockedSection === 'function'
          ? variant.getBlockedSection()
          : null;
      if (!mount || !blockedEl) return;

      if (typeof statutUi.syncBlockedPanel === 'function') {

      // Card already on Bloqué: keep enAttente in sync with the visible motif panel.
      if (
        typeof statutUi.getCategory === 'function' &&

          appliedLabelsFp = latestLabelsFp;
          if (infoUi && typeof infoUi.setBoardLabels === 'function') {
            infoUi.setBoardLabels(boardLabels);
          }
          if (infoUi && typeof infoUi.setDesc === 'function') {

          } else if (!authorized && infoUi && typeof infoUi.setAuthReason === 'function') {
            // Soft hint only after a failed save; leave empty until then.

          resizePopup();

          var creatorPromise =
            PriorityTrello.getCardCreator
              ? PriorityTrello.getCardCreator(t, boardMembers).then(function (creator) {

                    infoUi.setCreator(creator);

          var assignCreatorPromise = creatorPromise
            .then(function (creator) {

                !creator.id ||
                (members && members.length) ||

              ) {

              }
              return PriorityTrello.ensureCreatorAssigned(t, {
                members: members,
                boardMembers: boardMembers,
                creator: creator
              }).then(function (result) {
                if (!result || !result.changed) return result;
                markMembersDirty();
                var next = Array.isArray(result.members) ? result.members : [];
                latestMembersFp = fingerprintIds(next);
                appliedMembersFp = latestMembersFp;
                if (infoUi && typeof infoUi.setMembers === 'function') {
                  infoUi.setMembers(next);

                syncInfoRecap();

                });

            .catch(function (err) {
              console.error('Auto-assign creator failed', err);

            });

          var parentPromise =
            childId &&
            window.CompletionTrello &&
            typeof CompletionTrello.findParentCards === 'function' &&
            infoUi &&
            (typeof infoUi.setParents === 'function' ||
              typeof infoUi.setParent === 'function')
              ? CompletionTrello.findParentCards(t, childId, { maxCards: 100 }).then(
                  function (parents) {
                    var list = Array.isArray(parents) ? parents : [];
                    if (typeof infoUi.setParents === 'function') {
                      infoUi.setParents(list);

        .catch(function (err) {
