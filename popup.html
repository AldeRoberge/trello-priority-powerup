<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Définir la priorité</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./trello-api-config.js"></script>
  <script>
    window.__trelloIframe = TrelloPowerUp.iframe(
      TrelloApiConfig.appKey
        ? { appKey: TrelloApiConfig.appKey, appName: TrelloApiConfig.appName }
        : undefined
    );
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="./trello-theme.css" />
  <link rel="stylesheet" href="./priority-ui.css" />
  <script src="./priority-matrix.js"></script>
  <script src="./priority-ui.js"></script>
  <script src="./priority-trello.js"></script>
</head>
<body class="tp-page tp-page--priority">
  <div id="apiConfigBanner" class="tp-api-banner" hidden role="alert">
    Couleurs de carte désactivées&nbsp;: copiez <code>trello-api-config-template.js</code> vers
    <code>trello-api-config.js</code>, puis ajoutez votre clé API Trello
    (trello.com/power-ups/admin → votre Power-Up → API Key).
  </div>
  <div class="compare-page">
    <div class="compare-grid" id="priorityMount"></div>
  </div>

  <script>
    const t = window.__trelloIframe || TrelloPowerUp.iframe();
    const mountEl = document.getElementById('priorityMount');
    let variant = null;
    let latestState = null;
    let saveChain = Promise.resolve();

    function saveState(state) {
      latestState = state;
      saveChain = saveChain
        .then(function () {
          return PriorityTrello.saveCardInputs(t, state);
        })
        .catch(function (err) {
          console.error('Priority save failed', err);
        });
      return saveChain;
    }

    function showApiConfigBanner() {
      var banner = document.getElementById('apiConfigBanner');
      if (banner) banner.hidden = false;
    }

    async function ensureCoverApiReady() {
      if (!PriorityTrello.isTrelloApiConfigured()) {
        showApiConfigBanner();
        return null;
      }
      try {
        return await PriorityTrello.ensureRestApiAuthorized(t);
      } catch (err) {
        console.error('Priority OAuth failed', err);
        return null;
      }
    }

    async function init() {
      const inputs = await PriorityTrello.getCardInputs(t);
      const matrixSettings = await PriorityTrello.getMatrixSettings(t);
      PriorityUI.setMatrixSettings(matrixSettings);

      const hasSavedPriority = !!inputs;
      const initialDefaults = hasSavedPriority ? inputs : PriorityTrello.IMPORTANT_INPUTS;

      await ensureCoverApiReady();

      variant = PriorityUI.mountVariant(mountEl, {
        id: 'card',
        formula: 'baseline',
        defaults: initialDefaults,
        dimensions: PriorityTrello.PRIORITY_DIMENSIONS,
        loadState: function (defaults) {
          return Object.assign({}, defaults);
        },
        onStateChange: saveState,
      });

      if (!hasSavedPriority) {
        await saveState(variant.getState());
      }

      var blockedCheckbox = mountEl.querySelector('.en-attente-checkbox');
      if (blockedCheckbox) {
        blockedCheckbox.addEventListener('change', function () {
          ensureCoverApiReady()
            .then(function (client) {
              if (client && latestState) {
                return PriorityTrello.saveCardInputs(t, latestState);
              }
            })
            .catch(function (err) {
              console.error('Priority blocked cover sync failed', err);
            });
        });
      }

      window.scrollTo(0, 0);
    }

    window.addEventListener('pagehide', function () {
      if (latestState) {
        saveState(latestState);
      }
    });

    init().catch(function (err) {
      console.error('Priority popup init failed', err);
    });
  </script>
</body>
</html>
