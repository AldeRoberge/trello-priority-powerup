<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Définir la priorité</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="./components/shared/trello-theme.css?v=slider-seek-1" />
  <link rel="stylesheet" href="./components/shared/effects.css?v=fx-3" />
  <link rel="stylesheet" href="./components/priority/priority-ui.css?v=section-glow-2" />
  <link rel="stylesheet" href="./components/goals/goals-ui.css?v=goals-2" />
  <link rel="stylesheet" href="./components/agent/agent-ui.css?v=agent-sparkle-1" />
  <script src="./components/shared/rest-config.js"></script>
  <script src="./components/shared/effects.js?v=fx-3"></script>
  <script src="./components/priority/priority-matrix.js?v=due-time-picker-1"></script>
  <script src="./components/priority/priority-ui.js?v=agent-point-1"></script>
  <script>
    if (!window.PriorityUI) {
      console.error('Priority popup: priority-ui.js did not expose window.PriorityUI');
    }
  </script>
  <script src="./components/priority/priority-trello.js?v=card-interview-1"></script>
  <script src="./components/statut/statut-match.js?v=section-glow-1"></script>
  <script src="./components/statut/statut-trello.js?v=section-glow-1"></script>
  <script src="./components/shared/tab-autocomplete.js?v=tab-complete-1"></script>
  <script src="./components/completion/completion-ui.js?v=subtask-progress-label-1"></script>
  <script src="./components/completion/completion-trello.js?v=progress-due-complete-1"></script>
  <script src="./components/goals/goals-trello.js?v=goals-1"></script>
  <script src="./components/goals/goals-ui.js?v=goals-1"></script>
  <script src="./components/agent/agent.js?v=answer-direct-1"></script>
  <script src="./components/agent/agent-memory.js?v=card-interview-1"></script>
  <script src="./components/profile/user-profile.js?v=agent-identity-1"></script>
  <script src="./components/shared/spellcheck.js?v=spellcheck-4"></script>
  <script src="./components/agent/agent-ui.js?v=agent-sparkle-1"></script>
</head>
<body class="tp-page tp-page--priority">
  <div class="compare-page">
    <div class="compare-grid" id="priorityMount"></div>
  </div>

  <script>
    PriorityTrello.initIframePage(function (t) {
    const mountEl = document.getElementById('priorityMount');
    let variant = null;
    let completionUi = null;
    let latestState = null;
    let latestCompletion = null;
    let saveChain = Promise.resolve();
    let completionSaveChain = Promise.resolve();
    let progressEnabled = false;
    let progressExpanded = false;
    let progressPanel = null;
    let progressField = null;
    let progressBody = null;
    let progressCollapse = null;
    let progressSummaryEl = null;
    let dueCompleteSyncChain = Promise.resolve();
    let statutUi = null;
    let statutSection = null;
    let latestStatut = null;
    let latestGoals = null;
    let objectifUi = null;
    let objectifSection = null;
    let infoUi = null;
    let infoSection = null;
    let cardDesc = '';
    let cardNameCache = '';
    let cardNamePromise = Promise.resolve('');
    let cachedMemory = null;
    let cachedCardMemory = null;
    let cachedProfile = null;
    let boardDigestCache = '';

    t.render(function () {
      PriorityTrello.getBoardColorScheme(t)
        .then(function () {
          if (variant && typeof variant.repaint === 'function') variant.repaint();
        })
        .catch(function (err) {
          console.error('Priority popup color scheme refresh failed', err);
        });

      if (typeof CompletionTrello !== 'undefined' && CompletionTrello.getBoardCompletionColorScheme) {
        CompletionTrello.getBoardCompletionColorScheme(t).catch(function (err) {
          console.error('Completion color scheme refresh failed', err);
        });
      }
    });

    function saveState(state) {
      var wasBlocked = !!(latestState && latestState.enAttente);
      latestState = state;
      saveChain = saveChain
        .then(function () {
          return PriorityTrello.saveCardInputs(t, state);
        })
        .then(function () {
          if (state && state.enAttente && !wasBlocked && statutUi && StatutTrello) {
            return StatutTrello.getCardStatut(t).then(function (statut) {
              if (statutUi && typeof statutUi.setData === 'function') {
                statutUi.setData({
                  listId: statut.listId,
                  lists: statut.lists,
                  settings: statut.settings,
                });
              }
            });
          }
        })
        .catch(function (err) {
          console.error('Priority save failed', err);
        });
      return saveChain;
    }

    function withProgressEnabledFlag(data, enabled) {
      var next = Object.assign({}, data || {});
      if (enabled === false) next.progressEnabled = false;
      else delete next.progressEnabled;
      return next;
    }

    function saveCompletion(data) {
      latestCompletion = withProgressEnabledFlag(data, progressEnabled);
      completionSaveChain = completionSaveChain
        .then(function () {
          return CompletionTrello.saveCardCompletion(t, latestCompletion);
        })
        .catch(function (err) {
          console.error('Completion save failed', err);
        });
      return completionSaveChain;
    }

    function syncDueCompleteFromProgress(data, options) {
      if (!CompletionTrello.syncCardDueCompleteFromProgress) return;
      dueCompleteSyncChain = dueCompleteSyncChain
        .then(function () {
          return CompletionTrello.syncCardDueCompleteFromProgress(t, data, options);
        })
        .catch(function (err) {
          console.error('Completion dueComplete sync failed', err);
        });
      return dueCompleteSyncChain;
    }

    function resizePopup() {
      if (typeof t.sizeTo === 'function') {
        t.sizeTo(document.body);
      }
    }

    function setCardNameLabel(name) {
      var trimmed = typeof name === 'string' ? name.trim() : '';
      if (trimmed) cardNameCache = trimmed;
      if (infoUi && typeof infoUi.setTitle === 'function') {
        infoUi.setTitle(name || '');
      } else {
        var el = document.getElementById('cardName');
        if (el) {
          var label = trimmed || 'Carte';
          if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
            el.value = label;
            el.readOnly = false;
            el.classList.remove('is-loading');
          } else {
            el.textContent = label;
            el.title = trimmed ? trimmed : '';
            el.classList.remove('is-loading');
            el.removeAttribute('hidden');
          }
        }
      }
      if (completionUi && typeof completionUi.setCardName === 'function') {
        completionUi.setCardName(name || '');
      }
      resizePopup();
    }

    function readCardNameLabel() {
      if (infoUi && typeof infoUi.getTitle === 'function') {
        var fromInfo = (infoUi.getTitle() || '').trim();
        if (fromInfo) return fromInfo;
      }
      var el = document.getElementById('cardName');
      if (el && !el.classList.contains('is-loading')) {
        var fromEl =
          el.tagName === 'INPUT' || el.tagName === 'TEXTAREA'
            ? (el.value || '').trim()
            : (el.textContent || '').trim();
        if (fromEl && fromEl !== 'Carte' && fromEl !== 'Chargement\u2026') {
          return fromEl;
        }
      }
      return cardNameCache || '';
    }

    /** Prefer live title; wait for name load if still empty (Progrès AI suggestions). */
    function resolveCardNameForAi() {
      var now = readCardNameLabel();
      if (now) return Promise.resolve(now);
      return Promise.resolve(cardNamePromise).then(function () {
        return readCardNameLabel();
      });
    }

    function syncInfoRecap() {
      if (!infoUi || typeof infoUi.setRecap !== 'function') return;
      var state =
        variant && typeof variant.getState === 'function'
          ? variant.getState()
          : latestState || {};
      var priorityLabel = '';
      try {
        if (window.PriorityUI && PriorityUI.resolveDisplay && variant) {
          var formulaKey =
            typeof variant.getFormulaKey === 'function'
              ? variant.getFormulaKey()
              : 'baseline';
          var calc =
            PriorityUI.FORMULAS &&
            PriorityUI.FORMULAS[formulaKey] &&
            PriorityUI.FORMULAS[formulaKey].calc
              ? PriorityUI.FORMULAS[formulaKey].calc
              : null;
          if (calc && state.priorityEnabled !== false) {
            var display = PriorityUI.resolveDisplay(calc(state), state);
            priorityLabel = (display && display.label) || '';
          }
        }
      } catch (e) { /* ignore */ }

      var dueLabel = '';
      if (state.dueEnabled !== false && state.dueDate && PriorityUI.formatDueDateCompactSummary) {
        dueLabel = PriorityUI.formatDueDateCompactSummary(state.dueDate, state.dueTime) || '';
      }

      var impactReach = '';
      var durationLabel = '';
      if (state.priorityEnabled !== false && window.PriorityUI) {
        if (typeof PriorityUI.wordFor === 'function' && state.impact != null) {
          impactReach = PriorityUI.wordFor('impact', state.impact) || '';
        }
        if (
          state.estimatedDurationMinutes != null &&
          typeof PriorityUI.formatDurationFr === 'function'
        ) {
          durationLabel =
            PriorityUI.formatDurationFr(state.estimatedDurationMinutes) || '';
        }
      }

      var blockedOn = !!state.enAttente;
      var blockedLabel = '';
      if (blockedOn && PriorityUI.formatBlockedReasonsSummary) {
        blockedLabel = PriorityUI.formatBlockedReasonsSummary(state.blockedReasons, {
          empty: 'Bloqu\u00e9',
          links: state.blockedLinks,
          items: getBlockedSubtasks()
        });
      }

      infoUi.setRecap({
        priorityLabel: priorityLabel,
        impactReach: impactReach,
        durationLabel: durationLabel,
        dueLabel: dueLabel,
        blockedOn: blockedOn,
        blockedLabel: blockedLabel
      });
    }

    function attachBlockedIntoStatut() {
      if (!statutUi || !variant) return;
      var mount =
        typeof statutUi.getBlockedMount === 'function'
          ? statutUi.getBlockedMount()
          : null;
      var blockedEl =
        typeof variant.getBlockedSection === 'function'
          ? variant.getBlockedSection()
          : null;
      if (!mount || !blockedEl) return;
      if (blockedEl.parentNode !== mount) {
        mount.appendChild(blockedEl);
      }
      if (typeof statutUi.syncBlockedPanel === 'function') {
        statutUi.syncBlockedPanel();
      }
      // Card already on Bloqué: keep enAttente in sync with the visible motif panel.
      if (
        typeof statutUi.getCategory === 'function' &&
        statutUi.getCategory() === 'blocked' &&
        typeof variant.getState === 'function' &&
        typeof variant.setState === 'function'
      ) {
        var st = variant.getState();
        if (st && !st.enAttente) {
          variant.setState(Object.assign({}, st, { enAttente: true }));
        }
      }
    }

    function jumpToSection(key) {
      if (!variant) return;
      var target = null;
      if (key === 'blocked') {
        if (statutUi && typeof statutUi.setExpanded === 'function') {
          statutUi.setExpanded(true);
        }
        if (typeof statutUi.syncBlockedPanel === 'function') {
          statutUi.syncBlockedPanel();
        }
        target =
          (typeof variant.getBlockedSection === 'function' &&
            variant.getBlockedSection()) ||
          (statutUi &&
            typeof statutUi.getBlockedMount === 'function' &&
            statutUi.getBlockedMount()) ||
          (variant.card && variant.card.querySelector('.statut-blocked-panel'));
        if (target && target.closest) {
          var panel = target.closest('.statut-blocked-panel');
          if (
            panel &&
            (panel.hidden || !panel.classList.contains('is-statut-blocked'))
          ) {
            return;
          }
        }
      } else if (typeof variant.openSection === 'function') {
        target = variant.openSection(key);
      } else if (variant.card) {
        if (key === 'priority') {
          target = variant.card.querySelector('.variant-priority-section');
        } else if (key === 'due') {
          target = variant.card.querySelector('.variant-due-section');
        }
      }
      if (!target || target.hidden) return;
      setTimeout(function () {
        try {
          target.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        } catch (e) { /* ignore */ }
        resizePopup();
      }, 0);
    }

    function mountInfoSection(cardEl) {
      if (!cardEl) {
        console.error('Priority popup: mountInfoSection called without card');
        return Promise.resolve();
      }
      if (!PriorityUI.createInfoField) {
        console.error('Priority popup: createInfoField unavailable');
        // Fall back to the classic card title header.
        if (variant && variant.card && !document.getElementById('cardName')) {
          var fallbackHeader = document.createElement('header');
          fallbackHeader.className = 'tp-priority-card-header';
          var fallbackName = document.createElement('p');
          fallbackName.className = 'tp-priority-card-name is-loading';
          fallbackName.id = 'cardName';
          fallbackName.setAttribute('aria-live', 'polite');
          fallbackName.textContent = 'Chargement\u2026';
          fallbackHeader.appendChild(fallbackName);
          cardEl.insertBefore(fallbackHeader, cardEl.firstChild);
        }
        return Promise.resolve();
      }

      infoSection = document.createElement('div');
      infoSection.className = 'variant-info-section';
      cardEl.insertBefore(infoSection, cardEl.firstChild);

      var expandInfo = PriorityUI.resolveSectionExpanded('info', true);

      infoUi = PriorityUI.createInfoField({
        el: infoSection,
        title: '',
        desc: cardDesc || '',
        members: [],
        expanded: expandInfo,
        onExpandChange: function (isExpanded) {
          PriorityUI.saveSectionCollapseState({ info: !!isExpanded });
        },
        onLayoutChange: resizePopup,
        onJump: jumpToSection,
        onAuthorize: function () {
          return PriorityTrello.authorizeRestForAutoSort(t);
        },
        onTitleChange: function (nextTitle) {
          var next = typeof nextTitle === 'string' ? nextTitle.trim() : '';
          if (!next) {
            return Promise.resolve({ ok: false, reason: 'empty-name', changed: false });
          }
          return PriorityTrello.setCardName(t, next).then(function (result) {
            if (result && result.ok === false) return result;
            return { ok: true, name: next, changed: !!(result && result.changed) };
          });
        },
        onDescChange: function (nextDesc) {
          cardDesc = typeof nextDesc === 'string' ? nextDesc : '';
          return PriorityTrello.setCardDesc(t, cardDesc).then(function (result) {
            if (result && result.ok === false) return result;
            return { ok: true, desc: cardDesc };
          });
        }
      });

      return Promise.all([
        PriorityTrello.getCardMembers
          ? PriorityTrello.getCardMembers(t)
          : Promise.resolve([]),
        PriorityTrello.isRestAuthorized
          ? PriorityTrello.isRestAuthorized(t)
          : Promise.resolve(false),
      ])
        .then(function (results) {
          var members = results[0] || [];
          var authorized = !!results[1];
          var hasRest =
            PriorityTrello.restClientOptions && !!PriorityTrello.restClientOptions();
          if (infoUi && typeof infoUi.setMembers === 'function') {
            infoUi.setMembers(members);
          }
          if (infoUi && typeof infoUi.setDesc === 'function') {
            infoUi.setDesc(cardDesc || '', { force: true });
          }
          if (!hasRest && infoUi && typeof infoUi.setAuthReason === 'function') {
            infoUi.setAuthReason('no-app-key');
          } else if (!authorized && infoUi && typeof infoUi.setAuthReason === 'function') {
            // Soft hint only after a failed save; leave empty until then.
            infoUi.setAuthReason('');
          }
          syncInfoRecap();
          resizePopup();
        })
        .catch(function (err) {
          console.error('Info section mount failed', err);
        });
    }

    function getBlockedSubtasks() {
      if (completionUi && typeof completionUi.getData === 'function') {
        var live = completionUi.getData();
        return (live && live.items) || [];
      }
      if (latestCompletion && latestCompletion.items) return latestCompletion.items;
      return [];
    }

    function syncBlockedSubtasks() {
      if (variant && typeof variant.refreshBlockedSubtasks === 'function') {
        variant.refreshBlockedSubtasks();
      }
    }

    function progressSummaryText() {
      if (!completionUi || typeof completionUi.getData !== 'function') return '';
      var progress = CompletionTrello.computeCardProgress(completionUi.getData());
      if (!progress) return '';
      if (progress.percent <= 0) return 'En attente';
      if (progress.hasItems) {
        var remaining = progress.totalCount - progress.doneCount;
        if (remaining <= 0) return 'Complété';
        if (remaining === 1) return 'Une tâche restante';
        if (remaining === 2) return 'Deux tâches restantes';
        return remaining + ' tâches restantes';
      }
      // Card-level progress only (no subtasks): keep percent.
      return progress.percent + '\u00a0%';
    }

    function progressIsFullyComplete(data) {
      if (!data || typeof CompletionTrello === 'undefined') return false;
      var progress = CompletionTrello.computeCardProgress(data);
      return !!(progress && progress.percent >= 100);
    }

    function syncDueBlockedForProgress(data) {
      if (!variant || typeof variant.setProgressCompleteLock !== 'function') return;
      variant.setProgressCompleteLock(progressIsFullyComplete(data));
    }

    /** Mirror Terminé → Progrès 100% in the open popup (persistence already done in side effects). */
    function applyCompletionFromStatutComplete(completionData) {
      var CT = CompletionTrello;
      var next =
        completionData ||
        (CT.markFullyComplete
          ? CT.markFullyComplete(
              (completionUi && typeof completionUi.getData === 'function' && completionUi.getData()) ||
                latestCompletion ||
                { items: [] }
            )
          : null);
      if (!next) return;

      latestCompletion = withProgressEnabledFlag(next, true);
      if (completionUi && typeof completionUi.setData === 'function') {
        completionUi.setData(latestCompletion);
      }
      var live =
        completionUi && typeof completionUi.getData === 'function'
          ? completionUi.getData()
          : latestCompletion;
      // Persist again with progressEnabled on (statut side effect may have left it unset).
      saveCompletion(live);
      if (progressCollapse) progressCollapse.refreshSummary();
      syncBlockedSubtasks();
      syncDueBlockedForProgress(live);
      if (progressCollapse && !progressCollapse.isEnabled()) {
        setProgressEnabled(true, { expand: true, persist: true });
      } else {
        progressEnabled = true;
      }
    }

    /** Same side effects as clicking a Statut chip (shared by UI + agent). */
    function applyStatutListSelection(listId) {
      if (!window.StatutTrello) {
        return Promise.resolve({ ok: false, reason: 'no-statut' });
      }
      return StatutTrello.selectCardStatut(t, listId).then(function (result) {
        if (result && result.ok && variant && result.sideEffects) {
          var side = result.sideEffects;
          var wasBlockedCat =
            !!(latestStatut && latestStatut.category === 'blocked');
          if (
            (side.enAttenteSet || side.category === 'blocked') &&
            typeof variant.setState === 'function'
          ) {
            if (typeof variant.setProgressCompleteLock === 'function') {
              variant.setProgressCompleteLock(false);
            }
            variant.setState(
              Object.assign({}, variant.getState(), { enAttente: true })
            );
            resizePopup();
          } else if (
            wasBlockedCat &&
            side.category !== 'blocked' &&
            side.category !== 'completed' &&
            typeof variant.setState === 'function'
          ) {
            // Leaving Bloqué: drop active block (keep motives for next time).
            variant.setState(
              Object.assign({}, variant.getState(), { enAttente: false })
            );
            resizePopup();
          }
          if (side.category === 'completed') {
            if (typeof variant.setState === 'function') {
              var cleared = Object.assign({}, variant.getState(), {
                enAttente: false,
                blockedReasons: [],
                blockedLinks: [],
              });
              variant.setState(cleared);
            }
            applyCompletionFromStatutComplete(side.completion);
            resizePopup();
          } else if (side.dueCompleteCleared) {
            if (typeof variant.setProgressCompleteLock === 'function') {
              variant.setProgressCompleteLock(false);
            }
            resizePopup();
          }
        }
        if (result && result.ok) {
          return StatutTrello.getCardStatut(t).then(function (statut) {
            latestStatut = {
              listId: (statut && statut.listId) || listId || null,
              listName: (statut && statut.listName) || '',
              category: (statut && statut.category) || null,
              lists: ((statut && statut.lists) || []).map(function (list) {
                return {
                  id: list.id,
                  name: list.name,
                  category:
                    (statut.settings &&
                      statut.settings.listCategories &&
                      statut.settings.listCategories[list.id]) ||
                    null
                };
              }),
              roleLists:
                (statut && statut.settings && statut.settings.roleLists) || {}
            };
            if (statutUi && typeof statutUi.setData === 'function') {
              statutUi.setData({
                listId: latestStatut.listId,
                lists: (statut && statut.lists) || [],
                settings: (statut && statut.settings) || undefined
              });
            } else if (statutUi && typeof statutUi.syncBlockedPanel === 'function') {
              statutUi.syncBlockedPanel();
            }
            return result;
          });
        }
        return result;
      });
    }

    function setProgressEnabled(enabled, options) {
      options = options || {};
      if (progressCollapse) {
        var enableOpts = {
          persist: options.persist,
          focusAdd: options.focusAdd
        };
        if (options.preserveCollapse) {
          enableOpts.preserveCollapse = true;
        } else {
          enableOpts.expand = options.expand !== false && !!enabled;
        }
        progressCollapse.setEnabled(!!enabled, enableOpts);
        return;
      }
      progressEnabled = !!enabled;
      progressExpanded = !!enabled;
    }

    function mountStatutSection(cardEl) {
      if (!window.StatutTrello || !PriorityUI.createStatutField) {
        console.error('Priority popup: StatutTrello / createStatutField unavailable');
        return Promise.resolve();
      }

      statutSection = document.createElement('div');
      statutSection.className = 'variant-statut-section';
      // Order: Information → Statut → Priorité → …
      var prioritySection = cardEl.querySelector('.variant-priority-section');
      if (prioritySection) {
        cardEl.insertBefore(statutSection, prioritySection);
      } else {
        cardEl.insertBefore(statutSection, cardEl.firstChild);
      }

      return Promise.all([
        StatutTrello.getCardStatut(t),
        PriorityTrello.isRestAuthorized
          ? PriorityTrello.isRestAuthorized(t)
          : Promise.resolve(false),
      ])
        .then(function (results) {
          var statut = results[0] || {};
          var authorized = !!results[1];
          var hasRest =
            PriorityTrello.restClientOptions && !!PriorityTrello.restClientOptions();
          var expandStatut = PriorityUI.resolveSectionExpanded('statut', true);
          var authReason = !hasRest
            ? 'no-app-key'
            : authorized
              ? ''
              : 'not-authorized';

          statutUi = PriorityUI.createStatutField({
            el: statutSection,
            listId: statut.listId,
            lists: statut.lists || [],
            settings: statut.settings,
            authReason: authReason,
            needsAuth: authReason === 'not-authorized',
            enabled: true,
            expanded: expandStatut,
            onExpandChange: function (isExpanded) {
              PriorityUI.saveSectionCollapseState({ statut: !!isExpanded });
            },
            onLayoutChange: resizePopup,
            onAuthorize: function () {
              return PriorityTrello.authorizeRestForAutoSort(t);
            },
            onOpenSettings: function () {
              // Popup width is fixed (narrow) by Trello; modal is wide enough for statut mapping.
              return t
                .modal({
                  title: 'Paramètres de priorité',
                  url: PriorityTrello.pageUrl('./settings.html'),
                  height: 720,
                  fullscreen: false,
                  accentColor: '#22272B',
                })
                .then(function () {
                  return StatutTrello.getCardStatut(t).then(function (statut) {
                    if (statutUi && typeof statutUi.setData === 'function') {
                      statutUi.setData({
                        listId: statut.listId,
                        lists: statut.lists,
                        settings: statut.settings,
                      });
                    }
                  });
                });
            },
            onSelectList: function (listId) {
              return applyStatutListSelection(listId);
            },
          });
          latestStatut = {
            listId: statut.listId || null,
            listName: statut.listName || '',
            category: statut.category || null,
            lists: (statut.lists || []).map(function (list) {
              return {
                id: list.id,
                name: list.name,
                category:
                  (statut.settings &&
                    statut.settings.listCategories &&
                    statut.settings.listCategories[list.id]) ||
                  null
              };
            }),
            roleLists:
              (statut.settings && statut.settings.roleLists) || {}
          };
          attachBlockedIntoStatut();
          resizePopup();
        })
        .catch(function (err) {
          console.error('Statut section mount failed', err);
        });
    }

    function spellcheckGoalName(raw) {
      if (window.GoalsUI && typeof GoalsUI.spellcheckText === 'function') {
        return GoalsUI.spellcheckText(raw);
      }
      return Promise.resolve(String(raw || '').trim());
    }

    function openGoalsSettings(selection) {
      selection = selection || {};
      return t
        .modal({
          title: 'Paramètres de priorité',
          url: PriorityTrello.pageUrl('./settings.html'),
          height: 720,
          fullscreen: false,
          accentColor: '#22272B',
          args: {
            selectedVisionId: selection.visionId || null,
            selectedMissionId: selection.missionId || null,
            selectedProjectId: selection.projectId || null,

        })
        .then(function () {
          return refreshObjectifData();
        })
        .catch(function (err) {

    function appendObjectifCrumb(crumb, label, opts) {
      opts = opts || {};
      var node;
      if (opts.asButton) {
        node = document.createElement('button');
        node.type = 'button';
        node.className = 'objectif-crumb objectif-crumb--button';
        if (opts.title) node.title = opts.title;
      } else {
        node = document.createElement('span');
        node.className = 'objectif-crumb';
      }
      node.textContent = label || '—';
      if (opts.retired) {
        node.classList.add('is-retired');
        var tag = document.createElement('span');
        tag.className = 'objectif-retired-tag';
        tag.textContent = 'Retiré';
        node.appendChild(document.createTextNode(' '));
        node.appendChild(tag);
      }
      if (opts.onClick) node.addEventListener('click', opts.onClick);
      crumb.appendChild(node);
    }

    function appendObjectifSep(crumb) {
      var sep = document.createElement('span');
      sep.className = 'objectif-crumb-sep';
      sep.setAttribute('aria-hidden', 'true');
      sep.textContent = '→';
      crumb.appendChild(sep);
    }

    function bindCreateAction(btn, input, createFn) {
      function run() {
        var raw = input.value.trim();
        if (!raw) return;
        btn.disabled = true;
        spellcheckGoalName(raw)
          .then(function (name) {
            return createFn(name);
          })
          .then(function () {
            input.value = '';
            return refreshObjectifData();
          })
          .catch(function (err) {
            console.error('objectif create failed', err);
            window.alert((err && err.message) || 'Création impossible');
          })
          .then(function () {
            btn.disabled = false;
          });
      }
      btn.addEventListener('click', run);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          run();
        }
      });
    }

    function renderObjectifBody() {
      if (!objectifUi || !objectifUi.body) return;
      var body = objectifUi.body;
      body.replaceChildren();
      var GT = window.GoalsTrello;
      if (!GT) {
        body.appendChild(
          Object.assign(document.createElement('p'), {
            className: 'objectif-empty',
            textContent: 'Module Objectifs indisponible.',
          })
        );
        return;
      }

      var hierarchy = (latestGoals && latestGoals.hierarchy) || {};
      var projectId = (latestGoals && latestGoals.projectId) || null;
      var projects = (latestGoals && latestGoals.projects) || [];
      var missions = (latestGoals && latestGoals.missions) || [];
      var visions = (latestGoals && latestGoals.visions) || [];
      var activeProjects = GT.activeOnly(projects);
      var activeMissions = GT.activeOnly(missions);
      var activeVisions = GT.activeOnly(visions);

      if (projectId && hierarchy.project) {
        var crumb = document.createElement('div');
        crumb.className = 'objectif-breadcrumb';
        var visionId = hierarchy.vision && hierarchy.vision.id;
        var missionId = hierarchy.mission && hierarchy.mission.id;
        var linkedProjectId = hierarchy.project && hierarchy.project.id;
        appendObjectifCrumb(crumb, hierarchy.vision && hierarchy.vision.name, {
          asButton: !!visionId,
          retired: hierarchy.vision && hierarchy.vision.retired,
          title: 'Modifier la vision',
          onClick: function () {
            openGoalsSettings({ visionId: visionId });
          },
        });
        appendObjectifSep(crumb);
        appendObjectifCrumb(crumb, hierarchy.mission && hierarchy.mission.name, {
          asButton: !!missionId,
          retired: hierarchy.mission && hierarchy.mission.retired,
          title: 'Modifier la mission',
          onClick: function () {
            openGoalsSettings({
              visionId: visionId,
              missionId: missionId,
            });
          },
        });
        appendObjectifSep(crumb);
        appendObjectifCrumb(crumb, hierarchy.project && hierarchy.project.name, {
          asButton: !!linkedProjectId,
          retired: hierarchy.project && hierarchy.project.retired,
          title: 'Modifier le projet',
          onClick: function () {
            openGoalsSettings({
              visionId: visionId,
              missionId: missionId,
              projectId: linkedProjectId,
            });
          },
        });
        body.appendChild(crumb);
      }

      if (activeProjects.length || (hierarchy.project && hierarchy.project.retired)) {
        var pickerRow = document.createElement('div');
        pickerRow.className = 'objectif-picker-row';
        var select = document.createElement('select');
        select.className = 'tp-select';
        select.setAttribute('aria-label', 'Projet');

        var optPrompt = document.createElement('option');
        optPrompt.value = '';
        optPrompt.textContent = projectId ? 'Délier / créer un projet…' : 'Créer un projet…';
        if (!projectId) optPrompt.selected = true;
        select.appendChild(optPrompt);

        var linkedRetired =
          hierarchy.project && hierarchy.project.retired ? hierarchy.project : null;
        if (linkedRetired) {
          var optRetired = document.createElement('option');
          optRetired.value = linkedRetired.id;
          optRetired.textContent = linkedRetired.name + ' (retiré)';
          optRetired.selected = true;
          select.appendChild(optRetired);
        }

        activeProjects.forEach(function (p) {
          var o = document.createElement('option');
          o.value = p.id;
          var mission = GT.findById(missions, p.missionId);
          o.textContent = mission ? p.name + ' · ' + mission.name : p.name;
          if (projectId === p.id) o.selected = true;
          select.appendChild(o);
        });

        select.addEventListener('change', function () {
          var nextId = select.value || null;
          if (!nextId) {
            // Keep card unlinked and focus create form.
            GT.setCardProjectId(t, null)
              .then(function () {
                return refreshObjectifData();
              })
              .then(function () {
                var focusEl = body.querySelector('.tp-goals-input');
                if (focusEl) focusEl.focus();
              })
              .catch(function (err) {
                console.error('setCardProjectId failed', err);
                window.alert((err && err.message) || 'Liaison impossible');
                return refreshObjectifData();
              });
            return;
          }
          GT.setCardProjectId(t, nextId)
            .then(function () {
              return refreshObjectifData();
            })
            .catch(function (err) {
              console.error('setCardProjectId failed', err);
              window.alert((err && err.message) || 'Liaison impossible');
              return refreshObjectifData();
            });
        });
        pickerRow.appendChild(select);
        body.appendChild(pickerRow);
      }

      var createRow = document.createElement('div');
      createRow.className = 'objectif-create-row';

      if (!activeMissions.length) {
        if (!activeVisions.length) {
          var visionHint = document.createElement('p');
          visionHint.className = 'objectif-create-hint';
          visionHint.textContent = 'Créer une vision, puis une mission et un projet :';
          createRow.appendChild(visionHint);
          var visionInput = document.createElement('input');
          visionInput.type = 'text';
          visionInput.className = 'tp-goals-input';
          visionInput.placeholder = 'Nom de la vision';
          visionInput.maxLength = 120;
          var visionBtn = document.createElement('button');
          visionBtn.type = 'button';
          visionBtn.className = 'tp-button tp-button--secondary';
          visionBtn.textContent = 'Créer la vision';
          bindCreateAction(visionBtn, visionInput, function (name) {
            return GT.createVision(t, name);
          });
          createRow.appendChild(visionInput);
          createRow.appendChild(visionBtn);
        } else {
          var missionHint = document.createElement('p');
          missionHint.className = 'objectif-create-hint';
          missionHint.textContent = 'Créer une mission :';
          createRow.appendChild(missionHint);
          var visionSelect = document.createElement('select');
          visionSelect.className = 'tp-select';
          visionSelect.setAttribute('aria-label', 'Vision parente');
          activeVisions.forEach(function (v) {
            var o = document.createElement('option');
            o.value = v.id;
            o.textContent = v.name;
            if (hierarchy.vision && hierarchy.vision.id === v.id) o.selected = true;
            visionSelect.appendChild(o);
          });
          var missionInput = document.createElement('input');
          missionInput.type = 'text';
          missionInput.className = 'tp-goals-input';
          missionInput.placeholder = 'Nom de la mission';
          missionInput.maxLength = 120;
          var missionBtn = document.createElement('button');
          missionBtn.type = 'button';
          missionBtn.className = 'tp-button tp-button--secondary';
          missionBtn.textContent = 'Créer la mission';
          bindCreateAction(missionBtn, missionInput, function (name) {
            var visionId = visionSelect.value;
            if (!visionId) return Promise.reject(new Error('Vision requise'));
            return GT.createMission(t, name, visionId);
          });
          createRow.appendChild(visionSelect);
          createRow.appendChild(missionInput);
          createRow.appendChild(missionBtn);
        }
      } else {
        var projectHint = document.createElement('p');
        projectHint.className = 'objectif-create-hint';
        projectHint.textContent = activeProjects.length
          ? 'Ou créer un projet et le lier :'
          : 'Créer un projet et le lier à cette carte :';
        createRow.appendChild(projectHint);
        var missionSelect = document.createElement('select');
        missionSelect.className = 'tp-select';
        missionSelect.setAttribute('aria-label', 'Mission parente');
        activeMissions.forEach(function (m) {
          var o = document.createElement('option');
          o.value = m.id;
          var vision = GT.findById(visions, m.visionId);
          o.textContent = vision ? m.name + ' · ' + vision.name : m.name;
          if (hierarchy.mission && hierarchy.mission.id === m.id) o.selected = true;
          missionSelect.appendChild(o);
        });
        var nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.className = 'tp-goals-input';
        nameInput.placeholder = 'Nom du projet';
        nameInput.maxLength = 120;
        var createBtn = document.createElement('button');
        createBtn.type = 'button';
        createBtn.className = 'tp-button tp-button--secondary';
        createBtn.textContent = 'Créer et lier';
        bindCreateAction(createBtn, nameInput, function (name) {
          var missionId = missionSelect.value;
          if (!missionId) return Promise.reject(new Error('Mission requise'));
          return GT.createProject(t, name, missionId).then(function (project) {
            return GT.setCardProjectId(t, project.id);
          });
        });
        createRow.appendChild(missionSelect);
        createRow.appendChild(nameInput);
        createRow.appendChild(createBtn);

        // Allow adding another mission from this window as well.
        var addMissionDetails = document.createElement('details');
        addMissionDetails.className = 'objectif-add-mission';
        var addMissionSummary = document.createElement('summary');
        addMissionSummary.textContent = 'Configurer une mission';
        addMissionDetails.appendChild(addMissionSummary);
        if (activeVisions.length) {
          var addVisionSelect = document.createElement('select');
          addVisionSelect.className = 'tp-select';
          addVisionSelect.setAttribute('aria-label', 'Vision parente');
          activeVisions.forEach(function (v) {
            var o = document.createElement('option');
            o.value = v.id;
            o.textContent = v.name;
            addVisionSelect.appendChild(o);
          });
          var addMissionInput = document.createElement('input');
          addMissionInput.type = 'text';
          addMissionInput.className = 'tp-goals-input';
          addMissionInput.placeholder = 'Nom de la mission';
          addMissionInput.maxLength = 120;
          var addMissionBtn = document.createElement('button');
          addMissionBtn.type = 'button';
          addMissionBtn.className = 'tp-button tp-button--secondary';
          addMissionBtn.textContent = 'Ajouter la mission';
          bindCreateAction(addMissionBtn, addMissionInput, function (name) {
            var visionId = addVisionSelect.value;
            if (!visionId) return Promise.reject(new Error('Vision requise'));
            return GT.createMission(t, name, visionId);
          });
          addMissionDetails.appendChild(addVisionSelect);
          addMissionDetails.appendChild(addMissionInput);
          addMissionDetails.appendChild(addMissionBtn);
        } else {
          var addVisionInput = document.createElement('input');
          addVisionInput.type = 'text';
          addVisionInput.className = 'tp-goals-input';
          addVisionInput.placeholder = 'Nom de la vision';
          addVisionInput.maxLength = 120;
          var addVisionBtn = document.createElement('button');
          addVisionBtn.type = 'button';
          addVisionBtn.className = 'tp-button tp-button--secondary';
          addVisionBtn.textContent = 'Créer la vision';
          bindCreateAction(addVisionBtn, addVisionInput, function (name) {
            return GT.createVision(t, name);
          });
          addMissionDetails.appendChild(addVisionInput);
          addMissionDetails.appendChild(addVisionBtn);
        }
        createRow.appendChild(addMissionDetails);
      }
      body.appendChild(createRow);
    }

    function refreshObjectifData() {
      var GT = window.GoalsTrello;
      if (!GT) return Promise.resolve();
      return Promise.all([
        GT.getCardProjectId(t),
        GT.preloadBoardGoalsContext(t),
      ]).then(function (results) {
        var projectId = results[0];
        var cache = GT.getCachedBoardGoals();
        var hierarchy = projectId
          ? GT.resolveHierarchyFromCache(cache, projectId)
          : { vision: null, mission: null, project: null };
        latestGoals = {
          projectId: projectId,
          hierarchy: hierarchy,
          visions: cache.visions,
          missions: cache.missions,
          projects: cache.projects,
          metrics: cache.metrics,
        };
        renderObjectifBody();
        resizePopup();
        return latestGoals;
      });
    }

    function mountObjectifSection(cardEl, initiallyOpen) {
      if (!window.GoalsTrello) {
        console.error('Priority popup: GoalsTrello unavailable');
        return Promise.resolve();
      }
      if (!infoUi || typeof infoUi.getObjectifMount !== 'function') {
        console.error('Priority popup: Information Objectif mount unavailable');
        return Promise.resolve();
      }

      var mount = infoUi.getObjectifMount();
      if (!mount) return Promise.resolve();

      if (typeof infoUi.setObjectifVisible === 'function') {
        infoUi.setObjectifVisible(true);
      }
      objectifSection = mount.closest('.info-row--objectif') || mount;
      objectifUi = { body: mount };

      return refreshObjectifData().then(function () {
        if (initiallyOpen && typeof infoUi.setExpanded === 'function') {
          infoUi.setExpanded(true);
        }
        renderObjectifBody();
        resizePopup();
      });
    }

    function mountProgressSection(cardEl, initiallyOpen, options) {
      options = options || {};
      var shouldFocusAdd = !!initiallyOpen && options.focusAdd !== false;
      var shouldScrollIntoView = !!initiallyOpen && options.scrollIntoView !== false;
      progressPanel = document.createElement('div');
      progressPanel.className = 'variant-progress-section';

      progressField = document.createElement('div');
      progressField.className = 'field field--progress';

      var chrome = PriorityUI.createCollapsibleEnableChrome({
        title: 'Progr\u00e8s',
        bodyId: 'progress-section-body',
        checkboxClass: 'progress-enable-checkbox',
        labelClass: 'progress-enable-label',
        leadingIcon: 'ti-check',
        iconClass: 'progress-leading-icon',
        titleClass: 'progress-enable-title',
        collapseLabel: 'Replier Progr\u00e8s',
        expandLabel: 'D\u00e9velopper Progr\u00e8s'
      });
      progressField.appendChild(chrome.head);
      progressSummaryEl = chrome.summary;

      progressBody = document.createElement('div');
      progressBody.className = 'progress-section-body section-toggle-body';
      progressBody.id = 'progress-section-body';
      progressBody.hidden = true;

      var completionMount = document.createElement('div');
      completionMount.id = 'completionMount';
      progressBody.appendChild(completionMount);

      progressField.appendChild(progressBody);
      progressPanel.appendChild(progressField);
      // Order: Priorité → Graphique → Progrès → Échéance
      var dueSection = cardEl.querySelector('.variant-due-section');
      if (dueSection) {
        cardEl.insertBefore(progressPanel, dueSection);
      } else {
        cardEl.appendChild(progressPanel);
      }

      progressCollapse = PriorityUI.bindCollapsibleEnable({
        field: progressField,
        body: progressBody,
        chrome: chrome,
        enabled: false,
        expanded: false,
        getSummary: progressSummaryText,
        onLayoutChange: resizePopup,
        onExpandChange: function (isExpanded) {
          progressExpanded = !!isExpanded && progressCollapse.isEnabled();
          PriorityUI.saveSectionCollapseState({ progress: !!isExpanded });
        },
        onEnableChange: function (on, opts) {
          progressEnabled = on;
          progressExpanded = on && progressCollapse.isExpanded();
          // persist:false = programmatic defaults on open; do not write card data yet.
          if (!(opts && opts.persist === false) && (latestCompletion || completionUi)) {
            var data = completionUi ? completionUi.getData() : latestCompletion;
            saveCompletion(data);
          }
          if (on && opts && opts.focusAdd && completionUi && typeof completionUi.focusAddInput === 'function') {
            setTimeout(function () {
              try { completionUi.focusAddInput(); } catch (e) { /* ignore */ }
            }, 0);
          }
        }
      });

      return CompletionTrello.getBoardCompletionColorScheme(t)
        .then(function () {
          return Promise.all([
            CompletionTrello.getCardCompletion(t),
            t.card('id', 'name').catch(function () {
              return null;
            }),
          ]);
        })
        .then(function (pair) {
          var stored = pair[0];
          var cardInfo = pair[1];
          var selfCardId = cardInfo && cardInfo.id ? String(cardInfo.id) : '';
          var initialName =
            (cardInfo && typeof cardInfo.name === 'string' && cardInfo.name.trim()) ||
            readCardNameLabel() ||
            '';
          completionUi = CompletionUI.mountCompletionUI(completionMount, {
            data: stored,
            showCardHeader: false,
            cardName: initialName,
            currentCardId: selfCardId,
            shellEl: progressPanel,
            celebrateRoot: document.body,
            getBoardCards: function () {
              return Promise.all([
                Promise.resolve(selfCardId),
                PriorityTrello.scanBoardCards
                  ? PriorityTrello.scanBoardCards(t, {
                      maxCards: 100,
                      includePriority: false,
                    })
                  : t.cards('id', 'name', 'idList').then(function (cards) {
                      return { cards: cards || [], lists: [] };
                    }),
              ]).then(function (parts) {
                var sid = parts[0];
                var scan = parts[1] || {};
                var listNameById = {};
                (scan.lists || []).forEach(function (list) {
                  if (list && list.id) listNameById[list.id] = list.name || '';
                });
                return (scan.cards || [])
                  .filter(function (card) {
                    return card && card.id && String(card.id) !== sid;
                  })
                  .map(function (card) {
                    return {
                      id: card.id,
                      name: card.name || '',
                      list: card.list || listNameById[card.idList] || '',
                    };
                  });
              });
            },
            resolveLinkedTree: function (completionData) {
              return (
                PriorityTrello.scanBoardCards
                  ? PriorityTrello.scanBoardCards(t, {
                      maxCards: 100,
                      includePriority: false,
                    })
                  : Promise.resolve({ cards: [] })
              ).then(function (scan) {
                var nameById = {};
                ((scan && scan.cards) || []).forEach(function (card) {
                  if (card && card.id) nameById[card.id] = card.name || '';
                });
                return CompletionTrello.resolveLinkedCompletionTree(t, completionData, {
                  currentCardId: selfCardId,
                  cardNameById: nameById,
                  maxDepth: CompletionTrello.LINK_NEST_MAX_DEPTH || 2,
                });
              });
            },
            onOpenLinkedCard: function (cardId) {
              if (!cardId) return;
              if (typeof t.showCard === 'function') {
                return t.showCard(cardId);
              }
              if (typeof t.navigate === 'function') {
                return t.cards('id', 'url').then(function (cards) {
                  var match = null;
                  for (var i = 0; i < (cards || []).length; i++) {
                    if (cards[i] && cards[i].id === cardId) {
                      match = cards[i];
                      break;
                    }
                  }
                  if (match && match.url) {
                    return t.navigate({ url: match.url });
                  }
                });
              }
            },
            suggestSubtasks: function (opts) {
              if (!window.PriorityAgent) {
                return Promise.resolve([]);
              }
              return resolveCardNameForAi().then(function (cardName) {
                return PriorityAgent.getProvider(t).then(function (provider) {
                  if (!PriorityAgent.isConfigured(provider)) return [];
                  var existingItems =
                    (opts && opts.items) ||
                    (completionUi && completionUi.getData && completionUi.getData().items
                      ? completionUi.getData().items
                      : []);
                  var existing = (existingItems || []).map(function (it) {
                    if (typeof it === 'string') return { text: it };
                    if (!it || typeof it !== 'object') return { text: '' };
                    var linked =
                      it.linkedCardId != null
                        ? String(it.linkedCardId).trim()
                        : window.CompletionTrello &&
                            typeof CompletionTrello.itemLinkedCardId === 'function'
                          ? CompletionTrello.itemLinkedCardId(it)
                          : '';
                    return {
                      text: it.text || '',
                      linkedCardId: linked || undefined
                    };
                  });
                  var memPromise =
                    cachedMemory != null
                      ? Promise.resolve(cachedMemory)
                      : window.AgentMemory
                        ? AgentMemory.load(t)
                            .then(function (m) {
                              cachedMemory = m;
                              return m;
                            })
                            .catch(function () {
                              return null;
                            })
                        : Promise.resolve(null);
                  var scanPromise = PriorityTrello.scanBoardCards
                    ? PriorityTrello.scanBoardCards(t, {
                        maxCards: 80,
                        includePriority: false,
                        descMax: 100
                      }).then(function (scan) {
                        if (scan && scan.digest) boardDigestCache = scan.digest;
                        return scan || { digest: boardDigestCache || '', cards: [], lists: [] };
                      })
                    : Promise.resolve({
                        digest: boardDigestCache || '',
                        cards: [],
                        lists: []
                      });
                  return Promise.all([memPromise, scanPromise]).then(function (pair) {
                    var memory = pair[0];
                    var scan = pair[1] || {};
                    var digest = boardDigestCache || (scan && scan.digest) || '';
                    var listNameById = {};
                    (scan.lists || []).forEach(function (list) {
                      if (list && list.id) listNameById[list.id] = list.name || '';
                    });
                    var linkedUsed = Object.create(null);
                    if (selfCardId) linkedUsed[selfCardId] = true;
                    existing.forEach(function (it) {
                      if (it && it.linkedCardId) linkedUsed[it.linkedCardId] = true;
                    });
                    var boardCards = (scan.cards || [])
                      .filter(function (card) {
                        return card && card.id && !linkedUsed[String(card.id)];
                      })
                      .map(function (card) {
                        return {
                          id: card.id,
                          name: card.name || '',
                          list: card.list || listNameById[card.listId || card.idList] || '',
                          desc: card.desc || ''
                        };
                      });
                    var state =
                      variant && typeof variant.getState === 'function'
                        ? variant.getState()
                        : {};
                    var priorityLabel = '';
                    try {
                      if (window.PriorityUI && PriorityUI.resolveDisplay && variant) {
                        var formulaKey =
                          typeof variant.getFormulaKey === 'function'
                            ? variant.getFormulaKey()
                            : 'baseline';
                        var calc =
                          PriorityUI.FORMULAS &&
                          PriorityUI.FORMULAS[formulaKey] &&
                          PriorityUI.FORMULAS[formulaKey].calc
                            ? PriorityUI.FORMULAS[formulaKey].calc
                            : null;
                        if (calc) {
                          var display = PriorityUI.resolveDisplay(calc(state), state);
                          priorityLabel = display.label || '';
                        }
                      }
                    } catch (e) {
                      /* ignore */
                    }
                    return PriorityAgent.suggestSubtasks(provider, {
                      cardName: cardName || readCardNameLabel(),
                      cardDesc:
                        (infoUi && typeof infoUi.getDesc === 'function'
                          ? infoUi.getDesc()
                          : '') ||
                        cardDesc ||
                        '',
                      priorityLabel: priorityLabel,
                      existingSubtasks: existing,
                      currentCardId: selfCardId || '',
                      memory: memory,
                      boardDigest: digest,
                      boardCards: boardCards
                    });
                  });
                });
              });
            },
            onChange: function (data) {
              saveCompletion(data);
              if (progressCollapse) progressCollapse.refreshSummary();
              syncBlockedSubtasks();
              syncDueBlockedForProgress(data);
              syncInfoRecap();
            },
            onAllCompleteChange: function (allComplete, meta) {
              var live =
                (completionUi && typeof completionUi.getData === 'function' && completionUi.getData()) ||
                (meta && meta.data) ||
                latestCompletion;
              syncDueBlockedForProgress(live);
              // Hit/leave 100%: sync Trello Done. Entering 100% clears Terminé-leave suppress.
              var syncPromise = syncDueCompleteFromProgress(live, {
                clearSuppress: !!allComplete,
              });
              if (
                allComplete &&
                syncPromise &&
                typeof PriorityTrello.clearBlockedIfComplete === 'function'
              ) {
                syncPromise.then(function () {
                  return PriorityTrello.clearBlockedIfComplete(t);
                }).then(function () {
                  if (allComplete && statutUi && typeof StatutTrello !== 'undefined') {
                    return StatutTrello.getCardStatut(t).then(function (statut) {
                      if (statutUi && typeof statutUi.setData === 'function') {
                        statutUi.setData({
                          listId: statut.listId,
                          lists: statut.lists,
                          settings: statut.settings,
                        });
                      }
                    });
                  }
                }).catch(function (err) {
                  console.error('clearBlockedIfComplete after Done failed', err);
                });
              }
            },
            onResize: function () {
              resizePopup();
            },
          });
          latestCompletion = completionUi.getData();
          syncDueBlockedForProgress(latestCompletion);
          // Initial paint may already be all-complete — sync Done without fireworks.
          syncDueCompleteFromProgress(latestCompletion);
          // Mirror priorityEnabled: on unless explicitly disabled (empty/new cards default on).
          var shouldEnable =
            !!initiallyOpen || !(stored && stored.progressEnabled === false);
          var expandFallback = initiallyOpen ? false : shouldEnable;
          var expandProgress = initiallyOpen
            ? true
            : PriorityUI.resolveSectionExpanded('progress', expandFallback);
          setProgressEnabled(shouldEnable, {
            focusAdd: shouldFocusAdd,
            expand: expandProgress,
            // Initial open defaults: do not overwrite collapse prefs or seed empty completion.
            persist: false
          });
          if (shouldScrollIntoView) {
            setTimeout(function () {
              try {
                progressPanel.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
              } catch (e) { /* ignore */ }
              resizePopup();
            }, 0);
          }
        });
    }

    async function init() {
      if (!window.PriorityUI) {
        throw new Error('PriorityUI is not available — priority-ui.js failed to load or initialize');
      }
      if (!window.CompletionUI || !window.CompletionTrello) {
        throw new Error('CompletionUI / CompletionTrello must be available in the priority popup');
      }

      if (window.Spellcheck && typeof Spellcheck.configure === 'function') {
        Spellcheck.configure({ t: t });
      }

      try {
        var cardBasics = await t.card('name', 'desc');
        if (cardBasics && typeof cardBasics.desc === 'string') {
          cardDesc = cardBasics.desc;
        }
        if (cardBasics && typeof cardBasics.name === 'string' && cardBasics.name.trim()) {
          cardNameCache = cardBasics.name.trim();
        }
      } catch (cardErr) {
        console.error('Priority popup card basics failed', cardErr);
      }

      if (window.AgentMemory) {
        try {
          cachedMemory = await AgentMemory.load(t);
        } catch (memErr) {
          console.error('AgentMemory.load failed', memErr);
          cachedMemory = null;
        }
        try {
          cachedCardMemory = await AgentMemory.loadCardMemory(t);
        } catch (cardMemErr) {
          console.error('AgentMemory.loadCardMemory failed', cardMemErr);
          cachedCardMemory = null;
        }
      }

      if (window.UserProfile) {
        try {
          cachedProfile = await UserProfile.load(t);
          try {
            if (typeof localStorage !== 'undefined' && cachedProfile) {
              localStorage.setItem(
                'trello-priority-powerup/agent-status',
                cachedProfile.agentStatus || 'standard'
              );
            }
          } catch (lsErr) { /* ignore */ }
        } catch (profErr) {
          console.error('UserProfile.load failed', profErr);
          cachedProfile =
            window.UserProfile && UserProfile.ensureAgentIdentity
              ? UserProfile.ensureAgentIdentity(
                  UserProfile.emptyProfile ? UserProfile.emptyProfile() : {}
                ).profile
              : window.UserProfile && UserProfile.emptyProfile
                ? UserProfile.emptyProfile()
                : null;
        }
      }

      try {
        await PriorityTrello.syncCardDueWithTrello(t, { prefer: 'trello' });
      } catch (syncErr) {
        console.error('Priority due sync (popup open) failed', syncErr);
      }
      const inputs = await PriorityTrello.clearBlockedIfComplete(t);
      await PriorityTrello.ensureBoardPriorityContext(t);
      const boardFormula = PriorityTrello.getCachedBoardFormulaKey
        ? PriorityTrello.getCachedBoardFormulaKey()
        : await PriorityTrello.getBoardFormula(t);

      var openSection = null;
      var argName = null;
      if (typeof t.arg === 'function') {
        openSection = t.arg('openSection');
        argName = t.arg('cardName');
      }
      var focusProgress = openSection === 'progress';
      var focusPriority = openSection === 'priority';
      var focusObjectif = openSection === 'objectif';
      var focusSection = focusProgress
        ? 'progress'
        : focusPriority
          ? 'priority'
          : focusObjectif
            ? null
            : null;

      const hasSavedPriority = !!inputs;
      const initialDefaults = hasSavedPriority
        ? inputs
        : Object.assign({}, PriorityTrello.IMPORTANT_INPUTS, {
            priorityEnabled: !focusProgress
          });

      var experimentalFlags =
        cachedProfile && cachedProfile.experimental
          ? cachedProfile.experimental
          : null;
      if (
        window.UserProfile &&
        typeof UserProfile.normalizeExperimental === 'function'
      ) {
        experimentalFlags = UserProfile.normalizeExperimental(experimentalFlags);
      } else {
        experimentalFlags = experimentalFlags || {
          objectif: false,
          impactGlobe: false,
          easeHourglass: false
        };
      }

      variant = PriorityUI.mountVariant(mountEl, {
        id: 'card',
        showCardHeader: true,
        hideCardHeader: true,
        formula: boardFormula,
        defaults: initialDefaults,
        focusSection: focusSection,
        dimensions: PriorityTrello.PRIORITY_DIMENSIONS,
        experimental: experimentalFlags,
        getBlockedSubtasks: getBlockedSubtasks,
        loadState: function (defaults) {
          return Object.assign({}, defaults);
        },
        onStateChange: function (state) {
          saveState(state);
          syncInfoRecap();
        },
        onLayoutChange: function () {
          resizePopup();
        },
        onFormulaChange: function (formulaKey) {
          PriorityTrello.saveBoardFormula(t, formulaKey).catch(function (err) {
            console.error('Priority formula save failed', err);
          });
        },
      });

      await mountInfoSection(variant.card);

      if (argName) setCardNameLabel(argName);
      else if (cardNameCache) setCardNameLabel(cardNameCache);
      var cardNameEl = document.getElementById('cardName');
      cardNamePromise = PriorityTrello.getCardName(t).then(function (resolved) {
        if (resolved) setCardNameLabel(resolved);
        return resolved || cardNameCache || '';
      }, function () {
        if (cardNameEl && cardNameEl.classList.contains('is-loading')) {
          setCardNameLabel(null);
        }
        return cardNameCache || '';
      });

      // Don't auto-seed cardPriority when opened only for progress on an unset card.
      if (!hasSavedPriority && !focusProgress) {
        await saveState(variant.getState());
      }

      var profileFeatures =
        cachedProfile && cachedProfile.features
          ? cachedProfile.features
          : null;
      var featureOn = function (key) {
        if (!profileFeatures) return true;
        if (window.UserProfile && typeof UserProfile.isFeatureEnabled === 'function') {
          return UserProfile.isFeatureEnabled(cachedProfile, key);
        }
        return profileFeatures[key] !== false;
      };

      var experimentalOn = function (key) {
        if (
          window.UserProfile &&
          typeof UserProfile.isExperimentalEnabled === 'function'
        ) {
          return UserProfile.isExperimentalEnabled(cachedProfile, key);
        }
        return !!(experimentalFlags && experimentalFlags[key] === true);
      };

      if (featureOn('statut')) {
        await mountStatutSection(variant.card);
        attachBlockedIntoStatut();
      }
      if (experimentalOn('objectif') || focusObjectif) {
        await mountObjectifSection(variant.card, focusObjectif);
      }
      if (featureOn('progress') || focusProgress) {
        var openAssistantChat =
          focusProgress &&
          featureOn('assistant') &&
          window.AgentUI &&
          window.PriorityAgent;
        await mountProgressSection(variant.card, focusProgress, {
          // When opening « Définir le progrès », prefer Assistant chat focus/scroll.
          focusAdd: !openAssistantChat,
          scrollIntoView: !openAssistantChat
        });
      }
      syncBlockedSubtasks();
      syncInfoRecap();

      var agentUi = null;
      if (featureOn('assistant') && window.AgentUI && window.PriorityAgent) {
        agentUi = AgentUI.mount(variant.card, {
          t: t,
          initiallyOpen: focusProgress,
          focusComposer: focusProgress,
          getCardName: function () {
            return readCardNameLabel();
          },
          getCardDesc: function () {
            if (infoUi && typeof infoUi.getDesc === 'function') {
              return infoUi.getDesc() || '';
            }
            return cardDesc || '';
          },
          setCardName: function (name) {
            var next = typeof name === 'string' ? name.trim() : '';
            if (!next) {
              return Promise.resolve({ ok: false, reason: 'empty-name', changed: false });
            }
            if (!PriorityTrello || typeof PriorityTrello.setCardName !== 'function') {
              return Promise.resolve({ ok: false, reason: 'no-setCardName', changed: false });
            }
            return PriorityTrello.setCardName(t, next).then(function (result) {
              if (result && result.ok) {
                setCardNameLabel(next);
                if (infoUi && typeof infoUi.setTitle === 'function') {
                  infoUi.setTitle(next, { force: true });
                }
              }
              return result;
            });
          },
          setCardDesc: function (desc) {
            var next = typeof desc === 'string' ? desc : '';
            if (!PriorityTrello || typeof PriorityTrello.setCardDesc !== 'function') {
              return Promise.resolve({ ok: false, reason: 'no-setCardDesc', changed: false });
            }
            return PriorityTrello.setCardDesc(t, next).then(function (result) {
              if (result && result.ok) {
                cardDesc = next;
                if (infoUi && typeof infoUi.setDesc === 'function') {
                  infoUi.setDesc(next, { force: true });
                }
              }
              return result;
            });
          },
          getMemory: function () {
            return (
              cachedMemory || {
                version: 2,
                summary: '',
                facts: [],
                longTerm: { summary: '', facts: [] },
                shortTerm: { boardSummary: '', notes: [], recentCards: [] },
                onboardingComplete: false
              }
            );
          },
          onMemoryUpdate: function (next) {
            if (next && typeof next === 'object') {
              cachedMemory = next;
            }
          },
          getCardMemory: function () {
            return (
              cachedCardMemory || {
                version: 1,
                facts: [],
                updatedAt: ''
              }
            );
          },
          onCardMemoryUpdate: function (next) {
            if (next && typeof next === 'object') {
              cachedCardMemory = next;
            }
          },
          getProfile: function () {
            return cachedProfile;
          },
          getBoardDigest: function () {
            return boardDigestCache || '';
          },
          getFormulaKey: function () {
            if (variant && typeof variant.getFormulaKey === 'function') {
              return variant.getFormulaKey();
            }
            return boardFormula || 'baseline';
          },
          getPriorityState: function () {
            return variant && typeof variant.getState === 'function'
              ? variant.getState()
              : latestState || {};
          },
          getCompletion: function () {
            if (completionUi && typeof completionUi.getData === 'function') {
              return completionUi.getData();
            }
            return latestCompletion || { items: [] };
          },
          applyPriority: function (partial) {
            if (!variant || typeof variant.setState !== 'function') return;
            variant.setState(Object.assign({}, variant.getState(), partial || {}), {
              preserveCollapse: true
            });
          },
          applyCompletion: function (next) {
            if (!completionUi || typeof completionUi.setData !== 'function') return;
            completionUi.setData(next);
            var live = completionUi.getData();
            saveCompletion(live);
            if (progressCollapse) progressCollapse.refreshSummary();
            syncBlockedSubtasks();
            syncDueBlockedForProgress(live);
            // setData may have fired onAllCompleteChange; sync again so agent
            // updates to 100% always set Trello "Mark complete".
            syncDueCompleteFromProgress(live, {
              clearSuppress: progressIsFullyComplete(live),
            });
            if (live.progressEnabled !== false) {
              setProgressEnabled(true, {
                expand: false,
                preserveCollapse: true,
                persist: false
              });
            }
          },
          playEffect: function (name, opts) {
            if (
              !window.CelebrationEffects ||
              typeof CelebrationEffects.play !== 'function'
            ) {
              return { ok: false, error: 'CelebrationEffects indisponible' };
            }
            var options = opts && typeof opts === 'object' ? Object.assign({}, opts) : {};
            if (!options.root) options.root = document.body;
            return CelebrationEffects.play(name, options);
          },
          openSection: function (key, opts) {
            opts = opts || {};
            var expand = opts.expand === true;
            var target = null;
            if (key === 'progress') {
              if (progressCollapse && typeof progressCollapse.setExpanded === 'function') {
                if (expand) {
                  if (
                    typeof progressCollapse.isExpanded === 'function' &&
                    !progressCollapse.isExpanded()
                  ) {
                    progressCollapse.setExpanded(true);
                  }
                } else if (typeof progressCollapse.isExpanded === 'function') {
                  progressCollapse.setExpanded(!progressCollapse.isExpanded());
                }
              }
              target =
                (variant &&
                  variant.card &&
                  variant.card.querySelector('.variant-progress-section')) ||
                null;
            } else if (key === 'statut') {
              if (statutUi && typeof statutUi.setExpanded === 'function') {
                if (expand) {
                  if (
                    typeof statutUi.isExpanded === 'function' &&
                    !statutUi.isExpanded()
                  ) {
                    statutUi.setExpanded(true);
                  } else if (typeof statutUi.isExpanded !== 'function') {
                    statutUi.setExpanded(true);
                  }
                } else {
                  statutUi.setExpanded(true);
                }
              }
              target =
                (variant &&
                  variant.card &&
                  variant.card.querySelector('.variant-statut-section')) ||
                null;
            } else if (key === 'objectif' || key === 'info') {
              if (infoUi && typeof infoUi.setExpanded === 'function') {
                infoUi.setExpanded(true);
              }
              if (key === 'objectif') {
                target =
                  (variant &&
                    variant.card &&
                    variant.card.querySelector(
                      '.variant-objectif-section, .info-row--objectif'
                    )) ||
                  null;
              } else {
                target =
                  (variant &&
                    variant.card &&
                    variant.card.querySelector(
                      '.variant-info-section, .info-section-body'
                    )) ||
                  null;
              }
            } else if (key === 'blocked') {
              if (expand) {
                if (statutUi && typeof statutUi.setExpanded === 'function') {
                  statutUi.setExpanded(true);
                }
                if (typeof statutUi.syncBlockedPanel === 'function') {
                  statutUi.syncBlockedPanel();
                }
              }
              jumpToSection('blocked');
              target =
                (typeof variant.getBlockedSection === 'function' &&
                  variant.getBlockedSection()) ||
                (variant.card &&
                  variant.card.querySelector('.statut-blocked-panel')) ||
                null;
            } else if (typeof variant.openSection === 'function') {
              target = variant.openSection(key, { expand: expand });
            } else if (variant.card) {
              if (key === 'priority') {
                target = variant.card.querySelector('.variant-priority-section');
              } else if (key === 'due') {
                target = variant.card.querySelector('.variant-due-section');
              }
            }
            if (target && expand) {
              setTimeout(function () {
                try {
                  target.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                } catch (e) { /* ignore */ }
                resizePopup();
              }, 0);
            }
            return target;
          },
          setFormulaKey: function (key) {
            if (variant && typeof variant.setFormulaKey === 'function') {
              variant.setFormulaKey(key);
            }
          },
          getStatut: function () {
            return latestStatut;
          },
          selectStatut: function (listId) {
            return applyStatutListSelection(listId);
          },
          getGoals: function () {
            return latestGoals;
          },
          setProject: function (projectId) {
            if (!window.GoalsTrello) {
              return Promise.resolve({ ok: false, reason: 'no-goals' });
            }
            return GoalsTrello.setCardProjectId(t, projectId || null)
              .then(function (id) {
                return refreshObjectifData().then(function () {
                  return { ok: true, projectId: id };
                });
              })
              .catch(function (err) {
                return {
                  ok: false,
                  reason: (err && err.message) || 'set-project-failed',
                };
              });
          },
          onLayoutChange: resizePopup
        });
      } else if (featureOn('assistant')) {
        console.error('Priority popup: AgentUI / PriorityAgent unavailable');
      }

      if (window.UserProfile && typeof UserProfile.applyFeaturesToCard === 'function' && variant && variant.card) {
        UserProfile.applyFeaturesToCard(variant.card, cachedProfile);
      }

      await cardNamePromise;
      if (focusProgress && agentUi && typeof agentUi.focusComposer === 'function') {
        agentUi.focusComposer();
      } else if (focusObjectif && objectifSection) {
        if (infoUi && typeof infoUi.setExpanded === 'function') {
          infoUi.setExpanded(true);
        }
        objectifSection.scrollIntoView({ block: 'nearest' });
      } else if (!focusProgress) {
        window.scrollTo(0, 0);
      }
      resizePopup();
    }

    window.addEventListener('pagehide', function () {
      if (infoUi && typeof infoUi.flushDesc === 'function') {
        infoUi.flushDesc();
      }
      if (latestState) {
        saveState(latestState);
      }
      if (latestCompletion) {
        saveCompletion(latestCompletion);
      }
    });

    return init();
    }).catch(function (err) {
      console.error('Priority popup init failed', err);
    });
  </script>
</body>
</html>
