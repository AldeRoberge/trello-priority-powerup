<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Définir la priorité</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./priority-templates.js"></script>
  <link rel="stylesheet" href="./trello-theme.css" />
</head>
<body class="tp-page">
  <div class="tp-list" id="priorityList">
    <p class="tp-muted">Chargement…</p>
  </div>
  <button class="tp-btn--ghost" id="clearBtn" type="button">Effacer la priorité</button>

  <script>
    const t = TrelloPowerUp.iframe();

    async function render() {
      const [priorities, currentPriority] = await Promise.all([
        t.get('board', 'shared', 'priorities').then(p => p || DEFAULT_PRIORITIES),
        t.get('card', 'shared', 'priority'),
      ]);

      const list = document.getElementById('priorityList');
      list.innerHTML = '';

      priorities.forEach(p => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tp-list-item' + (currentPriority == p.id ? ' is-active' : '');
        btn.innerHTML = `
          <span class="tp-dot" style="background:${p.color};"></span>
          <span>${p.label}</span>
          <span class="tp-meta">P${p.id}</span>
        `;
        btn.addEventListener('click', async () => {
          await t.set('card', 'shared', 'priority', p.id);
          t.closePopup();
        });
        list.appendChild(btn);
      });
    }

    document.getElementById('clearBtn').addEventListener('click', async () => {
      await t.remove('card', 'shared', 'priority');
      t.closePopup();
    });

    render();
  </script>
</body>
</html>
