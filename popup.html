<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Définir la priorité</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>window.__trelloIframe = TrelloPowerUp.iframe();</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="./trello-theme.css" />
  <link rel="stylesheet" href="./priority-ui.css" />
  <script src="./priority-ui.js"></script>
  <script src="./priority-trello.js"></script>
</head>
<body class="tp-page tp-page--priority">
  <div class="compare-page">
    <div class="compare-grid" id="priorityMount"></div>
  </div>
  <button class="tp-btn--ghost" id="clearBtn" type="button">Effacer la priorité</button>

  <script>
    const t = window.__trelloIframe || TrelloPowerUp.iframe();
    const mountEl = document.getElementById('priorityMount');
    let variant = null;
    let saveTimer = null;
    let resizeObserver = null;

    function scheduleSave(state) {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        await PriorityTrello.saveCardInputs(t, state);
      }, 250);
    }

    function sizePopup() {
      t.sizeTo(document.body);
    }

    function startResizeObserver() {
      if (resizeObserver) return;
      resizeObserver = new ResizeObserver(() => sizePopup());
      resizeObserver.observe(document.body);
    }

    async function init() {
      const inputs = await PriorityTrello.getCardInputs(t);

      variant = PriorityUI.mountVariant(mountEl, {
        id: 'card',
        formula: 'baseline',
        defaults: inputs || PriorityTrello.DEFAULT_INPUTS,
        dimensions: PriorityTrello.PRIORITY_DIMENSIONS,
        loadState: function (defaults) {
          return inputs ? Object.assign({}, inputs) : Object.assign({}, defaults);
        },
        onStateChange: scheduleSave,
      });

      startResizeObserver();
      sizePopup();
      requestAnimationFrame(sizePopup);
    }

    document.getElementById('clearBtn').addEventListener('click', async () => {
      clearTimeout(saveTimer);
      await PriorityTrello.clearCardPriority(t);
      t.closePopup();
    });

    init().catch(function (err) {
      console.error('Priority popup init failed', err);
      mountEl.textContent = 'Impossible de charger l\'éditeur de priorité.';
      startResizeObserver();
      sizePopup();
    });
  </script>
</body>
</html>
