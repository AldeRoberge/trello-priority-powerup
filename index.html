<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Priorité</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./js/rest-config.js"></script>
  <script src="./js/version.js"></script>
  <script src="./js/priority-matrix.js"></script>
  <script src="./js/priority-ui.js"></script>
  <script>
    if (!window.PriorityUI) {
      console.error('Priority connector: priority-ui.js did not expose window.PriorityUI');
    }
  </script>
  <script src="./js/priority-trello.js"></script>
  <script src="./js/statut-match.js"></script>
  <script src="./js/statut-trello.js"></script>
  <script src="./js/completion-ui.js"></script>
  <script src="./js/completion-trello.js"></script>
  <script src="./js/agent.js"></script>
  <script src="./js/agent-memory.js"></script>
  <script src="./js/user-profile.js"></script>
  <link rel="stylesheet" href="./css/trello-theme.css" />
</head>
<body>
  <div id="landing" class="tp-landing" hidden>
    <div class="tp-landing-card">
      <h1 class="tp-title">Priorité</h1>
      <p class="tp-subtitle">Power-Up Trello</p>
      <p class="tp-version-label">Version déployée</p>

      <p class="tp-version-relative" id="versionRelative">Chargement…</p>
      <p class="tp-version-utc" id="versionUtc"></p>
    </div>
  </div>

<script>
  const IN_TRELLO = window.self !== window.top;

  if (IN_TRELLO) {
    initPowerUp();
  } else {
    document.getElementById('landing').hidden = false;
    initLanding();
  }

  function renderVersion(builtAt) {
    document.getElementById('versionRelative').textContent = BuildVersion.updatedLabel(builtAt);
    document.getElementById('versionUtc').textContent = BuildVersion.formatUtc(builtAt);
  }

  async function initLanding() {
    let builtAt;


    try {
      builtAt = await BuildVersion.fetchBuiltAt('./build-info.json', './index.html');
    } catch {
      document.getElementById('versionRelative').textContent = 'Informations de build indisponibles';
      document.getElementById('versionUtc').textContent = '';
      return;
    }

    renderVersion(builtAt);
    setInterval(() => renderVersion(builtAt), 30_000);
  }

  function initPowerUp() {
    function withBoardContext(capabilityFn) {
      return function (t, opts) {
        var preloads = [
          PriorityTrello.preloadBoardPriorityContext(t).catch(function (err) {
            console.error('Priority board context preload failed', err);
          }),
        ];
        if (typeof CompletionTrello !== 'undefined' && CompletionTrello.preloadBoardCompletionContext) {
          preloads.push(
            CompletionTrello.preloadBoardCompletionContext(t).catch(function (err) {
              console.error('Completion board context preload failed', err);
            })
          );
        }
        return Promise.all(preloads).then(function () {
          return capabilityFn(t, opts);
        });
      };
    }

    async function openPriorityPopup(t, options) {
      // Popup width is fixed (narrow) by Trello; modal gives a comfortable editor width.
      // Use pageUrl (absolute, unsigned) — t.modal signs once; t.signUrl() double-signs.
      // Pass card name via args so the iframe can show it immediately (reliable card context).
      // openSection expands that section inside popup.html (priority / progress).
      options = options || {};
      var card = await t.card('name');
      var cardName = card && typeof card.name === 'string' ? card.name : '';
      var openSection = options.openSection || 'priority';
      var args = { cardName: cardName, openSection: openSection };
      var focusProgress = openSection === 'progress';
      return t.modal({
        title: focusProgress ? 'D\u00e9finir le progr\u00e8s' : 'D\u00e9finir la priorit\u00e9',
        url: PriorityTrello.pageUrl('./popup.html'),
        args: args,
        height: 1100,
        fullscreen: false,
        accentColor: '#22272B',
      });
    }

    async function openCompletionPopup(t) {
      // Progress editor lives in the priority modal (checkbox « Progrès »).
      return openPriorityPopup(t, { openSection: 'progress' });
    }

    TrelloPowerUp.initialize({

      'card-badges': withBoardContext(function (t) {
        return Promise.all([
          PriorityTrello.cardFaceBadges(t),
          CompletionTrello.cardFaceBadges(t),
        ]).then(function (results) {
          return results[0].concat(results[1]);
        });
      }),

      // card-buttons is not used (priority is opened via card-detail-badges).
      // list-actions / on-disable: stubs if enabled in admin (avoids IFrameIO "not implemented").
      'card-buttons': function () {
        return [];
      },
      'list-actions': function () {
        return [];
      },
      'on-disable': function () {
        // No board cleanup required; shared plugin data is left intact for re-enable.
      },

      'card-detail-badges': withBoardContext(function (t) {
        return Promise.all([
          PriorityTrello.cardDetailBadges(t, openPriorityPopup),
          CompletionTrello.cardDetailBadges(t, openCompletionPopup),
        ]).then(function (results) {
          return results[0].concat(results[1]);
        });
      }),

      'on-enable': function(t) {
        return PriorityTrello.preloadBoardPriorityContext(t)
          .then(function () {
            if (typeof StatutTrello !== 'undefined' && StatutTrello.ensureStatutSettings) {
              return StatutTrello.ensureStatutSettings(t);
            }
          })
          .then(function () {
            return new Promise(function (resolve) {
              t.modal({
                title: 'Priorité',
                url: PriorityTrello.pageUrl('./welcome.html'),
                height: 520,
                fullscreen: false,
                accentColor: '#22272B',
                callback: function () {
                  resolve();
                },
              });
            });
          })
          .then(function () {
            if (typeof AgentMemory === 'undefined') return;
            return AgentMemory.load(t).then(function (memory) {
              if (!AgentMemory.needsOnboarding(memory)) return;
              return t.modal({
                title: 'Aligner l\'assistant',
                url: PriorityTrello.pageUrl('./memory-align.html'),
                height: 560,
                fullscreen: false,
                accentColor: '#22272B',
              });
            });
          });
      },

      // Settings popup loads board context itself — do not gate the menu item on preload.
      'board-buttons': function(t) {
        return [
          {
            icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.263.0/icons/settings.svg',
            text: 'Paramètres de priorité',
            callback: function(t) {
              // Popup width is fixed (narrow) by Trello; modal fits statut mapping + color schemes.
              return t.modal({
                title: 'Paramètres de priorité',
                url: PriorityTrello.pageUrl('./settings.html'),
                height: 720,
                fullscreen: false,
                accentColor: '#22272B',
              });
            },
          },
          {
            icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.263.0/icons/user.svg',
            text: 'Mon profil',
            callback: function(t) {
              return t.modal({
                title: 'Mon profil',
                url: PriorityTrello.pageUrl('./profile.html'),
                height: 640,
                fullscreen: false,
                accentColor: '#22272B',
              });
            },
          },
          {
            icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.263.0/icons/bot.svg',
            text: 'Assistant (mémoire)',
            callback: function(t) {
              return Promise.resolve()
                .then(function () {
                  if (typeof AgentMemory === 'undefined') return null;
                  return AgentMemory.load(t);
                })
                .then(function (memory) {
                  if (memory && AgentMemory.needsOnboarding(memory)) {
                    return t.modal({
                      title: 'Aligner l\'assistant',
                      url: PriorityTrello.pageUrl('./memory-align.html'),
                      height: 560,
                      fullscreen: false,
                      accentColor: '#22272B',
                    });
                  }
                  return t.boardBar({
                    url: PriorityTrello.pageUrl('./memory-chat.html'),
                    title: 'Assistant',
                    height: 280,
                    resizable: true,
                    accentColor: '#22272B',
                  });
                });
            },
          },
        ];
      },

      'list-sorters': withBoardContext(function (t) {
        return PriorityTrello.listPrioritySorters(t);
      }),

    }, (function () {
      var restOpts = PriorityTrello.restClientOptions && PriorityTrello.restClientOptions();
      return restOpts || {};
    })());
  }
</script>
</body>
</html>
