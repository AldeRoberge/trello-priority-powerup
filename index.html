<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Priorities Power-Up</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./version.js"></script>
  <link rel="stylesheet" href="./trello-theme.css" />
</head>
<body>
  <div id="landing" class="tp-landing" hidden>
    <div class="tp-landing-card">
      <h1 class="tp-title">Card Priorities</h1>
      <p class="tp-subtitle">Trello Power-Up</p>
      <p class="tp-version-label">Deployed version</p>
      <p class="tp-version-relative" id="versionRelative">Loading…</p>
      <p class="tp-version-utc" id="versionUtc"></p>
      <p class="tp-landing-note">Timestamp is stamped automatically on every push to <code>main</code>.</p>
    </div>
  </div>

<script>
  const IN_TRELLO = window.self !== window.top;

  if (IN_TRELLO) {
    initPowerUp();
  } else {
    document.getElementById('landing').hidden = false;
    initLanding();
  }

  // ── Landing page (direct browser visit) ─────────────────────────────────

  function renderVersion(builtAt) {
    document.getElementById('versionRelative').textContent = BuildVersion.updatedLabel(builtAt);
    document.getElementById('versionUtc').textContent = BuildVersion.formatUtc(builtAt);
  }

  async function initLanding() {
    let builtAt;

    try {
      builtAt = await BuildVersion.fetchBuiltAt('./build-info.json');
    } catch {
      document.getElementById('versionRelative').textContent = 'Build info unavailable';
      document.getElementById('versionUtc').textContent = '';
      return;
    }

    renderVersion(builtAt);
    setInterval(() => renderVersion(builtAt), 30_000);
  }

  // ── Trello Power-Up connector (hidden iframe) ───────────────────────────

  function initPowerUp() {
    const DEFAULT_PRIORITIES = [
      { id: 1, label: 'Urgent', color: '#E53E3E' },
      { id: 2, label: 'High',   color: '#DD6B20' },
      { id: 3, label: 'Medium', color: '#D69E2E' },
      { id: 4, label: 'Low',    color: '#38A169' },
      { id: 5, label: 'None',   color: '#718096' },
    ];

    async function getPriorities(t) {
      const stored = await t.get('board', 'shared', 'priorities');
      return stored || DEFAULT_PRIORITIES;
    }

    function openPriorityPopup(t) {
      return t.popup({
        title: 'Set Priority',
        url: './popup.html',
        height: 320,
      });
    }

    function priorityDotIcon(hex) {
      const safe = /^#[0-9A-Fa-f]{6}$/.test(hex) ? hex : '#718096';
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10">`
        + `<circle cx="5" cy="5" r="4.5" fill="${safe}"/></svg>`;
      return `data:image/svg+xml,${encodeURIComponent(svg)}`;
    }

    TrelloPowerUp.initialize({

      'card-badges': async function(t) {
        const priorityId = await t.get('card', 'shared', 'priority');
        if (!priorityId) return [];
        const priorities = await getPriorities(t);
        const p = priorities.find(x => x.id === priorityId);
        if (!p) return [];
        return [{
          icon: priorityDotIcon(p.color),
          text: p.label,
          monochrome: false,
        }];
      },

      'card-detail-badges': async function(t) {
        return [{
          text: 'Set Priority',
          color: 'green',
          callback: openPriorityPopup,
        }];
      },

      'on-enable': function(t) {
        return t.modal({
          title: 'Card Priorities',
          url: './welcome.html',
          height: 420,
          fullscreen: false,
          accentColor: '#0C66E4',
        });
      },

      'board-buttons': function(t) {
        return [{
          icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.263.0/icons/settings.svg',
          text: 'Priority Settings',
          callback: function(t) {
            return t.popup({
              title: 'Priority Settings',
              url: './settings.html',
              height: 420,
            });
          },
        }];
      },

    });
  }
</script>
</body>
</html>
