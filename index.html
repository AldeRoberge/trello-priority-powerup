<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trello Cerveau</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./components/shared/brand.js"></script>
  <script src="./components/shared/rest-config.js"></script>
  <script src="./components/shared/version.js"></script>
  <script src="./components/shared/debug-log.js"></script>
  <script src="./components/priority/priority-matrix.js"></script>
  <script src="./components/priority/priority-ui.js"></script>
  <script>
    if (!window.PriorityUI) {
      console.error('Priority connector: priority-ui.js did not expose window.PriorityUI');
    }
  </script>
  <script src="./components/priority/priority-trello.js"></script>
  <script src="./components/statut/statut-match.js"></script>
  <script src="./components/statut/statut-trello.js"></script>
  <script src="./components/shared/tab-autocomplete.js"></script>
  <script src="./components/completion/completion-ui.js"></script>
  <script src="./components/completion/completion-trello.js"></script>
  <script src="./components/goals/goals-trello.js"></script>
  <script src="./components/agent/agent.js"></script>
  <script src="./components/agent/agent-memory.js"></script>
  <script src="./components/profile/user-profile.js"></script>
  <link rel="stylesheet" href="./components/shared/trello-theme.css" />
  <link rel="icon" type="image/png" href="./assets/icon.png" />
</head>
<body>
  <div id="landing" class="tp-landing" hidden>
    <div class="tp-landing-card">
      <img id="brandLogo" class="tp-landing-logo" src="./assets/icon.png" alt="Trello Cerveau" width="72" height="72" />
      <h1 class="tp-title" id="brandTitle">Trello Cerveau</h1>
      <p class="tp-subtitle" id="brandTagline">Power-Up Trello</p>
      <p class="tp-version-label">Version déployée</p>

      <p class="tp-version-relative" id="versionRelative">Chargement…</p>
      <p class="tp-version-utc" id="versionUtc"></p>
    </div>
  </div>

<script>
  const IN_TRELLO = window.self !== window.top;

  if (window.PriorityBrand && typeof PriorityBrand.applyLanding === 'function') {
    PriorityBrand.applyLanding(document);
  }

  if (IN_TRELLO) {
    initPowerUp();
  } else {
    document.getElementById('landing').hidden = false;
    initLanding();
  }

  function renderVersion(builtAt) {
    document.getElementById('versionRelative').textContent = BuildVersion.updatedLabel(builtAt);
    document.getElementById('versionUtc').textContent = BuildVersion.formatUtc(builtAt);
  }

  async function initLanding() {
    let builtAt;


    try {
      builtAt = await BuildVersion.fetchBuiltAt('./build-info.json', './index.html');
    } catch {
      document.getElementById('versionRelative').textContent = 'Informations de build indisponibles';
      document.getElementById('versionUtc').textContent = '';
      return;
    }

    renderVersion(builtAt);
    setInterval(() => renderVersion(builtAt), 30_000);
  }

  function initPowerUp() {
    if (window.TpDebug) TpDebug.log('index', 'powerUp.init');

    function withBoardContext(capabilityFn, capabilityName) {
      return function (t, opts) {
        var timer =
          window.TpDebug && TpDebug.isEnabled()
            ? TpDebug.start('index', 'capability.' + (capabilityName || 'unknown'))
            : null;
        if (window.TpDebug && typeof TpDebug.configureFromProfile === 'function') {
          TpDebug.configureFromProfile(t).catch(function () {});
        }
        var preloads = [
          PriorityTrello.preloadBoardPriorityContext(t).catch(function (err) {
            if (window.TpDebug) TpDebug.error('index', 'priority.preload', err);
            else console.error('Priority board context preload failed', err);
          }),
        ];
        if (typeof CompletionTrello !== 'undefined' && CompletionTrello.preloadBoardCompletionContext) {
          preloads.push(
            CompletionTrello.preloadBoardCompletionContext(t).catch(function (err) {
              if (window.TpDebug) TpDebug.error('index', 'completion.preload', err);
              else console.error('Completion board context preload failed', err);
            })
          );
        }
        if (typeof GoalsTrello !== 'undefined' && GoalsTrello.preloadBoardGoalsContext) {
          preloads.push(
            Promise.resolve()
              .then(function () {
                if (typeof UserProfile === 'undefined' || typeof UserProfile.load !== 'function') {
                  return null;
                }
                return UserProfile.load(t);
              })
              .then(function (profile) {
                var on =
                  typeof UserProfile !== 'undefined' &&
                  typeof UserProfile.isExperimentalEnabled === 'function'
                    ? UserProfile.isExperimentalEnabled(profile, 'objectif')
                    : false;
                if (!on) return;
                return GoalsTrello.preloadBoardGoalsContext(t);
              })
              .catch(function (err) {
                if (window.TpDebug) TpDebug.error('index', 'goals.preload', err);
                else console.error('Goals board context preload failed', err);
              })
          );
        }
        return Promise.all(preloads).then(function () {
          return capabilityFn(t, opts);
        }).then(
          function (result) {
            if (timer) timer.end({ ok: true });
            return result;
          },
          function (err) {
            if (timer) timer.fail(err);
            throw err;
          }
        );
      };
    }

    async function openPriorityPopup(t, options) {
      // Popup width is fixed (narrow) by Trello; modal gives a comfortable editor width.
      // Use pageUrl (absolute, unsigned) — t.modal signs once; t.signUrl() double-signs.
      // Pass card name via args so the iframe can show it immediately (reliable card context).
      // openSection expands that section inside popup.html (priority / progress / objectif).
      options = options || {};
      var card = await t.card('name');
      var cardName = card && typeof card.name === 'string' ? card.name : '';
      var openSection = options.openSection || 'priority';
      var args = { cardName: cardName, openSection: openSection };
      var focusProgress = openSection === 'progress';
      var focusObjectif = openSection === 'objectif';
      var appName =
        (window.PriorityBrand && typeof PriorityBrand.getAppName === 'function'
          ? PriorityBrand.getAppName()
          : null) ||
        (window.PriorityRestConfig && PriorityRestConfig.appName) ||
        'Trello Cerveau';
      var title = focusProgress
        ? 'Définir le progrès'
        : focusObjectif
          ? 'Objectif'
          : appName;
      if (window.TpDebug) {
        TpDebug.log('index', 'modal.open', {
          section: openSection,
          hasName: !!cardName
        });
      }
      return t.modal({
        title: title,
        url: PriorityTrello.pageUrl('./popup.html'),
        args: args,
        height: 1100,
        fullscreen: false,
        accentColor: '#22272B',
      });
    }

    async function openCompletionPopup(t) {
      // Progress editor lives in the priority modal (checkbox « Progrès »).
      return openPriorityPopup(t, { openSection: 'progress' });
    }

    async function openObjectifPopup(t) {
      return openPriorityPopup(t, { openSection: 'objectif' });
    }

    TrelloPowerUp.initialize({

      // Face: single Priority badge (priority label + progress % when set).
      // Project / separate progress badges are omitted on the board card face.
      'card-badges': withBoardContext(function (t) {
        return PriorityTrello.cardFaceBadges(t);
      }, 'card-badges'),

      // card-buttons is not used (priority is opened via card-detail-badges).
      // list-actions / on-disable: stubs if enabled in admin (avoids IFrameIO "not implemented").
      'card-buttons': function () {
        return [];
      },
      'list-actions': function () {
        return [];
      },
      'on-disable': function () {
        // No board cleanup required; shared plugin data is left intact for re-enable.
      },

      'card-detail-badges': withBoardContext(function (t) {
        var jobs = [
          PriorityTrello.cardDetailBadges(t, openPriorityPopup),
          CompletionTrello.cardDetailBadges(t, openCompletionPopup),
        ];
        return Promise.resolve()
          .then(function () {
            if (typeof UserProfile === 'undefined' || typeof UserProfile.load !== 'function') {
              return null;
            }
            return UserProfile.load(t);
          })
          .then(function (profile) {
            var objectifOn =
              typeof UserProfile !== 'undefined' &&
              typeof UserProfile.isExperimentalEnabled === 'function'
                ? UserProfile.isExperimentalEnabled(profile, 'objectif')
                : false;
            if (
              objectifOn &&
              typeof GoalsTrello !== 'undefined' &&
              GoalsTrello.cardDetailBadges
            ) {
              jobs.push(GoalsTrello.cardDetailBadges(t, openObjectifPopup));
            }
            return Promise.all(jobs);
          })
          .then(function (results) {
            return results.reduce(function (acc, list) {
              return acc.concat(list || []);
            }, []);
          });
      }, 'card-detail-badges'),

      'on-enable': function(t) {
        if (window.TpDebug) {
          TpDebug.configureFromProfile(t).catch(function () {});
          TpDebug.log('index', 'on-enable');
        }
        return PriorityTrello.preloadBoardPriorityContext(t)
          .then(function () {
            if (typeof StatutTrello !== 'undefined' && StatutTrello.ensureStatutSettings) {
              return StatutTrello.ensureStatutSettings(t);
            }
          })
          .then(function () {
            return new Promise(function (resolve) {
              t.modal({
                title:
                  (window.PriorityBrand && typeof PriorityBrand.getAppName === 'function'
                    ? PriorityBrand.getAppName()
                    : null) || 'Trello Cerveau',
                url: PriorityTrello.pageUrl('./welcome.html'),
                height: 520,
                fullscreen: false,
                accentColor: '#22272B',
                callback: function () {
                  resolve();
                },
              });
            });
          })
          .then(function () {
            if (typeof AgentMemory === 'undefined') return;
            return AgentMemory.load(t).then(function (memory) {
              if (!AgentMemory.needsOnboarding(memory)) return;
              if (window.TpDebug) TpDebug.log('index', 'memory.onboarding.open');
              return t.modal({
                title: 'Aligner l\'assistant',
                url: PriorityTrello.pageUrl('./memory-align.html'),
                height: 560,
                fullscreen: false,
                accentColor: '#22272B',
              });
            });
          });
      },

      // Settings popup loads board context itself — do not gate the menu item on preload.
      'board-buttons': function(t) {
        return [
          {
            // Monochrome SVG — Trello recolors board-button icons; multi-color brand art
            // becomes an opaque white square.
            icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.263.0/icons/settings.svg',
            text: 'Paramètres du Cerveau',
            callback: function(t) {
              // Popup width is fixed (narrow) by Trello; modal fits statut mapping + color schemes.
              return t.modal({
                title: 'Paramètres du Cerveau',
                url: PriorityTrello.pageUrl('./settings.html'),
                height: 720,
                fullscreen: false,
                accentColor: '#22272B',
              });
            },
          },
          {
            icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.263.0/icons/bot.svg',
            text: 'Assistant',
            callback: function(t) {
              return t.boardBar({
                url: PriorityTrello.pageUrl('./assistant.html'),
                title: 'Assistant',
                height: 440,
                resizable: true,
                accentColor: '#22272B',
              });
            },
          },
          {
            icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.263.0/icons/gantt-chart.svg',
            text: 'Gantt',
            callback: function(t) {
              return t.modal({
                title: 'Gantt',
                url: PriorityTrello.pageUrl('./gantt.html'),
                fullscreen: true,
                accentColor: '#22272B',
              });
            },
          },
        ];
      },

      'list-sorters': withBoardContext(function (t) {
        return PriorityTrello.listPrioritySorters(t);
      }, 'list-sorters'),

    }, (function () {
      var restOpts = PriorityTrello.restClientOptions && PriorityTrello.restClientOptions();
      return restOpts || {};
    })());
  }
</script>
</body>
</html>
