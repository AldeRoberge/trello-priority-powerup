<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power-Up Priorités des cartes</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./version.js"></script>
  <script src="./priority-ui.js"></script>
  <script src="./priority-trello.js"></script>
  <link rel="stylesheet" href="./trello-theme.css" />
</head>
<body>
  <div id="landing" class="tp-landing" hidden>
    <div class="tp-landing-card">
      <h1 class="tp-title">Priorités des cartes</h1>
      <p class="tp-subtitle">Power-Up Trello</p>
      <p class="tp-version-label">Version déployée</p>
      <p class="tp-version-relative" id="versionRelative">Chargement…</p>
      <p class="tp-version-utc" id="versionUtc"></p>
      <p class="tp-landing-note">L'horodatage est appliqué automatiquement à chaque envoi sur <code>main</code>.</p>
    </div>
  </div>

<script>
  const IN_TRELLO = window.self !== window.top;

  if (IN_TRELLO) {
    initPowerUp();
  } else {
    document.getElementById('landing').hidden = false;
    initLanding();
  }

  function renderVersion(builtAt) {
    document.getElementById('versionRelative').textContent = BuildVersion.updatedLabel(builtAt);
    document.getElementById('versionUtc').textContent = BuildVersion.formatUtc(builtAt);
  }

  async function initLanding() {
    let builtAt;

    try {
      builtAt = await BuildVersion.fetchBuiltAt('./build-info.json', './index.html');
    } catch {
      document.getElementById('versionRelative').textContent = 'Informations de build indisponibles';
      document.getElementById('versionUtc').textContent = '';
      return;
    }

    renderVersion(builtAt);
    setInterval(() => renderVersion(builtAt), 30_000);
  }

  function initPowerUp() {
    function openPriorityPopup(t) {
      return t.popup({
        title: 'Définir la priorité',
        url: './popup.html',
        height: 480,
      });
    }

    TrelloPowerUp.initialize({

      'card-badges': function(t) {
        return PriorityTrello.cardFaceBadges(t);
      },

      'card-detail-badges': async function(t) {
        const display = await PriorityTrello.getCardDisplay(t);
        if (!display) {
          return [{
            text: 'Définir la priorité',
            color: 'green',
            callback: openPriorityPopup,
          }];
        }
        return [{
          text: PriorityTrello.formatBadgeText(display),
          color: PriorityTrello.tierDetailBadgeColor(display),
          callback: openPriorityPopup,
        }];
      },

      'on-enable': function(t) {
        return t.modal({
          title: 'Priorités des cartes',
          url: './welcome.html',
          height: 420,
          fullscreen: false,
          accentColor: '#0C66E4',
        });
      },

      'board-buttons': function(t) {
        return [{
          icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.263.0/icons/settings.svg',
          text: 'Paramètres de priorité',
          callback: function(t) {
            return t.popup({
              title: 'Paramètres de priorité',
              url: './settings.html',
              height: 280,
            });
          },
        }];
      },

    });
  }
</script>
</body>
</html>
