<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power-Up Priorités des cartes</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./version.js"></script>
  <script src="./priority-templates.js"></script>
  <link rel="stylesheet" href="./trello-theme.css" />
</head>
<body>
  <div id="landing" class="tp-landing" hidden>
    <div class="tp-landing-card">
      <h1 class="tp-title">Priorités des cartes</h1>
      <p class="tp-subtitle">Power-Up Trello</p>
      <p class="tp-version-label">Version déployée</p>
      <p class="tp-version-relative" id="versionRelative">Chargement…</p>
      <p class="tp-version-utc" id="versionUtc"></p>
      <p class="tp-landing-note">L'horodatage est appliqué automatiquement à chaque envoi sur <code>main</code>.</p>
    </div>
  </div>

<script>
  const IN_TRELLO = window.self !== window.top;

  if (IN_TRELLO) {
    initPowerUp();
  } else {
    document.getElementById('landing').hidden = false;
    initLanding();
  }

  // ── Landing page (direct browser visit) ─────────────────────────────────

  function renderVersion(builtAt) {
    document.getElementById('versionRelative').textContent = BuildVersion.updatedLabel(builtAt);
    document.getElementById('versionUtc').textContent = BuildVersion.formatUtc(builtAt);
  }

  async function initLanding() {
    let builtAt;

    try {
      builtAt = await BuildVersion.fetchBuiltAt('./build-info.json');
    } catch {
      document.getElementById('versionRelative').textContent = 'Informations de build indisponibles';
      document.getElementById('versionUtc').textContent = '';
      return;
    }

    renderVersion(builtAt);
    setInterval(() => renderVersion(builtAt), 30_000);
  }

  // ── Trello Power-Up connector (hidden iframe) ───────────────────────────

  function initPowerUp() {
    async function getPriorities(t) {
      const stored = await t.get('board', 'shared', 'priorities');
      return stored || DEFAULT_PRIORITIES;
    }

    function openPriorityPopup(t) {
      return t.popup({
        title: 'Définir la priorité',
        url: './popup.html',
        height: 320,
      });
    }

    function priorityDotIcon(hex) {
      const safe = /^#[0-9A-Fa-f]{6}$/.test(hex) ? hex : '#718096';
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10">`
        + `<circle cx="5" cy="5" r="4.5" fill="${safe}"/></svg>`;
      return `data:image/svg+xml,${encodeURIComponent(svg)}`;
    }

    function priorityBadgeColor(hex) {
      const map = {
        '#E53E3E': 'red',    '#C53030': 'red',
        '#DD6B20': 'orange', '#C05621': 'orange',
        '#D69E2E': 'yellow', '#B7791F': 'yellow',
        '#38A169': 'green',  '#276749': 'green',
        '#3182CE': 'blue',   '#2B6CB0': 'blue',
        '#805AD5': 'purple', '#6B46C1': 'purple',
        '#D53F8C': 'pink',   '#B83280': 'pink',
        '#0BC5EA': 'sky',    '#00B5D8': 'sky',
        '#68D391': 'lime',
        '#718096': 'light-gray',
      };
      return map[hex] || 'light-gray';
    }

    async function getCardPriority(t) {
      const priorityId = await t.get('card', 'shared', 'priority');
      if (priorityId == null || priorityId === '') return null;
      const priorities = await getPriorities(t);
      return priorities.find(x => x.id == priorityId) || null;
    }

    TrelloPowerUp.initialize({

      'card-badges': async function(t) {
        const p = await getCardPriority(t);
        if (!p) return [];
        return [{
          icon: priorityDotIcon(p.color),
          text: p.label,
          monochrome: false,
        }];
      },

      'card-detail-badges': async function(t) {
        const p = await getCardPriority(t);
        if (!p) {
          return [{
            text: 'Définir la priorité',
            color: 'green',
            callback: openPriorityPopup,
          }];
        }
        return [{
          text: p.label,
          color: priorityBadgeColor(p.color),
          callback: openPriorityPopup,
        }];
      },

      'on-enable': function(t) {
        return t.modal({
          title: 'Priorités des cartes',
          url: './welcome.html',
          height: 420,
          fullscreen: false,
          accentColor: '#0C66E4',
        });
      },

      'board-buttons': function(t) {
        return [{
          icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.263.0/icons/settings.svg',
          text: 'Paramètres de priorité',
          callback: function(t) {
            return t.popup({
              title: 'Paramètres de priorité',
              url: './settings.html',
              height: 560,
            });
          },
        }];
      },

    });
  }
</script>
</body>
</html>
