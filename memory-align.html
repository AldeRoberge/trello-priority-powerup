<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aligner l'assistant</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./components/shared/rest-config.js"></script>
  <script src="./components/priority/priority-trello.js"></script>
  <script src="./components/agent/agent.js"></script>
  <script src="./components/agent/agent-memory.js"></script>
  <script src="./components/shared/tab-autocomplete.js"></script>
  <script src="./components/agent/memory-ui.js"></script>
  <link rel="stylesheet" href="./components/shared/trello-theme.css" />
  <link rel="stylesheet" href="./components/agent/agent-ui.css" />
  <link rel="stylesheet" href="./components/agent/memory-ui.css" />
</head>
<body class="tp-page tp-page--roomy memory-page memory-page--align">
  <div id="memoryMount"></div>
  <script>
    PriorityTrello.initIframePage(function (t) {
      var mount = document.getElementById('memoryMount');
      function resize() {
        if (typeof t.sizeTo === 'function') t.sizeTo(document.body);
      }
      MemoryUI.mount(mount, {
        t: t,
        mode: 'onboarding',
        showSkip: true,
        showSummary: true,
        onLayoutChange: resize,
        onSkip: function () {
          t.closeModal();
        },
        onComplete: function () {
          t.closeModal();
        }
      });
      resize();
    }).catch(function (err) {
      console.error('memory-align init failed', err);
    });
  </script>
</body>
</html>
